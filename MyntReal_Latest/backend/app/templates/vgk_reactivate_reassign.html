<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactivate & Reassign - VGK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .page-header {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .action-card {
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="page-header">
                <h1><i class="fas fa-redo-alt me-3"></i>Reactivate & Reassign Users</h1>
                <p class="mb-0">Reactivate inactive users or reassign referrals</p>
            </div>

            <!-- Reactivate User -->
            <div class="action-card">
                <h4><i class="fas fa-user-check me-2 text-success"></i>Reactivate User</h4>
                <p class="text-muted">Reactivate an inactive user account</p>
                <form id="reactivateForm" onsubmit="reactivateUser(event)">
                    <div class="mb-3">
                        <label class="form-label">User ID to Reactivate *</label>
                        <input type="text" class="form-control" name="user_id" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reactivation Reason *</label>
                        <textarea class="form-control" name="reason" rows="2" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-power-off me-2"></i>Reactivate User
                    </button>
                </form>
            </div>

            <!-- Reassign Referrals -->
            <div class="action-card">
                <h4><i class="fas fa-exchange-alt me-2 text-warning"></i>Reassign Referrals</h4>
                <p class="text-muted">Change a user's direct referrer</p>
                <form id="reassignForm" onsubmit="reassignReferral(event)">
                    <div class="mb-3">
                        <label class="form-label">User ID (to be reassigned) *</label>
                        <input type="text" class="form-control" name="user_id" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Referrer ID *</label>
                        <input type="text" class="form-control" name="new_referrer_id" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reassignment Reason *</label>
                        <textarea class="form-control" name="reason" rows="2" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-user-edit me-2"></i>Reassign Referral
                    </button>
                </form>
            </div>

            <div id="result" class="mt-3" style="display:none;"></div>

            <div class="text-center mt-4">
                <a href="/vgk/dashboard" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const vgkUserId = '{{ user_id }}';

        async function reactivateUser(event) {
            event.preventDefault();
            const formData = new FormData(event.target);

            try {
                const response = await fetch(`/vgk/reactivate-reassign/reactivate?user_id=${vgkUserId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: formData.get('user_id'),
                        reason: formData.get('reason')
                    })
                });

                const data = await response.json();
                showResult(data);
                if (data.success) event.target.reset();
            } catch (error) {
                showResult({ success: false, message: error.message });
            }
        }

        async function reassignReferral(event) {
            event.preventDefault();
            const formData = new FormData(event.target);

            if (!confirm('Are you sure? This will change the user\'s referral tree.')) return;

            try {
                const response = await fetch(`/vgk/reactivate-reassign/reassign?user_id=${vgkUserId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: formData.get('user_id'),
                        new_referrer_id: formData.get('new_referrer_id'),
                        reason: formData.get('reason')
                    })
                });

                const data = await response.json();
                showResult(data);
                if (data.success) event.target.reset();
            } catch (error) {
                showResult({ success: false, message: error.message });
            }
        }

        function showResult(data) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = data.success ? 'alert alert-success' : 'alert alert-danger';
            resultDiv.innerHTML = `<i class="fas fa-${data.success ? 'check' : 'exclamation'}-circle me-2"></i>${data.message}`;
            
            if (data.success) {
                setTimeout(() => resultDiv.style.display = 'none', 5000);
            }
        }
    </script>
</body>
</html>
