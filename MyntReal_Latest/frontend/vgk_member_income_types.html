<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Types · VGK4U Member</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>body{background:#f6f9fc;font-family:'Segoe UI',sans-serif}.topbar{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:18px}.btn-link-white{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:8px;text-decoration:none;font-size:13px}.section-card{background:#fff;border-radius:12px;padding:20px;margin:18px;box-shadow:0 2px 6px rgba(0,0,0,.05)}.muted{color:#64748b;font-size:13px}.empty{padding:40px;text-align:center;color:#94a3b8}.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.metric{background:#fff;border-left:4px solid #0ea5e9;border-radius:8px;padding:14px}.metric .l{font-size:11px;color:#64748b;text-transform:uppercase;font-weight:700}.metric .v{font-size:18px;font-weight:800;color:#0c4a6e;margin-top:3px}</style></head>
<body><script src="/audience-tabs.js" data-page="vgk_member_income_types" data-flag="income_types_vgk4u_enabled"></script><div class="topbar"><div class="brand"><i class="bi bi-pie-chart-fill"></i> VGK4U · Income Types</div><a href="/vgk/dashboard" class="btn-link-white"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
<div class="section-card"><h6 class="muted text-uppercase mb-3">VGK4U Income by Type / Level</h6><div class="metric-row" id="rows"><div class="empty">Loading…</div></div></div>
<script>const TOKEN=localStorage.getItem('vgkAuthToken')||localStorage.getItem('authToken')||'';
const AUD=()=>(window.AudienceTabs&&window.AudienceTabs.current())||'vgk4u';
function fmt(n){return '₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}
async function load(){try{const r=await fetch(`/api/v1/income/summary?audience=${AUD()}`,{headers:TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}});const j=await r.json();const summary=j.summary||j.income_types||j;const el=document.getElementById('rows');const keys=Object.keys(summary).filter(k=>k!=='__grand_total__'&&k!=='success');if(!keys.length){el.innerHTML='<div class="empty"><i class="bi bi-inbox"></i> No income data yet.</div>';return}
el.innerHTML=keys.map(k=>{const v=summary[k];const amt=typeof v==='object'?(v.amount||v.total||v.commission):v;return `<div class="metric"><div class="l">${k}</div><div class="v">${fmt(amt)}</div></div>`}).join('')}catch(e){document.getElementById('rows').innerHTML=`<div class="empty">Failed to load: ${e.message}</div>`}}document.addEventListener('audience:changed',load);load();</script></body></html>
