<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthdays · VGK4U Member</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>body{background:#f6f9fc;font-family:'Segoe UI',sans-serif}.topbar{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:18px}.btn-link-white{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:8px;text-decoration:none;font-size:13px}.section-card{background:#fff;border-radius:12px;padding:20px;margin:18px;box-shadow:0 2px 6px rgba(0,0,0,.05)}.muted{color:#64748b;font-size:13px}.empty{padding:40px;text-align:center;color:#94a3b8}.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.tabs button{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer}.tabs button.active{background:#0ea5e9;color:#fff;border-color:#0ea5e9}table.table-vgk th{font-size:11px;text-transform:uppercase;color:#64748b;background:#f1f5f9;font-weight:700;border-bottom:2px solid #cbd5e1}table.table-vgk td{font-size:13px;vertical-align:middle}</style></head>
<body><script src="/audience-tabs.js" data-page="vgk_member_birthdays" data-flag="birthdays_vgk4u_enabled"></script><div class="topbar"><div class="brand"><i class="bi bi-balloon-heart"></i> VGK4U · Birthdays</div><a href="/vgk/dashboard" class="btn-link-white"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
<div class="section-card"><div class="tabs" id="filterTabs">
<button data-f="today" class="active">Today</button><button data-f="yesterday">Yesterday</button><button data-f="tomorrow">Tomorrow</button><button data-f="next-7-days">Next 7 Days</button>
</div><h6 class="muted text-uppercase mb-2">VGK4U Member Birthdays (dob_actual)</h6>
<div class="table-responsive"><table class="table table-vgk table-sm"><thead><tr><th>Name</th><th>Phone</th><th>Location</th><th>DOB</th></tr></thead><tbody id="rows"><tr><td class="empty" colspan="4">Loading…</td></tr></tbody></table></div></div>
<script>const TOKEN=localStorage.getItem('vgkAuthToken')||localStorage.getItem('authToken')||'';let filt='today';
const AUD=()=>(window.AudienceTabs&&window.AudienceTabs.current())||'vgk4u';
async function load(){const aud=AUD();const url=`/api/v1/admin/birthdays/${filt}?audience=${aud}`;try{const r=await fetch(url,{headers:TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}});const j=await r.json();const rows=j.users||[];const el=document.getElementById('rows');if(!rows.length){el.innerHTML=`<tr><td class="empty" colspan="4"><i class="bi bi-inbox"></i> No ${aud==='vgk4u'?'VGK4U':'MNR'} birthdays.</td></tr>`;return;}el.innerHTML=rows.map(u=>`<tr><td>${u.name||u.user_id||'—'}</td><td>${u.phone||'—'}</td><td>${u.location||'—'}</td><td>${u.birthday_date||u.dob||'—'}</td></tr>`).join('')}catch(e){document.getElementById('rows').innerHTML=`<tr><td class="empty" colspan="4">Failed to load: ${e.message}</td></tr>`}}
document.querySelectorAll('#filterTabs button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#filterTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');filt=b.getAttribute('data-f');load()}));document.addEventListener('audience:changed',load);load();</script></body></html>
