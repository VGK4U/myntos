<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Announcement Submissions - MNR Business Access Program</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 0;
    }
    .main-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    .submission-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }
    .submission-card:hover {
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .status-badge {
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .media-thumbnail {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .media-thumbnail:hover {
      transform: scale(1.05);
    }
    .video-thumbnail {
      position: relative;
    }
    .video-thumbnail::after {
      content: '\f04b';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .pagination-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-list-alt me-2"></i>My Announcement Submissions</h2>
        <a href="/user/feedback/submit" class="btn btn-primary">
          <i class="fas fa-plus me-1"></i>Submit New Announcement
        </a>
      </div>

      <!-- Status Filter Tabs -->
      <ul class="nav nav-pills mb-4" id="statusTabs">
        <li class="nav-item">
          <button class="nav-link active" data-status="all">All</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-status="pending">Pending</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-status="approved">Approved</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-status="rejected">Rejected</button>
        </li>
      </ul>

      <!-- Submissions List -->
      <div id="submissionsList"></div>

      <!-- Pagination -->
      <div class="pagination-controls" id="paginationControls" style="display: none;">
        <button class="btn btn-outline-primary" id="prevPage" disabled>
          <i class="fas fa-chevron-left"></i> Previous
        </button>
        <span id="pageInfo">Page 1</span>
        <button class="btn btn-outline-primary" id="nextPage">
          Next <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Inject sessionToken into sessionStorage for module access
    if (typeof sessionToken !== 'undefined') {
      sessionStorage.setItem('session_token', sessionToken);
    }
    
    // Check if user can delete announcements (RVZ, VGK, Admin roles)
    window.canDeleteAnnouncement = false;
    if (typeof sessionUserType !== 'undefined') {
      const allowedRoles = ['RVZ ID', 'VGK ID', 'Admin', 'Super Admin', 'Finance Admin', 'General Admin'];
      window.canDeleteAnnouncement = allowedRoles.includes(sessionUserType);
    }
  </script>
  <script type="module">
    import { feedbackApi, showToast, showSpinner, showEmptyState, formatDate, showMediaLightbox } from '/shared/feedback/feedbackShared.js';

    let allSubmissions = [];
    let filteredSubmissions = [];
    let currentPage = 1;
    const itemsPerPage = 20;
    const currentStatus = 'all';

    // Initialize everything when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      // Setup tab click handlers
      setupTabs();
      // Load submissions
      loadSubmissions();
    });

    function setupTabs() {
      // Status filter tabs
      document.querySelectorAll('#statusTabs .nav-link').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('#statusTabs .nav-link').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          
          const status = e.target.dataset.status;
          if (status === 'all') {
            filteredSubmissions = allSubmissions;
          } else {
            filteredSubmissions = allSubmissions.filter(s => s.status.toLowerCase() === status.toLowerCase());
          }
          
          currentPage = 1;
          renderSubmissions();
        });
      });
    }

    async function loadSubmissions() {
      const container = document.getElementById('submissionsList');
      showSpinner(container);

      try {
        allSubmissions = await feedbackApi.getMySubmissions();
        filteredSubmissions = allSubmissions;
        renderSubmissions();
      } catch (error) {
        console.error('Error loading submissions:', error);
        showToast('Failed to load submissions', 'error');
        container.innerHTML = '<div class="alert alert-danger">Failed to load submissions. Please try again.</div>';
      }
    }

    function renderSubmissions() {
      const container = document.getElementById('submissionsList');
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredSubmissions.slice(start, end);
      const totalPages = Math.ceil(filteredSubmissions.length / itemsPerPage);

      if (filteredSubmissions.length === 0) {
        showEmptyState(container, 'No submissions found', 'inbox');
        document.getElementById('paginationControls').style.display = 'none';
        return;
      }

      container.innerHTML = pageItems.map(submission => {
        // DC Protocol: Show HIDDEN status when is_visible=False
        let displayStatus = submission.status;
        let statusColor = {
          pending: 'warning',
          approved: 'success',
          rejected: 'danger'
        }[submission.status] || 'secondary';
        
        if (!submission.is_visible && submission.status === 'approved') {
          displayStatus = 'hidden';
          statusColor = 'secondary';
        }

        // DC Protocol: Safari-compatible video with preload and time fragment for first frame
        const mediaHtml = submission.media && submission.media.length > 0
          ? `<div class="media-grid">
               ${submission.media.map(m => {
                 const safariVideoUrl = m.file_path + (m.file_path.includes('#') ? '' : '#t=0.001');
                 return m.media_type === 'video'
                   ? `<div class="video-thumbnail" onclick="viewMedia(${submission.id})">
                        <video class="media-thumbnail" src="${safariVideoUrl}" preload="metadata" muted playsinline></video>
                      </div>`
                   : `<img class="media-thumbnail" src="${m.file_path}" onclick="viewMedia(${submission.id})">`;
               }).join('')}
             </div>`
          : '';

        return `
          <div class="submission-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="mb-1">${submission.title}</h5>
              <span class="badge bg-${statusColor} status-badge">${displayStatus.toUpperCase()}</span>
            </div>
            <p class="text-muted mb-2"><i class="fas fa-tag me-1"></i>${submission.category_name || 'General'}</p>
            <p class="mb-2">${submission.description}</p>
            ${mediaHtml}
            <div class="d-flex justify-content-between align-items-center mt-3">
              <div class="text-muted small">
                <span><i class="fas fa-clock me-1"></i>${formatDate(submission.created_at)}</span>
                ${submission.media && submission.media.length > 0 
                  ? `<span class="ms-3"><i class="fas fa-images me-1"></i>${submission.media.length} file(s)</span>`
                  : ''}
              </div>
              ${window.canDeleteAnnouncement ? `
                <button class="btn btn-danger btn-sm" onclick="deleteAnnouncement(${submission.id}, '${submission.title}')">
                  <i class="fas fa-trash me-1"></i>Delete
                </button>
              ` : ''}
            </div>
            ${submission.admin_comment 
              ? `<div class="alert alert-info mt-2 mb-0">
                   <strong>Admin Comment:</strong> ${submission.admin_comment}
                 </div>`
              : ''}
          </div>
        `;
      }).join('');

      // Pagination controls
      const paginationDiv = document.getElementById('paginationControls');
      if (totalPages > 1) {
        paginationDiv.style.display = 'flex';
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
      } else {
        paginationDiv.style.display = 'none';
      }

      // Make viewMedia available globally
      window.viewMedia = (submissionId) => {
        const submission = allSubmissions.find(s => s.id === submissionId);
        if (submission && submission.media && submission.media.length > 0) {
          showMediaLightbox(submission.media);
        }
      };
    }

    // Delete announcement function
    window.deleteAnnouncement = async (submissionId, title) => {
      const confirmed = confirm(`Are you sure you want to delete "${title}"?\n\nThis will permanently delete the announcement and all its media files.`);
      if (!confirmed) return;
      
      try {
        const token = sessionStorage.getItem('session_token') || sessionToken;
        const response = await fetch(`/api/v1/feedback/${submissionId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          showToast('Announcement deleted successfully', 'success');
          // Remove from local array
          allSubmissions = allSubmissions.filter(s => s.id !== submissionId);
          filteredSubmissions = filteredSubmissions.filter(s => s.id !== submissionId);
          renderSubmissions();
        } else {
          const error = await response.json();
          showToast(`Failed to delete: ${error.detail || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        console.error('Delete error:', error);
        showToast('Failed to delete announcement', 'error');
      }
    };

    // Pagination handlers
    document.getElementById('prevPage').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderSubmissions();
      }
    });

    document.getElementById('nextPage').addEventListener('click', () => {
      const totalPages = Math.ceil(filteredSubmissions.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderSubmissions();
      }
    });
  </script>
</body>
</html>
