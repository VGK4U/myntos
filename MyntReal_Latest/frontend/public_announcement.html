<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcement - MNR Business Access Program</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- MNR Lightbox Component for Announcements -->
  <script src="/public/js/mnr-lightbox.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 0;
    }
    .announcement-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      color: #667eea;
      font-weight: bold;
    }
    .media-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }
    .media-item {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
    }
    .media-item img, .media-item video {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 2rem;
    }
    .stat-item {
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
    }
    .stat-label {
      color: #6c757d;
      font-size: 0.9rem;
    }
    .share-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-whatsapp {
      background: #25D366;
      color: white;
    }
    .btn-whatsapp:hover {
      background: #20bd5a;
      color: white;
    }
    .rating-stars {
      color: #ffc107;
      font-size: 1.5rem;
    }
    .rating-input {
      text-align: center;
      padding: 2rem;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 2rem;
    }
    .rating-input h4 {
      margin-bottom: 1rem;
      color: #495057;
    }
    .star-rating {
      display: inline-flex;
      gap: 0.5rem;
      font-size: 2.5rem;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    .star-rating .star {
      color: #dee2e6;
      transition: color 0.2s;
      cursor: pointer;
    }
    .star-rating .star.active {
      color: #ffc107;
    }

    /* DC Protocol (Mar 2026): Pre-share rating popup overlay */
    #pa-prerate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #pa-prerate-overlay.visible {
      display: flex;
    }
    #pa-prerate-box {
      background: white;
      border-radius: 18px;
      padding: 2rem;
      max-width: 380px;
      width: 92vw;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: pa-slide-up 0.25s ease;
    }
    @keyframes pa-slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #pa-prerate-box .prerate-stars {
      font-size: 2.8rem;
      display: inline-flex;
      gap: 6px;
      cursor: pointer;
      margin: 1rem 0;
    }
    #pa-prerate-box .prerate-stars .ps {
      color: #dee2e6;
      transition: color 0.15s;
    }
    #pa-prerate-box .prerate-stars .ps.lit {
      color: #ffc107;
    }
  </style>
</head>
<body>

  <!-- DC Protocol (Mar 2026): Pre-share quick-rating popup -->
  <div id="pa-prerate-overlay">
    <div id="pa-prerate-box">
      <div style="font-size:2rem;">⭐</div>
      <h5 style="margin:0.5rem 0 0.25rem; color:#1f2937;">Quick — rate before you share!</h5>
      <p style="color:#6b7280; font-size:0.88rem; margin:0 0 0.25rem;">Your rating helps others discover great content.</p>
      <div class="prerate-stars" id="pa-ps-stars">
        <span class="ps" data-v="1">★</span>
        <span class="ps" data-v="2">★</span>
        <span class="ps" data-v="3">★</span>
        <span class="ps" data-v="4">★</span>
        <span class="ps" data-v="5">★</span>
      </div>
      <div id="pa-ps-label" style="font-size:0.85rem; color:#9ca3af; margin-bottom:0.75rem; min-height:20px;"></div>
      <div style="margin-bottom:0.75rem;">
        <input type="text" id="pa-ps-name" class="form-control form-control-sm" placeholder="Your name *" style="text-align:center; max-width:220px; margin:0 auto;">
      </div>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button id="pa-ps-submit" class="btn btn-success btn-sm" onclick="preRateAndShare()" disabled style="min-width:130px;">
          <i class="fas fa-star me-1"></i>Rate &amp; Share
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="skipPreRateAndShare()" style="min-width:100px;">
          Skip, just share
        </button>
      </div>
    </div>
  </div>

  <div class="announcement-container">
    <div class="logo">
      <h1><i class="fas fa-bolt"></i> MNR Business Access Program</h1>
    </div>

    <div id="announcementContent">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Extract announcement ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const announcementId = urlParams.get('id');

    // Global announcement data for share message
    let _paAnnData = null;

    if (!announcementId) {
      document.getElementById('announcementContent').innerHTML = `
        <div class="alert alert-warning">
          <i class="fas fa-exclamation-triangle"></i> No announcement ID provided
        </div>
      `;
    } else {
      loadAnnouncement(announcementId);
    }

    async function loadAnnouncement(id) {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const trackShare = urlParams.get('shared') === 'true' && !sessionStorage.getItem(`shared_${id}`);
        const trackView = !sessionStorage.getItem(`viewed_${id}`);
        
        if (trackShare) sessionStorage.setItem(`shared_${id}`, 'true');
        if (trackView)  sessionStorage.setItem(`viewed_${id}`, 'true');

        const response = await fetch(`/api/v1/feedback/public/announcement/${id}?track_share=${trackShare}&track_view=${trackView}`);
        
        if (!response.ok) throw new Error('Announcement not found');

        const announcement = await response.json();
        _paAnnData = announcement;
        renderAnnouncement(announcement);
      } catch (error) {
        console.error('Error loading announcement:', error);
        document.getElementById('announcementContent').innerHTML = `
          <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i> ${error.message || 'Failed to load announcement'}
          </div>
        `;
      }
    }

    let _paCurrentAnnId = null;

    function renderPaReactions(annId) {
      _paCurrentAnnId = annId;
      const row = document.getElementById('pa_reactRow');
      if (!row) return;
      const rKey = 'pa_ann_react_' + annId;
      const cKey = 'pa_ann_react_counts_' + annId;
      const myR = localStorage.getItem(rKey) || '';
      const cnts = JSON.parse(localStorage.getItem(cKey) || '{"like":0,"love":0,"celebrate":0}');
      row.innerHTML = ['like','love','celebrate'].map(t => {
        const em = t==='like'?'👍':t==='love'?'❤️':'🎉';
        const lbl = t==='like'?'Like':t==='love'?'Love':'Celebrate';
        const act = myR===t, cnt = cnts[t]||0;
        return `<button onclick="paReact(${annId},'${t}')" title="${lbl}" style="display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:22px;border:2px solid ${act?'#6366f1':'#e5e7eb'};background:${act?'#eef2ff':'#f9fafb'};cursor:pointer;font-size:15px;color:#374151;font-weight:500;transition:all .15s;">${em}${cnt>0?`<span style="font-size:12px;color:#6b7280">${cnt}</span>`:''}</button>`;
      }).join('') + `<span style="margin-left:auto;font-size:12px;color:#9ca3af;font-style:italic">React to this shoutout</span>`;
    }

    window.paReact = function(annId, type) {
      const rKey = 'pa_ann_react_' + annId;
      const cKey = 'pa_ann_react_counts_' + annId;
      const prev = localStorage.getItem(rKey) || '';
      const counts = JSON.parse(localStorage.getItem(cKey) || '{"like":0,"love":0,"celebrate":0}');
      if (prev===type) { localStorage.removeItem(rKey); counts[type] = Math.max(0,(counts[type]||0)-1); }
      else { if(prev) counts[prev] = Math.max(0,(counts[prev]||0)-1); localStorage.setItem(rKey,type); counts[type] = (counts[type]||0)+1; }
      localStorage.setItem(cKey, JSON.stringify(counts));
      renderPaReactions(annId);
    };

    function renderAnnouncement(ann) {
      const ratingStars = generateStars(ann.average_rating);
      const baseUrl = '';

      // DC Protocol (Mar 2026): Videos first, then images
      const sortedMedia = [...(ann.media || [])].sort((a, b) => {
        const aIsVideo = a.media_type === 'video' || (a.file_type && a.file_type.startsWith('video/'));
        const bIsVideo = b.media_type === 'video' || (b.file_type && b.file_type.startsWith('video/'));
        if (aIsVideo && !bIsVideo) return -1;
        if (!aIsVideo && bIsVideo) return 1;
        return 0;
      });

      // Store media items for lightbox (sorted: videos first)
      window.currentAnnouncementMedia = sortedMedia.length > 0
        ? sortedMedia.map(m => ({
            url: m.file_path.startsWith('http') ? m.file_path : baseUrl + m.file_path,
            file_type: m.file_type,
            type: m.file_type && m.file_type.startsWith('video/') ? 'video' : 'image',
            title: ann.title || 'Media'
          }))
        : [];

      const mediaHtml = sortedMedia.length > 0
        ? `<div class="media-gallery">
             ${sortedMedia.map((m, index) => {
               const mediaUrl = m.file_path.startsWith('http') ? m.file_path : baseUrl + m.file_path;
               const isVideo = m.media_type === 'video' || (m.file_type && m.file_type.startsWith('video/'));
               const safariVideoUrl = mediaUrl + (mediaUrl.includes('#') ? '' : '#t=0.001');
               // DC Protocol (Mar 2026): Use thumbnail_url as video poster if available
               const posterAttr = isVideo && m.thumbnail_url ? ` poster="${m.thumbnail_url}"` : '';
               return isVideo
                 ? `<div class="media-item" style="cursor: pointer; position: relative;" onclick="openMediaLightbox(${index})">
                      <video${posterAttr} style="pointer-events: none;" preload="metadata" muted playsinline>
                        <source src="${safariVideoUrl}" type="${m.file_type}">
                        Your browser does not support the video tag.
                      </video>
                      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-play" style="color: white; font-size: 24px; margin-left: 4px;"></i>
                      </div>
                    </div>`
                 : `<div class="media-item" style="cursor: zoom-in;" onclick="openMediaLightbox(${index})">
                      <img src="${mediaUrl}" alt="Media" style="transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                    </div>`;
             }).join('')}
           </div>`
        : '';

      document.getElementById('announcementContent').innerHTML = `
        <div class="mb-3">
          <span class="badge bg-primary">${ann.category.category_name}</span>
        </div>
        
        <h2 class="mb-3">${escapeHTML(ann.title)}</h2>
        <p class="lead">${escapeHTML(ann.description || '')}</p>

        ${mediaHtml}

        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-number">${ann.total_ratings}</div>
            <div class="stat-label">Ratings</div>
          </div>
          <div class="stat-item">
            <div class="stat-number">${ann.shares_count}</div>
            <div class="stat-label">Shares</div>
          </div>
          <div class="stat-item">
            <div class="rating-stars">${ratingStars}</div>
            <div class="stat-label">${ann.average_rating.toFixed(1)} Stars</div>
          </div>
        </div>

        <div class="mt-4">
          <div class="row">
            <div class="col-md-6">
              <strong><i class="fas fa-user me-2"></i>Submitted By:</strong><br>
              ${escapeHTML(ann.user_name)} (${escapeHTML(ann.user_id)})
            </div>
            <div class="col-md-6">
              <strong><i class="fas fa-map-marker-alt me-2"></i>Location:</strong><br>
              ${escapeHTML(ann.city || 'N/A')}
            </div>
          </div>
        </div>

        <!-- Reactions -->
        <div id="pa_reactRow" style="display:flex;align-items:center;gap:8px;margin:16px 0 8px;flex-wrap:wrap;"></div>

        <div class="share-buttons">
          <button class="btn btn-primary" onclick="copyLink()">
            <i class="fas fa-link me-2"></i>Copy Link
          </button>
          <button class="btn btn-whatsapp" onclick="openPreRatePopup('whatsapp')">
            <i class="fab fa-whatsapp me-2"></i>Share on WhatsApp
          </button>
        </div>

        <div class="rating-input" id="ratingSection">
          <h4><i class="fas fa-star me-2"></i>Rate this Announcement</h4>
          <p class="text-muted mb-3">Share your feedback - open to all visitors!</p>
          
          <div class="row mb-3">
            <div class="col-md-6">
              <input type="text" id="raterName" class="form-control" placeholder="Your Name *" required />
            </div>
            <div class="col-md-6">
              <input type="email" id="raterEmail" class="form-control" placeholder="Email (optional)" />
            </div>
          </div>
          
          <div class="star-rating" id="starRating">
            <span class="star" data-rating="1">★</span>
            <span class="star" data-rating="2">★</span>
            <span class="star" data-rating="3">★</span>
            <span class="star" data-rating="4">★</span>
            <span class="star" data-rating="5">★</span>
          </div>
          <br>
          <button class="btn btn-success" id="submitRatingBtn" disabled onclick="submitRating()">
            <i class="fas fa-paper-plane me-2"></i>Submit Rating
          </button>
          <div id="ratingMessage" class="mt-3"></div>
        </div>

        <!-- Comments Section - Universal Engagement -->
        <div class="comments-section mt-4 p-4 bg-light rounded">
          <h4><i class="fas fa-comments me-2"></i>Comments (<span id="totalCommentsCount">0</span>)</h4>
          
          <div class="comment-form mb-4 p-3 bg-white rounded shadow-sm">
            <div class="mb-3">
              <textarea class="form-control" id="commentText" rows="3" placeholder="Write your comment..." required maxlength="2000"></textarea>
            </div>
            <div class="row mb-3">
              <div class="col-md-4">
                <input type="text" class="form-control" id="commenterName" placeholder="Your Name *" required>
              </div>
              <div class="col-md-4">
                <input type="email" class="form-control" id="commenterEmail" placeholder="Email (optional)">
              </div>
              <div class="col-md-4">
                <button class="btn btn-primary w-100" id="submitCommentBtn" onclick="submitComment()">
                  <i class="fas fa-paper-plane me-1"></i>Post Comment
                </button>
              </div>
            </div>
          </div>
          
          <div id="commentsList"></div>
        </div>
      `;
      
      setupStarRating();
      renderPaReactions(ann.id);
    }

    // ── DC Protocol (Mar 2026): Pre-share quick rating popup ──────────────────
    let _paShareTarget = null;
    let _paPreRating = 0;
    const _paRatingLabels = ['','★ Poor','★★ Fair','★★★ Good','★★★★ Great','★★★★★ Excellent'];

    function openPreRatePopup(target) {
      _paShareTarget = target;
      _paPreRating = 0;
      document.getElementById('pa-ps-name').value =
        (document.getElementById('raterName') ? document.getElementById('raterName').value : '') || '';
      document.getElementById('pa-ps-label').textContent = '';
      document.getElementById('pa-ps-submit').disabled = true;
      document.querySelectorAll('#pa-ps-stars .ps').forEach(s => s.classList.remove('lit'));
      document.getElementById('pa-prerate-overlay').classList.add('visible');
    }

    document.getElementById('pa-ps-stars').addEventListener('click', function(e) {
      const s = e.target.closest('.ps');
      if (!s) return;
      _paPreRating = parseInt(s.getAttribute('data-v'));
      lightPreRateStars(_paPreRating);
      document.getElementById('pa-ps-label').textContent = _paRatingLabels[_paPreRating];
      document.getElementById('pa-ps-submit').disabled = false;
    });
    document.getElementById('pa-ps-stars').addEventListener('mouseover', function(e) {
      const s = e.target.closest('.ps');
      if (!s) return;
      lightPreRateStars(parseInt(s.getAttribute('data-v')));
    });
    document.getElementById('pa-ps-stars').addEventListener('mouseleave', function() {
      lightPreRateStars(_paPreRating);
    });

    function lightPreRateStars(val) {
      document.querySelectorAll('#pa-ps-stars .ps').forEach(s => {
        s.classList.toggle('lit', parseInt(s.getAttribute('data-v')) <= val);
      });
    }

    async function preRateAndShare() {
      const name = document.getElementById('pa-ps-name').value.trim();
      if (!name) { alert('Please enter your name'); return; }
      const btn = document.getElementById('pa-ps-submit');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Submitting...';
      try {
        await fetch(`/api/v1/engagement/public/announcement/${announcementId}/ratings?company_id=1`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating: _paPreRating, rater_name: name, rater_type: 'public' })
        });
      } catch(_) {}
      document.getElementById('pa-prerate-overlay').classList.remove('visible');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-star me-1"></i>Rate & Share';
      _doShare(_paShareTarget);
    }

    function skipPreRateAndShare() {
      document.getElementById('pa-prerate-overlay').classList.remove('visible');
      _doShare(_paShareTarget);
    }

    // Close overlay when clicking outside
    document.getElementById('pa-prerate-overlay').addEventListener('click', function(e) {
      if (e.target === this) skipPreRateAndShare();
    });

    // ── Rich share message with member signature ───────────────────────────────
    function buildShareMessage() {
      if (!_paAnnData) return window.location.href;
      const ann = _paAnnData;
      const link = window.location.href.split('?')[0] + '?id=' + announcementId;
      const title = ann.title || '';
      const desc = (ann.description && ann.description.trim().toLowerCase() !== title.trim().toLowerCase())
        ? ann.description.substring(0, 120) + (ann.description.length > 120 ? '...' : '')
        : '';
      const member = [ann.user_name || '', ann.city ? '📍 ' + ann.city : ''].filter(Boolean).join(' · ');
      const rating = ann.average_rating > 0 ? `⭐ ${ann.average_rating.toFixed(1)}/5 (${ann.total_ratings} ratings)` : '';
      const lines = [
        `🏠 *MNR Business Access Program*`,
        ``,
        `*${title}*`,
        desc ? desc : null,
        ``,
        member ? `👤 ${member}` : null,
        rating ? rating : null,
        ``,
        `👁 View: ${link}`,
        ``,
        `Regards,`,
        `MNR Mega Natural Resources`,
      ].filter(l => l !== null);
      return lines.join('\n');
    }

    function _doShare(target) {
      const msg = buildShareMessage();
      if (target === 'whatsapp') {
        window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
      } else {
        navigator.clipboard.writeText(msg).catch(() => {});
      }
    }
    // ─────────────────────────────────────────────────────────────────────────

    function generateStars(rating) {
      const fullStars = Math.floor(rating);
      const halfStar = rating % 1 >= 0.5;
      const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
      return '★'.repeat(fullStars) + (halfStar ? '☆' : '') + '☆'.repeat(emptyStars);
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function copyLink() {
      const msg = buildShareMessage();
      navigator.clipboard.writeText(msg).then(() => {
        alert('Message copied to clipboard!');
      }).catch(() => {
        navigator.clipboard.writeText(window.location.href).then(() => alert('Link copied to clipboard!'));
      });
    }

    let selectedRating = 0;

    function setupStarRating() {
      const stars = document.querySelectorAll('.star-rating .star');
      const submitBtn = document.getElementById('submitRatingBtn');
      if (!stars.length || !submitBtn) return;
      
      stars.forEach(star => {
        star.addEventListener('click', function() {
          selectedRating = parseInt(this.getAttribute('data-rating'));
          updateStars(selectedRating);
          submitBtn.disabled = false;
        });
        star.addEventListener('mouseenter', function() {
          updateStars(parseInt(this.getAttribute('data-rating')));
        });
      });
      const starRating = document.getElementById('starRating');
      if (starRating) {
        starRating.addEventListener('mouseleave', function() {
          updateStars(selectedRating);
        });
      }
    }

    function updateStars(rating) {
      document.querySelectorAll('.star-rating .star').forEach(star => {
        star.classList.toggle('active', parseInt(star.getAttribute('data-rating')) <= rating);
      });
    }

    const ENGAGEMENT_API = '/api/v1/engagement';
    const companyId = 1;

    async function submitRating() {
      if (selectedRating === 0) { alert('Please select a rating'); return; }
      const raterName = document.getElementById('raterName').value.trim();
      const raterEmail = document.getElementById('raterEmail').value.trim();
      if (!raterName) { alert('Please enter your name'); return; }

      const submitBtn = document.getElementById('submitRatingBtn');
      const messageDiv = document.getElementById('ratingMessage');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';

      try {
        const response = await fetch(`${ENGAGEMENT_API}/public/announcement/${announcementId}/ratings?company_id=${companyId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating: selectedRating, rater_name: raterName, rater_email: raterEmail || null, rater_type: 'public' })
        });
        const result = await response.json();
        if (result.success) {
          messageDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>Thank you! Your ${selectedRating}-star rating has been submitted.</div>`;
          submitBtn.innerHTML = '<i class="fas fa-check me-2"></i>Rating Submitted';
          document.getElementById('raterName').value = '';
          document.getElementById('raterEmail').value = '';
          setTimeout(() => { loadAnnouncement(announcementId); loadComments(); }, 2000);
        } else {
          throw new Error(result.detail || 'Failed to submit rating');
        }
      } catch (error) {
        messageDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>${error.message}</div>`;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Rating';
      }
    }

    async function submitComment() {
      const commentText = document.getElementById('commentText').value.trim();
      const commenterName = document.getElementById('commenterName').value.trim();
      const commenterEmail = document.getElementById('commenterEmail').value.trim();
      if (!commentText || !commenterName) { alert('Please enter your name and comment'); return; }

      const submitBtn = document.getElementById('submitCommentBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Posting...';
      try {
        const response = await fetch(`${ENGAGEMENT_API}/public/announcement/${announcementId}/comments?company_id=${companyId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ comment: commentText, commenter_name: commenterName, commenter_email: commenterEmail || null, commenter_type: 'public' })
        });
        const result = await response.json();
        if (result.success) {
          alert('Comment posted successfully!');
          document.getElementById('commentText').value = '';
          document.getElementById('commenterName').value = '';
          document.getElementById('commenterEmail').value = '';
          await loadComments();
        } else {
          throw new Error(result.detail || 'Failed to post comment');
        }
      } catch (error) {
        alert('Failed to post comment. Please try again.');
      }
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane me-1"></i>Post Comment';
    }

    async function loadComments() {
      try {
        const response = await fetch(`${ENGAGEMENT_API}/public/announcement/${announcementId}/comments?company_id=${companyId}&page=1&per_page=20`);
        const data = await response.json();
        if (data.success) {
          document.getElementById('totalCommentsCount').textContent = data.total_comments || 0;
          const listEl = document.getElementById('commentsList');
          if (data.comments && data.comments.length > 0) {
            listEl.innerHTML = data.comments.map(c => `
              <div class="comment-item p-3 bg-white rounded shadow-sm mb-2">
                <div class="d-flex justify-content-between">
                  <strong><i class="fas fa-user-circle me-1 text-muted"></i>${escapeHTML(c.commenter_name)}</strong>
                  <small class="text-muted">${new Date(c.created_at).toLocaleDateString('en-IN')}</small>
                </div>
                <p class="mb-0 mt-2">${escapeHTML(c.comment)}</p>
                ${c.replies && c.replies.length > 0 ? `
                  <div class="ms-4 ps-3 mt-2 border-start">
                    ${c.replies.map(r => `<div class="reply-item py-1"><small><strong>${escapeHTML(r.commenter_name)}</strong>: ${escapeHTML(r.comment)}</small></div>`).join('')}
                  </div>` : ''}
              </div>
            `).join('');
          } else {
            listEl.innerHTML = '<p class="text-muted text-center py-3">No comments yet. Be the first to comment!</p>';
          }
        }
      } catch (error) {
        console.error('Error loading comments:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        loadAnnouncement(id);
        loadComments();
      } else {
        document.getElementById('announcementContent').innerHTML = '<div class="alert alert-danger text-center">Announcement ID not specified</div>';
      }
    });

    function openMediaLightbox(index) {
      if (window.MNRLightbox && window.currentAnnouncementMedia && window.currentAnnouncementMedia.length > 0) {
        window.MNRLightbox.open(window.currentAnnouncementMedia, index);
      }
    }
  </script>
</body>
</html>
