<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cost Analysis - Finance Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark bg-info">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-graph-up-arrow"></i> Cost Analysis Dashboard</span>
            <a href="/finance/dashboard" class="btn btn-outline-light btn-sm">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="btn-group mb-3"><button class="btn btn-primary" onclick="loadAnalysis('daily')">Daily Cost</button><button class="btn btn-success" onclick="loadAnalysis('revenue')">Revenue</button><button class="btn btn-warning" onclick="loadAnalysis('trend')">Cost Trend</button></div>
        <div id="analysisData"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        function loadAnalysis(type){
            const endpoints={daily:'/finance/cost-calculations/daily',revenue:'/finance/revenue/calculate',trend:'/finance/cost-trend'};
            $.ajax({url:`${API_BASE}${endpoints[type]}`,headers:{'Authorization':`Bearer ${authToken}`},
            success:r=>{if(r.success){let html='<div class="card p-3">';
            if(type==='daily'){html+=`<h4>Daily Cost: ₹${r.daily_cost.toLocaleString()}</h4><p>Earnings: ₹${r.earnings.toLocaleString()}</p><p>Expenses: ₹${r.expenses.toLocaleString()}</p>`}
            else if(type==='revenue'){html+=`<h4>Total Revenue: ₹${r.total_revenue.toLocaleString()}</h4><p>Gross: ₹${r.gross_revenue.toLocaleString()}</p><p>Net: ₹${r.net_revenue.toLocaleString()}</p>`}
            else{html+=`<h4>Cost Trend</h4>${r.trend_data.map(d=>`<div class="border-bottom py-2">${d.date}: ₹${d.cost.toLocaleString()}</div>`).join('')}`}
            html+='</div>';$('#analysisData').html(html)}}});
        }
        $(document).ready(()=>loadAnalysis('daily'));
    </script>
</body>
</html>
