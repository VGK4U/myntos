<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Red ID Oversight - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark bg-danger">
        <div class="container-fluid"><span class="navbar-brand"><i class="bi bi-shield-exclamation"></i> Red ID Oversight Dashboard</span><a href="/superadmin/dashboard" class="btn btn-outline-light btn-sm">Admin Dashboard</a></div>
    </nav>
    <div class="container mt-4">
        <ul class="nav nav-tabs mb-3"><li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#analytics">Analytics</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#audit">Audit Trail</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#activity">Admin Activity</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#health">System Health</a></li></ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="analytics"><div id="analyticsData"></div></div>
            <div class="tab-pane fade" id="audit"><div id="auditData"></div></div>
            <div class="tab-pane fade" id="activity"><div id="activityData"></div></div>
            <div class="tab-pane fade" id="health"><div id="healthData"></div></div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        $('.nav-link').on('shown.bs.tab',function(e){const target=$(e.target).attr('href').substring(1);if(target==='analytics')loadAnalytics();else if(target==='audit')loadAudit();else if(target==='activity')loadActivity();else loadHealth()});
        function loadAnalytics(){$.ajax({url:`${API_BASE}/super-admin/red-id-oversight/analytics-data`,headers:{'Authorization':`Bearer ${authToken}`},success:r=>$('#analyticsData').html(`<div class="row"><div class="col-md-3"><div class="card p-3 text-center"><h3>${r.total_users}</h3><p>Total Users</p></div></div><div class="col-md-3"><div class="card p-3 text-center"><h3>${r.suspicious_activities}</h3><p>Suspicious Activities</p></div></div></div>`)})}
        function loadAudit(){$.ajax({url:`${API_BASE}/super-admin/red-id-oversight/audit-trail`,headers:{'Authorization':`Bearer ${authToken}`},success:r=>$('#auditData').html(r.audit_logs.map(a=>`<div class="border-bottom py-2"><strong>${a.admin_id}</strong> - ${a.action} (${new Date(a.timestamp).toLocaleString()})</div>`).join(''))})}
        function loadActivity(){$.ajax({url:`${API_BASE}/super-admin/red-id-oversight/admin-activity`,headers:{'Authorization':`Bearer ${authToken}`},success:r=>$('#activityData').html(r.activities.map(a=>`<div class="border-bottom py-2">${a.admin_id}: ${a.activity_type} (${a.timestamp})</div>`).join(''))})}
        function loadHealth(){$.ajax({url:`${API_BASE}/super-admin/red-id-oversight/system-health`,headers:{'Authorization':`Bearer ${authToken}`},success:r=>$('#healthData').html(`<div class="alert alert-${r.status==='healthy'?'success':'danger'}">System Status: ${r.status.toUpperCase()}</div>`)})}
        $(document).ready(loadAnalytics);
    </script>
</body>
</html>
