<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Status Management - MNR Business Access Program</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .status-card { border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .status-active { background: #d1fae5; border-left: 4px solid #10b981; }
        .status-inactive { background: #fee2e2; border-left: 4px solid #ef4444; }
        .status-suspended { background: #fef3c7; border-left: 4px solid #f59e0b; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-person-badge"></i> User Status Management</span>
            <div>
                <a href="/admin/users" class="btn btn-outline-light btn-sm me-2">
                    <i class="bi bi-arrow-left"></i> Back to Users
                </a>
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div id="filterComponentContainer"></div>

        <div class="row">
            <div class="col-md-4">
                <div class="status-card status-active">
                    <h5><i class="bi bi-check-circle"></i> Active Users</h5>
                    <h2 id="activeCount">0</h2>
                    <p class="text-muted mb-0">Users with active status</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="status-card status-inactive">
                    <h5><i class="bi bi-x-circle"></i> Inactive Users</h5>
                    <h2 id="inactiveCount">0</h2>
                    <p class="text-muted mb-0">Users pending activation</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="status-card status-suspended">
                    <h5><i class="bi bi-exclamation-triangle"></i> Suspended Users</h5>
                    <h2 id="suspendedCount">0</h2>
                    <p class="text-muted mb-0">Temporarily suspended accounts</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Bulk Status Update</h5>
                <form id="statusForm">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">User IDs (comma-separated)</label>
                            <textarea class="form-control" id="userIds" rows="3" placeholder="MNR123456789, MNR987654321"></textarea>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">New Status</label>
                            <select class="form-select" id="newStatus">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Suspended">Suspended</option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Reason</label>
                            <input type="text" class="form-control" id="reason" placeholder="Optional reason">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Update Status</button>
                </form>
            </div>
        </div>

        <div id="results" class="mt-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE = '/api/v1';
        let authToken = localStorage.getItem('authToken');

        $(document).ready(function() {
            $('#filterComponentContainer').load('/components/admin_user_filter.html', function() {
                loadFilteredData(UserFilter.getFilterParams());
            });
            
            $('#statusForm').on('submit', function(e) {
                e.preventDefault();
                updateStatuses();
            });
        });

        function loadFilteredData(params) {
            loadStats(params.user_id);
        }

        function loadStats(userId = null) {
            let url = `${API_BASE}/admin/users?limit=1000`;
            if (userId) {
                url += `&user_id=${userId}`;
            }

            $.ajax({
                url: url,
                headers: { 'Authorization': `Bearer ${authToken}` },
                success: function(response) {
                    if (response.success) {
                        const users = response.data.users;
                        const active = users.filter(u => u.status === 'Active').length;
                        const inactive = users.filter(u => u.status === 'Inactive').length;
                        const suspended = users.filter(u => u.status === 'Suspended').length;
                        
                        $('#activeCount').text(active);
                        $('#inactiveCount').text(inactive);
                        $('#suspendedCount').text(suspended);

                        if (userId && users.length === 1) {
                            $('#userIds').val(users[0].id);
                        }
                    }
                }
            });
        }

        function updateStatuses() {
            const userIds = $('#userIds').val().split(',').map(id => id.trim()).filter(id => id);
            const status = $('#newStatus').val();
            const reason = $('#reason').val();

            if (userIds.length === 0) {
                alert('Please enter at least one User ID');
                return;
            }

            const promises = userIds.map(userId => {
                return $.ajax({
                    url: `${API_BASE}/admin/users/${userId}/update-status`,
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    data: JSON.stringify({ status, reason })
                });
            });

            Promise.allSettled(promises).then(results => {
                const successes = results.filter(r => r.status === 'fulfilled').length;
                const failures = results.filter(r => r.status === 'rejected').length;
                
                $('#results').html(`
                    <div class="alert alert-${failures > 0 ? 'warning' : 'success'}">
                        <strong>Results:</strong> ${successes} updated successfully, ${failures} failed
                    </div>
                `);
                
                loadStats();
                $('#userIds').val('');
            });
        }
    </script>
</body>
</html>
