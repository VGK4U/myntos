<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Health - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark bg-success">
        <div class="container-fluid"><span class="navbar-brand"><i class="bi bi-heart-pulse"></i> System Health Dashboard</span><a href="/superadmin/dashboard" class="btn btn-outline-light btn-sm">Admin Dashboard</a></div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4"><div class="card p-3 text-center" id="schedulerStatus"></div></div>
            <div class="col-md-4"><div class="card p-3 text-center" id="dbStatus"></div></div>
            <div class="col-md-4"><div class="card p-3 text-center" id="apiStatus"></div></div>
        </div>
        <div class="card mt-3"><div class="card-body"><div id="systemMetrics"></div></div></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        function loadHealth(){
            $.ajax({url:`${API_BASE}/super-admin/scheduler/status`,headers:{'Authorization':`Bearer ${authToken}`},
            success:r=>$('#schedulerStatus').html(`<h5>Scheduler</h5><div class="badge bg-${r.running?'success':'danger'}">${r.running?'Running':'Stopped'}</div>`)});
            $.ajax({url:`${API_BASE}/rvz/system/status`,headers:{'Authorization':`Bearer ${authToken}`},
            success:r=>{$('#dbStatus').html(`<h5>Database</h5><div class="badge bg-success">Connected</div>`);
            $('#apiStatus').html(`<h5>API</h5><div class="badge bg-success">Active</div>`);
            $('#systemMetrics').html(`<p>Total Users: ${r.stats?.total_users||0}</p><p>Active: ${r.stats?.active_users||0}</p>`)}});
        }
        $(document).ready(loadHealth);setInterval(loadHealth,30000);
    </script>
</body>
</html>
