<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Announcement — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #0d9488, #0d9488cc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="announcements_vgk4u_enabled" data-label="Announcements"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-bullhorn me-2"></i>Create Announcement</h1>
      <p>Create text/photo/video/review announcements. Visible after admin approval.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="anForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:640px;margin:0 auto">
        <div class="mb-3"><label class="form-label fw-bold">Title *</label>
          <input class="form-control" id="anTitle" maxlength="200" required></div>
        <div class="mb-3"><label class="form-label fw-bold">Type</label>
          <select class="form-select" id="anType">
            <option value="text">Text</option><option value="photo">Photo</option>
            <option value="video">Video</option><option value="review">Review</option>
          </select></div>
        <div class="mb-3"><label class="form-label fw-bold">Description</label>
          <textarea class="form-control" id="anDesc" rows="4" maxlength="4000"></textarea></div>
        <div class="mb-3"><label class="form-label">Cover image URL (optional)</label>
          <input class="form-control" id="anCover" placeholder="https://…"></div>
        <div class="mb-3"><label class="form-label">Video URL (optional)</label>
          <input class="form-control" id="anVideo" placeholder="https://…"></div>
        <button type="submit" class="btn btn-success w-100"><i class="fas fa-bullhorn me-2"></i>Create</button>
      </form>
      <div id="anResult" class="mt-3" style="max-width:640px;margin:1rem auto"></div>
      <div class="mt-3 text-center"><a href="/vgk/my-announcements" class="btn btn-outline-secondary"><i class="fas fa-list me-2"></i>View My Announcements</a></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      $('#anForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const payload = {
          title: $('#anTitle').value.trim(),
          announcement_type: $('#anType').value,
          description: $('#anDesc').value.trim() || null,
          cover_image_url: $('#anCover').value.trim() || null,
          video_url: $('#anVideo').value.trim() || null,
        };
        const r = await fetch('/api/v1/vgk-member/announcements/create?audience=vgk4u', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#anResult').innerHTML = r.ok
          ? '<div class="alert alert-success">Announcement created — pending review.</div>'
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
        if (r.ok) $('#anForm').reset();
      });
})();
</script>
</body>
</html>
