<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Settings — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #6b7280, #6b7280cc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="settings_vgk4u_enabled" data-label="Member Settings"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-cog me-2"></i>Notification Settings</h1>
      <p>Choose which channels you want to be notified on.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <div id="stForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:640px;margin:0 auto">
        <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="stWA"><label class="form-check-label" for="stWA"><i class="fab fa-whatsapp text-success me-2"></i>WhatsApp</label></div>
        <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="stEmail"><label class="form-check-label" for="stEmail"><i class="fas fa-envelope me-2"></i>Email</label></div>
        <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="stSMS"><label class="form-check-label" for="stSMS"><i class="fas fa-sms me-2"></i>SMS</label></div>
        <div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="stPush"><label class="form-check-label" for="stPush"><i class="fas fa-bell me-2"></i>Push</label></div>
        <hr>
        <div class="mb-3"><label class="form-label">Theme</label>
          <select class="form-select" id="stTheme">
            <option value="light">Light</option><option value="dark">Dark</option><option value="auto">Auto</option>
          </select></div>
        <div class="mb-3"><label class="form-label">Language</label>
          <select class="form-select" id="stLang">
            <option value="en">English</option><option value="hi">हिंदी</option><option value="te">తెలుగు</option>
          </select></div>
        <button id="stSave" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Save Settings</button>
        <div id="stResult" class="mt-3"></div>
      </div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      async function load() {
        const r = await fetch('/api/v1/vgk-member/settings?audience=vgk4u', { credentials: 'include' });
        if (!r.ok) { $('#stResult').innerHTML='<div class="alert alert-warning">Module disabled or unauthorized.</div>'; return; }
        const d = await r.json(); const s = d.settings || {};
        $('#stWA').checked = !!s.notification_whatsapp;
        $('#stEmail').checked = !!s.notification_email;
        $('#stSMS').checked = !!s.notification_sms;
        $('#stPush').checked = !!s.notification_push;
        if (s.theme) $('#stTheme').value = s.theme;
        if (s.language) $('#stLang').value = s.language;
      }
      $('#stSave').addEventListener('click', async () => {
        const payload = {
          notification_whatsapp: $('#stWA').checked,
          notification_email: $('#stEmail').checked,
          notification_sms: $('#stSMS').checked,
          notification_push: $('#stPush').checked,
          theme: $('#stTheme').value, language: $('#stLang').value,
        };
        const r = await fetch('/api/v1/vgk-member/settings?audience=vgk4u', {
          method: 'PUT', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#stResult').innerHTML = r.ok
          ? '<div class="alert alert-success">Settings saved.</div>'
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
      });
      load();
})();
</script>
</body>
</html>
