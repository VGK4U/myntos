<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer Coupons — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #8b5cf6, #8b5cf6cc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="coupon_transfer_vgk4u_enabled" data-label="Coupon Transfer"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-exchange-alt me-2"></i>Transfer Coupons</h1>
      <p>Transfer points to another VGK4U member.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="ctForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:520px;margin:0 auto">
        <div class="mb-3"><label class="form-label fw-bold">Recipient Partner Code *</label>
          <input class="form-control text-uppercase" id="ctTo" required></div>
        <div class="mb-3"><label class="form-label fw-bold">Points *</label>
          <input class="form-control" type="number" id="ctPts" min="1" max="100000" required></div>
        <div class="mb-3"><label class="form-label">Note (optional)</label>
          <input class="form-control" id="ctNote" maxlength="500"></div>
        <button type="submit" class="btn" style="background:#8b5cf6;color:#fff" class="w-100"><i class="fas fa-paper-plane me-2"></i>Transfer</button>
      </form>
      <div id="ctResult" class="mt-3" style="max-width:520px;margin:1rem auto"></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      $('#ctForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const payload = {
          to_partner_code: $('#ctTo').value.trim().toUpperCase(),
          points: parseInt($('#ctPts').value, 10),
          note: $('#ctNote').value.trim() || null
        };
        const r = await fetch('/api/v1/vgk-member/coupons/transfer?audience=vgk4u', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#ctResult').innerHTML = r.ok
          ? `<div class="alert alert-success">Transferred. New balance: ${d.sender_balance}</div>`
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
        if (r.ok) $('#ctForm').reset();
      });
})();
</script>
</body>
</html>
