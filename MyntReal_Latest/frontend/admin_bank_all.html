<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Bank Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
        <div class="container-fluid">
            <span class="navbar-brand">All Bank Details</span>
            <div>
                <a href="/admin/bank-pending" class="btn btn-outline-light btn-sm me-2">Pending</a>
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-4">
        <div id="filterComponentContainer"></div>
        <div id="bankList" class="mt-3"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';
        let authToken=localStorage.getItem('authToken');

        $(document).ready(function() {
            $('#filterComponentContainer').load('/components/admin_user_filter.html', function() {
                // DC-FIX: Ensure UserFilter has the correct token
                if (typeof UserFilter !== 'undefined') {
                    UserFilter.authToken = authToken;
                }
                loadFilteredData(UserFilter.getFilterParams());
            });
        });

        function loadFilteredData(params) {
            loadBankAll(params.user_id, params.page, params.per_page);
        }

        function loadBankAll(userId = null, page = 1, perPage = 20) {
            const params = new URLSearchParams({ status: 'All', page, per_page: perPage });
            if (userId) params.append('user_id', userId);

            $.ajax({
                url:`${API_BASE}/kyc-bank/admin/filter-bank-status?${params.toString()}`,
                headers:{'Authorization':`Bearer ${authToken}`},
                success: function(r) {
                    const users = Array.isArray(r) ? r : ((r && r.users) || []);
                    if(users.length > 0) {
                        $('#bankList').html(users.map(b=>`<div class="card mb-2 p-3"><strong>${b.user_id}</strong> - ${b.name} - Status: ${b.bank_status}</div>`).join(''));
                    } else {
                        $('#bankList').html('<div class="alert alert-info">No bank details found</div>');
                    }
                    
                    if (r && r.pagination && typeof UserFilter !== 'undefined') {
                        UserFilter.updatePagination(r.pagination.total || users.length, page, perPage);
                    }
                },
                error:()=>$('#bankList').html('<div class="alert alert-danger">Error loading bank details</div>')
            });
        }
    </script>
    <!-- [DC-T34] VGK4U audience tabs (auto-mount + jQuery audience injector) -->
    <script src="/audience-tabs.js"></script>
</body>
</html>
