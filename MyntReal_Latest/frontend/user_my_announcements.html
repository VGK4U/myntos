<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Updates - MNR Business Access Program</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 0;
    }
    .main-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    .nav-pills-custom {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .nav-pills-custom .nav-link {
      border-radius: 8px;
      color: #495057;
      font-weight: 500;
    }
    .nav-pills-custom .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .submission-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }
    .submission-card:hover {
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .status-badge {
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .media-thumbnail {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .media-thumbnail:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 My Submissions</h2>
        <a href="/user/feedback/submit" class="btn btn-primary">
          <i class="fas fa-plus me-1"></i>Submit New Announcement
        </a>
      </div>

      <!-- Submissions List -->
      <div id="submissionsList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (typeof sessionToken !== 'undefined') {
      sessionStorage.setItem('session_token', sessionToken);
    }
  </script>
  <script type="module">
    import { feedbackApi, showToast, showSpinner, showEmptyState, formatDate, showMediaLightbox } from '/shared/feedback/feedbackShared.js';

    const STATUS_FILTER = 'all';

    document.addEventListener('DOMContentLoaded', loadSubmissions);

    async function loadSubmissions() {
      const container = document.getElementById('submissionsList');
      showSpinner(container);

      try {
        const allSubmissions = await feedbackApi.getMySubmissions();
        const filtered = STATUS_FILTER === 'all' 
          ? allSubmissions 
          : allSubmissions.filter(s => s.status.toLowerCase() === STATUS_FILTER.toLowerCase());
        renderSubmissions(filtered);
      } catch (error) {
        console.error('Error loading submissions:', error);
        showToast('Failed to load submissions', 'error');
        container.innerHTML = '<div class="alert alert-danger">Failed to load submissions. Please try again.</div>';
      }
    }

    function renderSubmissions(submissions) {
      const container = document.getElementById('submissionsList');

      if (submissions.length === 0) {
        showEmptyState(container, 'No  submissions found', 'inbox');
        return;
      }

      container.innerHTML = submissions.map(submission => {
        const statusColor = {
          pending: 'warning',
          approved: 'success',
          rejected: 'danger'
        }[submission.status] || 'secondary';

        // DC Protocol: Safari-compatible video with preload and time fragment for first frame
        const mediaHtml = submission.media && submission.media.length > 0
          ? `<div class="media-grid">
               ${submission.media.map(m => {
                 const safariVideoUrl = m.file_path + (m.file_path.includes('#') ? '' : '#t=0.001');
                 return m.media_type === 'video'
                   ? `<div onclick="viewMedia(${submission.id})">
                        <video class="media-thumbnail" src="${safariVideoUrl}" preload="metadata" muted playsinline></video>
                      </div>`
                   : `<img class="media-thumbnail" src="${m.file_path}" onclick="viewMedia(${submission.id})">`;
               }).join('')}
             </div>`
          : '';

        return `
          <div class="submission-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="mb-1">${submission.title}</h5>
              <span class="badge bg-${statusColor} status-badge">${submission.status.toUpperCase()}</span>
            </div>
            <p class="text-muted mb-2"><i class="fas fa-tag me-1"></i>${submission.category ? submission.category.category_name : 'General'}</p>
            <p class="mb-2">${submission.description}</p>
            ${mediaHtml}
            <div class="d-flex justify-content-between align-items-center mt-3 text-muted small">
              <span><i class="fas fa-clock me-1"></i>${formatDate(submission.submitted_at)}</span>
              ${submission.media && submission.media.length > 0 
                ? `<span><i class="fas fa-images me-1"></i>${submission.media.length} file(s)</span>`
                : ''}
            </div>
            ${submission.admin_comment 
              ? `<div class="alert alert-info mt-2 mb-0">
                   <strong>Admin Comment:</strong> ${submission.admin_comment}
                 </div>`
              : ''}
          </div>
        `;
      }).join('');

      window.viewMedia = (submissionId) => {
        const submission = submissions.find(s => s.id === submissionId);
        if (submission && submission.media && submission.media.length > 0) {
          showMediaLightbox(submission.media);
        }
      };
    }
  </script>
</body>
</html>
