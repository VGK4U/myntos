        // DC Protocol Feb 2026: Get final approval date (latest of all verified_at dates if fully approved)

            if (user.kyc_status !== 'Approved' || user.bank_details_status !== 'Approved') {
                const allValidated = [

                    user.account_holder_validated, user.account_number_validated,
                    user.ifsc_validated, user.bank_name_validated, user.branch_validated
                ].some(v => v);
                if (someValidated) {
                    return 'Partially Validated';
                }
                return 'Pending';
            }
            
            // Get all approval timestamps
            const timestamps = [
                user.aadhaar_verified_at,
                user.pan_verified_at,
                user.document_verified_at,
                user.account_holder_verified_at,
                user.account_number_verified_at,
                user.ifsc_verified_at,
                user.bank_name_verified_at,
                user.branch_verified_at
            ].filter(t => t);
            
            if (timestamps.length === 0) return 'Pending';
            
            // Find the latest timestamp (final approval)
            const latestDate = timestamps.reduce((latest, current) => {
                return new Date(current) > new Date(latest) ? current : latest;
            });
            
            return new Date(latestDate).toLocaleDateString();
        }
        
        // DC Protocol Feb 2026: Sort users by column
        function sortUsers(users, column, direction) {
            return [...users].sort((a, b) => {
                let valA, valB;
                
                // Special handling for computed final_approval_at column
                if (column === 'final_approval_at') {
                    valA = getFinalApprovalTimestamp(a);
                    valB = getFinalApprovalTimestamp(b);
                    
                    // Non-approved users (timestamp=0) always go to bottom regardless of sort direction
                    if (valA === 0 && valB !== 0) return 1;  // A goes to bottom
                    if (valB === 0 && valA !== 0) return -1; // B goes to bottom
                    if (valA === 0 && valB === 0) return 0;  // Both pending, keep order
                    
                    // Both have timestamps - normal sort
                    if (valA < valB) return direction === 'asc' ? -1 : 1;
                    if (valA > valB) return direction === 'asc' ? 1 : -1;
                    return 0;
                } else {
                    valA = a[column] || '';
                    valB = b[column] || '';
                    
                    // Handle date columns
                    if (column === 'submitted_at') {
                        valA = valA ? new Date(valA).getTime() : 0;
                        valB = valB ? new Date(valB).getTime() : 0;
                    }

                // String comparison for other columns
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                
                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            });

        // DC Protocol Feb 2026: Get final approval timestamp for sorting (returns numeric timestamp)
        function getFinalApprovalTimestamp(user) {
            // Not fully approved = sort to bottom (return 0)
            if (user.kyc_status !== 'Approved' || user.bank_details_status !== 'Approved') {
                return 0;

            // Get all approval timestamps
            const timestamps = [
                user.aadhaar_verified_at,
                user.pan_verified_at,
                user.document_verified_at,
                user.account_holder_verified_at,
                user.account_number_verified_at,
                user.ifsc_verified_at,
                user.bank_name_verified_at,
                user.branch_verified_at
            ].filter(t => t).map(t => new Date(t).getTime());
            
            if (timestamps.length === 0) return 0;
            
            // Return the latest timestamp (final approval time)
            return Math.max(...timestamps);
        }

        function renderFieldApproval(fieldLabel, fieldValue, fieldName, isVerified, approvedBy, approvedAt, documentType, hasDocument) {
            // DC Protocol Feb 2026: Get validation status for this field
            const validatedFieldName = fieldName.replace('_verified', '_validated');
            const isValidated = currentUser[validatedFieldName] || false;
            const validatedBy = currentUser[validatedFieldName + '_by'] || null;
            const validatedAt = currentUser[validatedFieldName + '_at'] || null;
            
            // DC Protocol Feb 2026: Visual states - Approved (green), Rejected (red), Validated (blue), Pending (yellow)
            let fieldState = 'pending-field';  // Default: never reviewed
            let statusBadge = '<span class="verification-badge pending"><i class="bi bi-hourglass"></i></span>';
            let statusText = 'Pending Review';
            
            if (isVerified === true) {
                fieldState = 'approved-field';
                statusBadge = '<span class="verification-badge verified"><i class="bi bi-check"></i></span>';
                statusText = 'Approved';
            } else if (isVerified === false && approvedBy) {
                // Explicitly rejected (has a reviewer but not verified)
                fieldState = 'rejected-field';
                statusBadge = '<span class="verification-badge not-verified"><i class="bi bi-x"></i></span>';
                statusText = 'Rejected';
            } else if (isValidated === true) {
                // Validated by staff, waiting for approval
                fieldState = 'pending-field';  // Keep yellow but show validated badge
                statusBadge = '<span class="verification-badge" style="background:#3b82f6;color:white;"><i class="bi bi-check-square"></i></span>';
                statusText = 'Validated (Pending Approval)';
            }

            // Validation tracking info
            let validationInfo = '';
            if (isValidated && validatedBy && !isVerified) {
                const timestamp = validatedAt ? new Date(validatedAt).toLocaleString() : 'Unknown';
                validationInfo = `<small class="d-block mt-1 text-info">
                    <i class="bi bi-check-square text-info"></i> Validated by: ${validatedBy} at ${timestamp}
                </small>`;
            }
            
            // Approval/Rejection tracking info
            let approvalInfo = '';
            if (approvedBy) {
                const timestamp = approvedAt ? new Date(approvedAt).toLocaleString() : 'Unknown';
                const actionLabel = isVerified ? 'Approved' : 'Rejected';
                const iconClass = isVerified ? 'bi-person-check text-success' : 'bi-person-x text-danger';
                approvalInfo = `<small class="d-block mt-1 ${isVerified ? 'text-success' : 'text-danger'}">
                    <i class="bi ${iconClass}"></i> ${actionLabel} by: ${approvedBy} at ${timestamp}
                </small>`;
            }

            // View Document button (only show if document type exists and user has uploaded)
            let documentButton = '';
            if (documentType && hasDocument) {
                // DC Protocol Feb 2026: For Aadhaar, show separate Front and Back buttons
                if (documentType === 'aadhaar') {
                    documentButton = `
                        <button class="btn btn-info btn-sm ms-1" onclick="viewDocument('aadhaar_front')">
                            <i class="bi bi-file-earmark-text"></i> Front
                        </button>
                        <button class="btn btn-info btn-sm ms-1" onclick="viewDocument('aadhaar_back')">
                            <i class="bi bi-file-earmark-text"></i> Back
                        </button>
                    `;
                } else {
                    documentButton = `
                        <button class="btn btn-info btn-sm ms-1" onclick="viewDocument('${documentType}')">
                            <i class="bi bi-file-earmark-text"></i> View Document
                        </button>
                    `;
                }
            }

            // DC Protocol Feb 2026: 2-Level Approval Workflow
            // Level 1: Validate (all staff with page access)
            // Level 2: Approve (only VGK4U/Accounts, requires validation first)
            let actionButtons = '';
            
            // Validate button - ALL staff can see and use
            const validateBtnClass = isValidated ? 'btn-outline-info' : 'btn-info';
            const validateBtnText = isValidated ? 'Re-validate' : 'Validate';
            actionButtons += `
                <button class="btn ${validateBtnClass} btn-sm" onclick="validateField('${fieldName}', true)">
                    <i class="bi bi-check-square"></i> ${validateBtnText}
                </button>
            `;
            
            // Approve/Reject buttons - Only VGK4U/Accounts can see
            // Disabled until field is validated
            if (staffRole.can_approve) {
                const canApproveNow = isValidated && !isVerified;
                const approveDisabled = !canApproveNow ? 'disabled' : '';
                const approveTitle = !isValidated ? 'Must validate first' : (isVerified ? 'Already approved' : 'Approve this field');
                
                actionButtons += `
                    <button class="btn ${isVerified ? 'btn-outline-success' : 'btn-success'} btn-sm ms-1" 
                            onclick="approveField('${fieldName}', true)" ${approveDisabled} title="${approveTitle}">
                        <i class="bi bi-check"></i> Approve
                    </button>
                    <button class="btn ${fieldState === 'rejected-field' ? 'btn-outline-danger' : 'btn-danger'} btn-sm ms-1" 
                            onclick="approveField('${fieldName}', false)" ${approveDisabled} title="${approveTitle}">
                        <i class="bi bi-x"></i> Reject
                    </button>
                `;
            }

            return `
                <div class="col-12 mb-2">
                    <div class="field-approval ${fieldState}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="flex-grow-1">
                                <span class="field-name">${fieldLabel}:</span> 
                                <span class="field-value">${fieldValue}</span>
                                ${statusBadge}
                                ${validationInfo}
                                ${approvalInfo}
                            </div>
                            <div>
                                ${documentButton}
                                ${actionButtons}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function viewDocument(documentType) {
            if (!currentUser) return;

            try {
                // DC Protocol: Fetch document from kyc_document table with auth token
                const url = `${API_BASE}/admin/kyc/view-document/${currentUser.user_id}/${documentType}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert(`Error: ${error.detail || 'Failed to load document'}`);
                    return;
                }

                // Get the file as a blob
                const blob = await response.blob();
                
                // Get filename from Content-Disposition header or use default
                const contentDisposition = response.headers.get('content-disposition');
                let filename = `${documentType}_document`;
                if (contentDisposition) {
                    const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(contentDisposition);
                    if (matches != null && matches[1]) {
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                // Create blob URL and open in new tab
                const blobUrl = URL.createObjectURL(blob);
                const newWindow = window.open(blobUrl, '_blank');
                
                // Clean up blob URL after window loads
                if (newWindow) {
                    newWindow.onload = () => {
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
                    };
                }
            } catch (error) {
                console.error('Error viewing document:', error);
                alert('Failed to load document. Please try again.');
            }
        }

        async function saveUserKYC() {
            if (!currentUser) return;
            
            // DC Protocol Feb 2026: Collect text field changes (includes input AND select elements)
            const updateData = {};
            document.querySelectorAll('#profileModalContent [data-field]').forEach(element => {
                const field = element.dataset.field;
                const value = element.value.trim();
                if (value) {
                    updateData[field] = value;
                }
            });
            
            // DC Protocol Feb 2026: Collect document uploads with 5MB size validation
            const docUploads = [];
            const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB limit for KYC documents
            let sizeError = null;
            
            document.querySelectorAll('#profileModalContent input[data-doctype]').forEach(input => {
                if (input.files && input.files.length > 0) {
                    const file = input.files[0];
                    if (file.size > MAX_FILE_SIZE) {
                        sizeError = `File "${file.name}" (${(file.size / 1024 / 1024).toFixed(2)}MB) exceeds 5MB limit. Please upload a smaller file.`;
                    } else {
                        docUploads.push({
                            doctype: input.dataset.doctype,
                            file: file
                        });
                    }
                }
            });
            
            if (sizeError) {
                alert(sizeError);
                return;
            }
            
            if (Object.keys(updateData).length === 0 && docUploads.length === 0) {
                alert('No changes to save. Please modify at least one field or upload a document.');
                return;
            }
            
            try {
                let success = true;
                let errorMessage = '';
                
                // Step 1: Save text field changes
                if (Object.keys(updateData).length > 0) {
                    const response = await fetch(`${API_BASE}/admin/kyc/update-user/${currentUser.user_id}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updateData)
                    });
                    
                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        success = false;
                        errorMessage = data.detail || 'Failed to update user data';
                    }
                }
                
                // Step 2: Upload documents with progress tracking
                if (docUploads.length > 0) {
                    const progressContainer = document.getElementById('uploadProgressContainer');
                    const progressBar = document.getElementById('uploadProgressBar');
                    const progressLabel = document.getElementById('uploadProgressLabel');
                    const progressPercent = document.getElementById('uploadProgressPercent');
                    const saveBtn = document.getElementById('saveBtn');
                    
                    progressContainer.style.display = 'block';
                    saveBtn.disabled = true;
                    
                    for (let i = 0; i < docUploads.length; i++) {
                        const doc = docUploads[i];
                        const docLabel = doc.doctype.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                        progressLabel.textContent = `Uploading ${docLabel} (${i + 1}/${docUploads.length})...`;
                        
                        let uploadSuccess = false;
                        let retryCount = 0;
                        const maxRetries = 3;
                        
                        while (!uploadSuccess && retryCount < maxRetries) {
                            try {
                                console.log(`[DC-KYC-UPLOAD] Uploading ${doc.doctype} (attempt ${retryCount + 1}/${maxRetries})`);
                                
                                // Use XMLHttpRequest for progress tracking
                                const result = await new Promise((resolve, reject) => {
                                    const xhr = new XMLHttpRequest();
                                    const formData = new FormData();
                                    formData.append('file', doc.file);
                                    formData.append('document_type', doc.doctype);
                                    
                                    xhr.upload.addEventListener('progress', (e) => {
                                        if (e.lengthComputable) {
                                            const percent = Math.round((e.loaded / e.total) * 100);
                                            progressBar.style.width = percent + '%';
                                            progressBar.setAttribute('aria-valuenow', percent);
                                            progressPercent.textContent = percent + '%';
                                        }
                                    });
                                    
                                    xhr.addEventListener('load', () => {
                                        resolve({ status: xhr.status, response: xhr.responseText });
                                    });
                                    
                                    xhr.addEventListener('error', () => reject(new Error('Network error')));
                                    xhr.addEventListener('timeout', () => reject(new Error('Upload timeout')));
                                    
                                    xhr.open('POST', `${API_BASE}/admin/kyc/upload-document/${currentUser.user_id}`);
                                    xhr.setRequestHeader('Authorization', `Bearer ${authToken}`);
                                    xhr.timeout = 120000; // 2 minute timeout
                                    xhr.send(formData);
                                });
                                
                                if (result.status >= 200 && result.status < 300) {
                                    uploadSuccess = true;
                                    console.log(`[DC-KYC-UPLOAD] ${doc.doctype} uploaded successfully`);
                                    progressBar.classList.remove('bg-danger');
                                    progressBar.classList.add('bg-success');
                                } else if (result.status === 502 || result.status === 503 || result.status === 504) {
                                    retryCount++;
                                    console.warn(`[DC-KYC-UPLOAD] Backend unavailable (${result.status}), retry ${retryCount}/${maxRetries}`);
                                    progressLabel.textContent = `Retrying ${docLabel} (${retryCount}/${maxRetries})...`;
                                    if (retryCount < maxRetries) {
                                        await new Promise(r => setTimeout(r, 1000 * retryCount));
                                    }
                                } else {
                                    const docError = JSON.parse(result.response || '{}');
                                    console.error(`[DC-KYC-UPLOAD] Failed ${doc.doctype}:`, docError);
                                    errorMessage += ` Failed to upload ${doc.doctype}: ${docError.detail || 'Unknown error'}.`;
                                    progressBar.classList.add('bg-danger');
                                    break;
                                }
                            } catch (networkError) {
                                retryCount++;
                                console.error(`[DC-KYC-UPLOAD] Network error (attempt ${retryCount}):`, networkError);
                                progressLabel.textContent = `Retrying ${docLabel} (${retryCount}/${maxRetries})...`;
                                if (retryCount < maxRetries) {
                                    await new Promise(r => setTimeout(r, 1000 * retryCount));
                                } else {
                                    errorMessage += ` Network error uploading ${doc.doctype}.`;
                                    progressBar.classList.add('bg-danger');
                                }
                            }
                        }
                        
                        if (!uploadSuccess && retryCount >= maxRetries) {
                            errorMessage += ` Upload ${doc.doctype} failed after ${maxRetries} attempts.`;
                        }
                        
                        // Reset progress for next file
                        if (i < docUploads.length - 1) {
                            progressBar.style.width = '0%';
                            progressBar.classList.remove('bg-success', 'bg-danger');
                        }
                    }
                    
                    // Hide progress after completion
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                        progressBar.classList.remove('bg-success', 'bg-danger');
                        saveBtn.disabled = false;
                    }, 1500);
                }
                
                if (success && !errorMessage) {
                    alert('User KYC data and documents updated successfully!');
                } else if (success && errorMessage) {
                    alert('Data saved but some documents failed: ' + errorMessage);
                } else {
                    alert('Error: ' + errorMessage);
                    return;
                }
                
                isEditMode = false;
                refreshUserAndModal(currentUser.user_id);
            } catch (error) {
                console.error('Error saving user KYC:', error);
                alert('Failed to save changes. Please try again.');
            }
        }
        
        // DC Protocol Feb 2026: Validate all fields (first-level check by staff)
        function validateAllFields() {
            if (!currentUser) return;
            
            if (!confirm('Validate ALL KYC and Bank fields for this user? This marks them as checked by staff and ready for Accounts approval.')) return;
            
            // Validate all 8 fields
            const fields = [
                'aadhaar_verified', 'pan_verified', 'document_verified',
                'account_holder_verified', 'account_number_verified',
                'ifsc_verified', 'bank_name_verified', 'branch_verified'
            ];
            
            let completedCount = 0;
            const totalFields = fields.length;
            
            fields.forEach(fieldName => {
                $.ajax({
                    url: `${API_BASE}/admin/kyc/validate-field/${currentUser.user_id}`,
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    data: JSON.stringify({
                        field_name: fieldName,
                        approved: true
                    }),
                    success: function(response) {
                        completedCount++;
                        if (completedCount === totalFields) {
                            alert('All fields validated successfully! Ready for Accounts approval.');
                            refreshUserAndModal(currentUser.user_id);
                        }
                    },
                    error: function(xhr) {
                        completedCount++;
                        console.error(`Failed to validate ${fieldName}:`, xhr);
                        if (completedCount === totalFields) {
                            alert('Some fields may have failed to validate. Please try again.');
                            refreshUserAndModal(currentUser.user_id);
                        }
                    }
                });
            });
        }
        
        function finalApproveKYC() {
            if (!currentUser) return;
            
            const allValidated = [
                currentUser.aadhaar_validated, currentUser.pan_validated, currentUser.document_validated,
                currentUser.account_holder_validated, currentUser.account_number_validated,
                currentUser.ifsc_validated, currentUser.bank_name_validated, currentUser.branch_validated
            ].every(v => v);
            
            if (!allValidated) {
                alert('All fields must be validated by staff before Final Approval can be granted.');
                return;
            }
            
            if (!confirm('Grant FINAL APPROVAL for this user\'s KYC and Bank details?\n\nThis will mark KYC Status and Bank Details Status as "Approved" and complete the 2-step verification process.')) return;
            
            $.ajax({
                url: `${API_BASE}/admin/kyc/approve-all-fields/${currentUser.user_id}`,
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                },
                success: function(response) {
                    alert('Final Approval granted successfully! KYC and Bank details are now fully approved.');
                    refreshUserAndModal(currentUser.user_id);
                },
                error: function(xhr) {
                    alert('Error: ' + (xhr.responseJSON?.detail || 'Failed to grant final approval. You may not have Accounts/VGK permissions.'));
                }
            });
        }
        
        // DC Protocol Feb 2026: Per-field validation (for individual field buttons)
        function validateField(fieldName, validated) {
            if (!currentUser) return;

            $.ajax({
                url: `${API_BASE}/admin/kyc/validate-field/${currentUser.user_id}`,
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                },
                data: JSON.stringify({
                    field_name: fieldName,
                    approved: validated
                }),
                success: function(response) {
                    refreshUserAndModal(currentUser.user_id);
                },
                error: function(xhr) {
                    alert('Error: ' + (xhr.responseJSON?.detail || 'Failed to validate field'));
                }
            });
        }
    </script>
