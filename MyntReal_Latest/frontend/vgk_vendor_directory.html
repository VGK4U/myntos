<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGK Vendor Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f5f3ff;min-height:100vh}

        .topbar{background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
        .topbar-brand{flex:1;display:flex;align-items:center;gap:10px}
        .topbar-brand-text{font-size:16px;font-weight:800}
        .topbar-brand-sub{font-size:11px;opacity:.7}
        .member-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap}
        .btn-back{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:6px}

        /* Tab nav */
        .tab-nav{background:#fff;border-bottom:2px solid #e9d5ff;display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:90}
        .tab-nav::-webkit-scrollbar{display:none}
        .tab-nav-item{padding:13px 22px;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;gap:7px;transition:color .15s}
        .tab-nav-item.active{color:#7c3aed;border-bottom-color:#7c3aed}

        /* Page content */
        .page-content{max-width:1120px;margin:0 auto;padding:20px 16px}

        /* Filter panel */
        .filter-panel{background:#fff;border-radius:14px;border:1.5px solid #e9d5ff;padding:16px 18px;margin-bottom:18px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
        .search-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box i.icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#a78bfa;font-size:14px;pointer-events:none}
        .search-box input{width:100%;border:1.5px solid #e9d5ff;border-radius:10px;padding:10px 12px 10px 38px;font-size:13px;outline:none;background:#faf8ff}
        .search-box input:focus{border-color:#7c3aed;background:#fff}
        .pin-box{width:120px;border:1.5px solid #e9d5ff;border-radius:10px;padding:10px 12px;font-size:13px;outline:none;background:#faf8ff}
        .pin-box:focus{border-color:#7c3aed;background:#fff}
        .filter-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
        .sort-select{border:1.5px solid #e9d5ff;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;color:#374151;background:#faf8ff;outline:none;cursor:pointer}
        .sort-select:focus{border-color:#7c3aed}
        .result-count-badge{background:#f5f3ff;color:#7c3aed;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;margin-left:auto}

        /* Category chips */
        .cat-chips-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
        .cat-chip{border:1.5px solid #e9d5ff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:#faf8ff;color:#374151;display:flex;align-items:center;gap:5px}
        .cat-chip.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
        .cat-chip:hover:not(.active){border-color:#a78bfa;color:#4c1d95}

        /* Vendor grid */
        .vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
        @media(max-width:640px){.vendor-grid{grid-template-columns:1fr}}

        /* Vendor card */
        .v-card{background:#fff;border-radius:16px;border:1.5px solid #e9d5ff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
        .v-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(124,58,237,.12);border-color:#c4b5fd}

        /* Banner */
        .v-banner-wrap{position:relative;width:100%;height:120px;overflow:hidden;background:linear-gradient(135deg,#ede9fe,#ddd6fe);display:flex;align-items:center;justify-content:center}
        .v-banner-img{width:100%;height:100%;object-fit:cover;display:block}
        .v-banner-placeholder{font-size:36px;color:#c4b5fd;opacity:.6}
        .v-discount-ribbon{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#059669,#047857);color:#fff;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.18);text-align:center;line-height:1.3}

        /* Card body */
        .v-body{padding:14px 16px 12px;flex:1;display:flex;flex-direction:column;gap:0}
        .v-header-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
        .v-logo-wrap{width:50px;height:50px;border-radius:13px;border:2px solid #e9d5ff;flex-shrink:0;overflow:hidden;background:#f5f3ff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#7c3aed;margin-top:-32px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
        .v-logo-wrap img{width:100%;height:100%;object-fit:cover}
        .v-name{font-size:15px;font-weight:800;color:#111;line-height:1.3;margin-bottom:3px}
        .v-cat{display:inline-flex;align-items:center;gap:5px;background:#f5f3ff;color:#7c3aed;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
        .v-info-list{font-size:12px;color:#6b7280;display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
        .v-info-row{display:flex;align-items:flex-start;gap:7px}
        .v-info-row i{color:#a78bfa;width:14px;text-align:center;flex-shrink:0;margin-top:1px}
        .v-prod-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
        .v-pcat{background:#ecfdf5;color:#065f46;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}

        /* Action buttons */
        .v-actions{display:flex;gap:7px;margin-top:auto}
        .v-btn-primary{flex:1;background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
        .v-btn-primary:hover{opacity:.88}
        .v-btn-icon{background:#f5f3ff;color:#7c3aed;border:1.5px solid #e9d5ff;border-radius:9px;padding:9px 12px;font-size:14px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:background .15s}
        .v-btn-icon:hover{background:#ede9fe}

        /* Empty / loading */
        .empty-state{text-align:center;padding:60px 20px;grid-column:1/-1}
        .empty-state i{font-size:54px;opacity:.25;display:block;margin-bottom:14px}
        .empty-state p{font-size:14px;color:#6b7280}

        /* Load more */
        .load-more-wrap{text-align:center;margin:22px 0}
        .btn-load-more{background:#fff;border:1.5px solid #e9d5ff;border-radius:10px;padding:10px 28px;font-size:13px;font-weight:700;color:#7c3aed;cursor:pointer}
        .btn-load-more:hover{background:#f5f3ff;border-color:#c4b5fd}

        /* My Transactions tab */
        .txn-card{background:#fff;border-radius:14px;border:1.5px solid #e9d5ff;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05)}
        .txn-card-header{padding:16px 18px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .wallet-badge{background:linear-gradient(135deg,#059669,#047857);color:#fff;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
        .txn-filter-sel{border:1.5px solid #e9d5ff;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:600;outline:none;color:#374151;background:#faf8ff;cursor:pointer;margin-left:auto}
        .txn-wrap{overflow-x:auto}
        .txn-table{width:100%;border-collapse:collapse;font-size:13px}
        .txn-table th{background:#f5f3ff;padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:#6b7280;font-weight:700;letter-spacing:.05em;border-bottom:2px solid #e9d5ff;white-space:nowrap}
        .txn-table td{padding:10px 12px;border-bottom:1px solid #f9f9f9;vertical-align:middle}
        .txn-table tr:hover td{background:#fafafa}
        .badge{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700}
        .badge-pending{background:#fef3c7;color:#92400e}
        .badge-approved{background:#d1fae5;color:#065f46}
        .badge-rejected{background:#fee2e2;color:#991b1b}
        .cashback-pill{background:#d1fae5;color:#059669;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700}

        /* Purchase modal */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
        .modal-handle{width:42px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 18px}
        .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .modal-title{font-size:16px;font-weight:800;color:#111}
        .modal-close{background:none;border:none;font-size:22px;color:#9ca3af;cursor:pointer;line-height:1}
        .form-group{margin-bottom:14px}
        .form-group label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
        .form-group input,.form-group select{width:100%;border:1.5px solid #e9d5ff;border-radius:10px;padding:10px 12px;font-size:13px;outline:none;background:#faf8ff}
        .form-group input:focus,.form-group select:focus{border-color:#7c3aed;background:#fff}
        .discount-preview{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1.5px solid #6ee7b7;border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;display:none}
        .discount-preview-amt{font-size:28px;font-weight:800;color:#059669}
        .discount-preview-sub{font-size:12px;color:#065f46;margin-top:3px}
        .btn-submit{background:linear-gradient(135deg,#4c1d95,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-cancel-modal{background:#f3f4f6;color:#374151;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
        .alert{border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:12px}
        .alert-success{background:#d1fae5;color:#065f46}
        .alert-error{background:#fee2e2;color:#991b1b}
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-brand">
        <i class="fas fa-store-alt" style="font-size:20px"></i>
        <div>
            <div class="topbar-brand-text">VGK Vendor Directory</div>
            <div class="topbar-brand-sub">Empanelled Shops — Member Cashback</div>
        </div>
    </div>
    <span class="member-pill" id="memberCode">—</span>
    <a href="/vgk/dashboard" class="btn-back"><i class="fas fa-home"></i>Dashboard</a>
</div>

<!-- Tab nav -->
<div class="tab-nav">
    <div class="tab-nav-item active" id="tnav-browse" onclick="switchTab('browse')"><i class="fas fa-store"></i>Browse Shops</div>
    <div class="tab-nav-item" id="tnav-txns" onclick="switchTab('txns')"><i class="fas fa-receipt"></i>My Transactions</div>
</div>

<!-- ── BROWSE TAB ── -->
<div id="tab-browse" class="page-content">

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="search-row">
            <div class="search-box">
                <i class="fas fa-search icon"></i>
                <input type="text" id="searchInput" placeholder="Search shop name, product, city…" oninput="debounce()">
            </div>
            <input type="text" id="pinInput" class="pin-box" placeholder="Pincode" oninput="debounce()">
        </div>
        <div class="filter-controls">
            <i class="fas fa-sort-amount-down" style="color:#a78bfa;font-size:13px"></i>
            <span style="font-size:12px;font-weight:700;color:#6b7280">Sort:</span>
            <select class="sort-select" id="sortSel" onchange="load(true)">
                <option value="name">Name A–Z</option>
                <option value="discount">Highest Cashback</option>
                <option value="newest">Newest First</option>
                <option value="city">By City</option>
            </select>
            <div class="result-count-badge" id="resultCount" style="display:none"></div>
        </div>
        <div class="cat-chips-row" id="catChips"></div>
    </div>

    <!-- Grid -->
    <div class="vendor-grid" id="vendorGrid">
        <div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;color:#7c3aed"></i><p>Loading shops…</p></div>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap"></div>
</div>

<!-- ── MY TRANSACTIONS TAB ── -->
<div id="tab-txns" class="page-content" style="display:none">
    <div class="txn-card">
        <div class="txn-card-header">
            <div class="wallet-badge" id="walletBadge"><i class="fas fa-wallet"></i>VGK Wallet: <strong id="walletAmt">Loading…</strong></div>
            <select class="txn-filter-sel" id="txnFilter" onchange="loadTxns(true)">
                <option value="">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
                <option value="REJECTED">Rejected</option>
            </select>
        </div>
        <div class="txn-wrap">
            <table class="txn-table">
                <thead>
                    <tr><th>Date</th><th>Shop</th><th>Invoice</th><th>Amount</th><th>Cashback</th><th>Wallet Used</th><th>Status</th></tr>
                </thead>
                <tbody id="txnBody">
                    <tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af"><i class="fas fa-spinner fa-spin me-2"></i>Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="load-more-wrap" id="txnLoadMore"></div>
    </div>
</div>

<!-- ── SUBMIT PURCHASE MODAL ── -->
<div class="modal-overlay" id="purchaseModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title" id="modalVendorTitle">Submit Purchase</div>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <!-- Vendor mini info inside modal -->
        <div id="modalVendorInfo" style="background:#f5f3ff;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#374151;display:flex;align-items:center;gap:12px"></div>
        <div id="purchaseAlert"></div>
        <div class="form-group">
            <label>Product Category</label>
            <select id="m_cat" onchange="calcDisc()"></select>
        </div>
        <div class="form-group">
            <label>Invoice Number *</label>
            <input type="text" id="m_inv" placeholder="INV-2026-001">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
                <label>Amount Excl. Tax (₹) *</label>
                <input type="number" id="m_excl" inputmode="decimal" step="0.01" placeholder="0.00" oninput="calcDisc()">
            </div>
            <div class="form-group">
                <label>Total with GST (₹)</label>
                <input type="number" id="m_total" inputmode="decimal" step="0.01" placeholder="Auto">
            </div>
        </div>
        <div class="discount-preview" id="discPreview">
            <div class="discount-preview-amt" id="discAmt">₹0</div>
            <div class="discount-preview-sub" id="discSub">Estimated cashback — credited on Accounts approval</div>
        </div>
        <div class="form-group">
            <label>Pay from VGK Wallet (₹) <span id="walletAvailNote" style="font-weight:400;color:#9ca3af;text-transform:none"></span></label>
            <input type="number" id="m_wallet" inputmode="decimal" step="0.01" min="0" placeholder="0.00 (optional)">
        </div>
        <div class="form-group">
            <label>Invoice Photo URL (optional)</label>
            <input type="url" id="m_img" placeholder="https://drive.google.com/…">
        </div>
        <button class="btn-submit" id="submitBtn" onclick="submitPurchase()"><i class="fas fa-paper-plane"></i>Submit Purchase</button>
        <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
const API = '/api/v1';
let _token = localStorage.getItem('vgk_token') || localStorage.getItem('access_token') || '';
let _cats = [];
let _activeCat = null;
let _page = 1;
let _total = 0;
let _dbTimer = null;
let _curVendor = null;
let _walletBal = 0;
let _txnPage = 1;

function authH() { return { 'Content-Type':'application/json','Authorization':'Bearer '+_token }; }
function fmt(n) { return '₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ─── Init ───────────────────────────────────────────────── */
async function init() {
    if (!_token) { window.location.href='/vgk/login?next='+encodeURIComponent(location.href); return; }
    try {
        const r = await fetch(`${API}/vgk/member/wallet`, { headers: authH() });
        if (r.ok) {
            const d = await r.json();
            _walletBal = parseFloat(d.wallet_balance||0);
            document.getElementById('memberCode').textContent = d.partner_code || 'Member';
            document.getElementById('walletAmt').textContent = fmt(_walletBal);
            document.getElementById('walletBadge').querySelector('strong').textContent = fmt(_walletBal);
        }
    } catch(e) {}
    await loadCats();
    load(true);
}

/* ─── Categories ─────────────────────────────────────────── */
async function loadCats() {
    try {
        const r = await fetch(`${API}/vgk/vendor/directory/categories`, { headers: authH() });
        if (!r.ok) return;
        const d = await r.json();
        _cats = d.categories || d || [];
        const el = document.getElementById('catChips');
        el.innerHTML = `<button class="cat-chip active" onclick="setCat(null,this)"><i class="fas fa-th-large"></i>All</button>` +
            _cats.map(c => `<button class="cat-chip" onclick="setCat(${c.id||c.category_id||0},this)">
                ${c.icon?`<i class="${esc(c.icon)}"></i>`:''}${esc(c.category_name||c.name||'')}</button>`).join('');
    } catch(e) {}
}

function setCat(id, btn) {
    _activeCat = id;
    document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load(true);
}

function debounce() { clearTimeout(_dbTimer); _dbTimer = setTimeout(()=>load(true), 350); }

/* ─── Load vendors ───────────────────────────────────────── */
async function load(reset) {
    if (reset) _page = 1;
    const search = document.getElementById('searchInput').value.trim();
    const pin    = document.getElementById('pinInput').value.trim();
    const sort   = document.getElementById('sortSel').value;
    const params = new URLSearchParams({ page: _page, per_page: 12, sort_by: sort });
    if (_activeCat) params.set('category_id', _activeCat);
    if (search) params.set('search', search);
    if (pin) params.set('pincode', pin);

    const grid = document.getElementById('vendorGrid');
    if (reset) grid.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin" style="opacity:1;color:#7c3aed"></i><p>Loading…</p></div>`;

    try {
        const r = await fetch(`${API}/vgk/vendor/directory?${params}`, { headers: authH() });
        if (!r.ok) throw new Error('Failed');
        const d = await r.json();
        const vendors = d.vendors || d.data || [];
        _total = d.total || 0;

        // Result count
        const rcEl = document.getElementById('resultCount');
        if (_total > 0) { rcEl.textContent = `${_total} shop${_total>1?'s':''} found`; rcEl.style.display=''; }
        else rcEl.style.display='none';

        if (reset) grid.innerHTML = '';
        if (!vendors.length && reset) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-store-slash"></i><p>No shops found.<br>Try a different search, category, or pincode.</p></div>`;
        } else {
            vendors.forEach(v => grid.insertAdjacentHTML('beforeend', vendorCard(v)));
        }
        const lmw = document.getElementById('loadMoreWrap');
        const shown = _page * 12;
        if (shown < _total) {
            lmw.innerHTML = `<button class="btn-load-more" onclick="loadMore()"><i class="fas fa-chevron-down me-1"></i>Show more shops (${_total-shown} remaining)</button>`;
        } else { lmw.innerHTML = _total>0 ? `<p style="text-align:center;font-size:12px;color:#9ca3af;margin:8px 0">All ${_total} shops shown</p>` : ''; }
    } catch(e) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle" style="color:#dc2626;opacity:.6"></i><p>Failed to load shops. Please refresh.</p></div>`;
    }
}

function loadMore() { _page++; load(false); }

/* ─── Vendor card HTML ───────────────────────────────────── */
function vendorCard(v) {
    const discPct = parseFloat(v.flat_discount_pct||0);
    const addr = [v.address_line1, v.city, v.pincode].filter(Boolean).join(', ');
    const initial = (v.vendor_name||'?')[0].toUpperCase();

    // Banner
    const bannerHtml = v.banner_url
        ? `<img class="v-banner-img" src="${esc(v.banner_url)}" alt="Banner" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="v-banner-placeholder"><i class="fas fa-store"></i></div>`;

    // Logo
    const logoHtml = v.logo_url
        ? `<img src="${esc(v.logo_url)}" alt="${esc(v.vendor_name)}" loading="lazy" onerror="this.innerHTML='${initial}';this.src=''">`
        : initial;

    // Product category pills (max 3)
    const pcats = (v.product_categories||[]).slice(0,3).map(pc =>
        `<span class="v-pcat">${esc(pc.category_name)}${pc.discount_pct>0?' — '+pc.discount_pct+'%':''}</span>`
    ).join('');

    // Action icons
    const waBtn  = v.whatsapp_number ? `<a href="https://wa.me/91${v.whatsapp_number}" target="_blank" onclick="event.stopPropagation()" class="v-btn-icon" title="WhatsApp"><i class="fab fa-whatsapp" style="color:#25d366"></i></a>` : '';
    const telBtn = v.phone ? `<a href="tel:${v.phone}" onclick="event.stopPropagation()" class="v-btn-icon" title="Call"><i class="fas fa-phone"></i></a>` : '';
    const mapBtn = v.map_link ? `<a href="${esc(v.map_link)}" target="_blank" onclick="event.stopPropagation()" class="v-btn-icon" title="Map"><i class="fas fa-directions"></i></a>` : '';

    return `
    <div class="v-card" onclick="openVendor('${esc(v.qr_token||'')}')">
        <div class="v-banner-wrap">
            ${bannerHtml}
            ${discPct>0?`<div class="v-discount-ribbon">${discPct}%<br><span style="font-size:9px;font-weight:500;opacity:.9">CASHBACK</span></div>`:''}
        </div>
        <div class="v-body">
            <div class="v-header-row">
                <div class="v-logo-wrap">${logoHtml}</div>
                <div style="flex:1;min-width:0;padding-top:4px">
                    <div class="v-name">${esc(v.vendor_name)}</div>
                    ${v.category_name?`<span class="v-cat"><i class="fas fa-tag" style="font-size:9px"></i>${esc(v.category_name)}</span>`:''}
                </div>
            </div>
            <div class="v-info-list">
                ${addr?`<div class="v-info-row"><i class="fas fa-map-marker-alt"></i><span>${esc(addr)}</span></div>`:''}
                ${v.phone?`<div class="v-info-row"><i class="fas fa-phone"></i><span>${esc(v.phone)}</span></div>`:''}
                ${v.shop_description?`<div class="v-info-row"><i class="fas fa-align-left"></i><span style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(v.shop_description)}</span></div>`:''}
            </div>
            ${pcats?`<div class="v-prod-cats">${pcats}</div>`:''}
            <div class="v-actions">
                <button class="v-btn-primary"><i class="fas fa-store"></i>View &amp; Purchase</button>
                ${waBtn}${telBtn}${mapBtn}
            </div>
        </div>
    </div>`;
}

function openVendor(qrToken) {
    if (qrToken) window.location.href = '/vendor/scan/' + qrToken;
}

/* ─── My Transactions ────────────────────────────────────── */
async function loadTxns(reset) {
    if (reset) _txnPage = 1;
    const status = document.getElementById('txnFilter').value;
    let url = `${API}/vgk/vendor/transactions?page=${_txnPage}&per_page=20`;
    if (status) url += `&status=${status}`;
    const body = document.getElementById('txnBody');
    if (reset) body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:#9ca3af"><i class="fas fa-spinner fa-spin me-2"></i>Loading…</td></tr>`;
    try {
        const r = await fetch(url, { headers: authH() });
        const d = r.ok ? await r.json() : {};
        const rows = d.transactions || d.data || [];
        if (reset) body.innerHTML = '';
        if (!rows.length && reset) {
            body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af"><i class="fas fa-receipt fa-2x" style="display:block;margin-bottom:10px;opacity:.3"></i>No transactions yet.</td></tr>`;
        } else {
            rows.forEach(t => {
                const sc = t.status==='APPROVED'?'badge-approved':t.status==='REJECTED'?'badge-rejected':'badge-pending';
                body.insertAdjacentHTML('beforeend', `<tr>
                    <td style="white-space:nowrap;color:#6b7280">${(t.created_at||'').slice(0,10)}</td>
                    <td style="font-weight:700">${esc(t.vendor_name||'—')}</td>
                    <td><code style="font-size:11px;background:#f5f3ff;padding:2px 6px;border-radius:4px">${esc(t.invoice_number||'—')}</code></td>
                    <td style="font-weight:600">${fmt(t.amount_total)}</td>
                    <td>${parseFloat(t.discount_amount||0)>0?`<span class="cashback-pill">+${fmt(t.discount_amount)}</span>`:'—'}</td>
                    <td>${parseFloat(t.wallet_used_amount||0)>0?fmt(t.wallet_used_amount):'—'}</td>
                    <td><span class="badge ${sc}">${t.status||'PENDING'}</span></td>
                </tr>`);
            });
        }
        const lm = document.getElementById('txnLoadMore');
        if ((d.total||0) > _txnPage*20) {
            lm.innerHTML = `<button class="btn-load-more" onclick="_txnPage++;loadTxns(false)">Load more</button>`;
        } else lm.innerHTML = '';
    } catch(e) {
        body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:#dc2626">Failed to load.</td></tr>`;
    }
}

/* ─── Purchase modal ─────────────────────────────────────── */
function openPurchaseModal(v) {
    _curVendor = v;
    document.getElementById('modalVendorTitle').textContent = v.vendor_name || 'Submit Purchase';
    document.getElementById('purchaseAlert').innerHTML = '';
    document.getElementById('m_inv').value = '';
    document.getElementById('m_excl').value = '';
    document.getElementById('m_total').value = '';
    document.getElementById('m_wallet').value = '';
    document.getElementById('m_img').value = '';
    document.getElementById('discPreview').style.display = 'none';
    document.getElementById('walletAvailNote').textContent = `Available: ${fmt(_walletBal)}`;

    // Mini vendor info
    const logo = v.logo_url ? `<img src="${esc(v.logo_url)}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;border:1.5px solid #e9d5ff" onerror="this.style.display='none'">` : `<div style="width:36px;height:36px;border-radius:8px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#7c3aed">${(v.vendor_name||'?')[0].toUpperCase()}</div>`;
    document.getElementById('modalVendorInfo').innerHTML = `${logo}<div><div style="font-weight:700;font-size:13px">${esc(v.vendor_name)}</div><div style="color:#7c3aed;font-size:12px;font-weight:700">${parseFloat(v.flat_discount_pct||0)}% Cashback</div></div>`;

    // Category dropdown
    const catSel = document.getElementById('m_cat');
    catSel.innerHTML = `<option value="" data-disc="${v.flat_discount_pct||0}">General (${v.flat_discount_pct||0}% cashback)</option>` +
        (v.product_categories||[]).map(pc =>
            `<option value="${pc.id}" data-disc="${pc.discount_pct}">${esc(pc.category_name)} (${pc.discount_pct}% off)</option>`
        ).join('');

    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i>Submit Purchase';
    document.getElementById('purchaseModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('purchaseModal').classList.remove('show');
    document.body.style.overflow = '';
}

function calcDisc() {
    const amt = parseFloat(document.getElementById('m_excl').value||0);
    const sel = document.getElementById('m_cat');
    const disc = parseFloat(sel.options[sel.selectedIndex]?.dataset?.disc||0);
    const prev = document.getElementById('discPreview');
    if (amt > 0 && disc > 0) {
        document.getElementById('discAmt').textContent = fmt((amt*disc/100).toFixed(2));
        document.getElementById('discSub').textContent = `${disc}% of ₹${amt.toLocaleString('en-IN')} — credited on Accounts approval`;
        prev.style.display = '';
    } else prev.style.display = 'none';
}

async function submitPurchase() {
    const alertEl = document.getElementById('purchaseAlert');
    const inv = document.getElementById('m_inv').value.trim();
    const excl = parseFloat(document.getElementById('m_excl').value||0);
    const total = parseFloat(document.getElementById('m_total').value||0)||excl;
    const wallet = parseFloat(document.getElementById('m_wallet').value||0);
    const img = document.getElementById('m_img').value.trim();
    const catSel = document.getElementById('m_cat');
    const catId = catSel.value ? parseInt(catSel.value) : null;
    if (!inv){ alertEl.innerHTML='<div class="alert alert-error">Invoice number required.</div>'; return; }
    if (excl<=0){ alertEl.innerHTML='<div class="alert alert-error">Amount excluding tax required.</div>'; return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>Submitting…';
    try {
        const r = await fetch(`${API}/vgk/vendor/transaction`, {
            method:'POST', headers:authH(),
            body: JSON.stringify({ vendor_id:_curVendor.id, product_category_id:catId,
                invoice_number:inv, amount_excl_tax:excl, amount_total:total,
                wallet_used_amount:wallet, invoice_image_url:img||null })
        });
        const d = await r.json();
        if (r.ok && d.success) {
            alertEl.innerHTML = `<div class="alert alert-success">✅ <strong>Submitted!</strong> TXN: <code>${d.txn_number}</code><br>Cashback: <strong>${fmt(d.discount_amount)}</strong> — pending Accounts approval</div>`;
            ['m_inv','m_excl','m_total','m_wallet','m_img'].forEach(id=>document.getElementById(id).value='');
            document.getElementById('discPreview').style.display='none';
            btn.innerHTML='<i class="fas fa-paper-plane"></i>Submit Another';
        } else {
            alertEl.innerHTML=`<div class="alert alert-error">${d.detail||'Submission failed.'}</div>`;
            btn.innerHTML='<i class="fas fa-paper-plane"></i>Submit Purchase';
        }
    } catch(e){ alertEl.innerHTML='<div class="alert alert-error">Connection error.</div>'; btn.innerHTML='<i class="fas fa-paper-plane"></i>Submit Purchase'; }
    btn.disabled=false;
}

/* ─── Tab switching ──────────────────────────────────────── */
function switchTab(name) {
    document.getElementById('tab-browse').style.display = name==='browse' ? '' : 'none';
    document.getElementById('tab-txns').style.display   = name==='txns'   ? '' : 'none';
    document.getElementById('tnav-browse').className = 'tab-nav-item'+(name==='browse'?' active':'');
    document.getElementById('tnav-txns').className   = 'tab-nav-item'+(name==='txns'?' active':'');
    if (name==='txns') loadTxns(true);
}

// Close modal on backdrop
document.getElementById('purchaseModal').addEventListener('click',function(e){ if(e.target===this)closeModal(); });

init();
</script>
