<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Videos - MNR Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; min-height: 100vh; }

        .content-area { padding: 24px; }

        /* Page header */
        .page-header { margin-bottom: 20px; }
        .page-header h1 { font-size: 22px; font-weight: 700; color: #1f2937; margin: 0; }
        .page-header p { font-size: 13px; color: #6b7280; margin: 4px 0 0 0; }

        /* Progress banner */
        .progress-banner { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 16px 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
        .progress-stat { text-align: center; }
        .progress-stat .value { font-size: 26px; font-weight: 700; color: #1f2937; }
        .progress-stat .label { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .progress-stat .value.done  { color: #10b981; }
        .progress-stat .value.total { color: #3b82f6; }
        .progress-divider { width: 1px; height: 38px; background: #e5e7eb; }
        .progress-bar-wrap { flex: 1; min-width: 200px; }
        .progress-bar-wrap .bar-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .grace-badge  { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .exempt-badge { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .complete-banner { background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 12px; padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: #065f46; font-weight: 600; }

        /* Admin tabs (minimal) */
        .tab-bar { display: flex; gap: 4px; background: white; border-radius: 10px; padding: 5px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 20px; width: fit-content; }
        .tab-btn { padding: 7px 18px; border-radius: 7px; border: none; background: transparent; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #2563eb; color: white; font-weight: 600; }
        .tab-btn:hover:not(.active) { background: #f3f4f6; color: #374151; }

        /* ── Media-Hub two-panel layout ── */
        .media-layout { display: flex; gap: 20px; align-items: flex-start; }

        /* Left filter panel */
        .filter-panel { width: 220px; flex-shrink: 0; background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
        .filter-panel-title { padding: 14px 16px 10px; font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid #f3f4f6; }
        .filter-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; transition: background .15s; border-left: 3px solid transparent; }
        .filter-item:hover { background: #f9fafb; }
        .filter-item.active { background: #eff6ff; border-left-color: #2563eb; }
        .filter-item .fi-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
        .filter-item .fi-icon.all      { background: #eff6ff; color: #2563eb; }
        .filter-item .fi-icon.pending  { background: #fefce8; color: #ca8a04; }
        .filter-item .fi-icon.done     { background: #f0fdf4; color: #16a34a; }
        .filter-item .fi-label { font-size: 13px; font-weight: 500; color: #374151; flex: 1; }
        .filter-item.active .fi-label { color: #1d4ed8; font-weight: 600; }
        .filter-count { font-size: 11px; font-weight: 700; color: #9ca3af; background: #f3f4f6; border-radius: 12px; padding: 2px 8px; }
        .filter-item.active .filter-count { background: #dbeafe; color: #2563eb; }

        /* Right video list */
        .video-list { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }

        /* Individual video item */
        .video-item { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; transition: box-shadow .2s; border-left: 3px solid transparent; }
        .video-item:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .video-item.completed { border-left-color: #10b981; }
        .video-item.expanded  { box-shadow: 0 4px 16px rgba(0,0,0,.12); }

        /* Card top row: thumbnail + content */
        .video-item-row { display: flex; gap: 0; align-items: stretch; }

        /* Thumbnail */
        .video-thumb-wrap { position: relative; width: 200px; flex-shrink: 0; cursor: pointer; overflow: hidden; background: #000; border-radius: 0; }
        .video-thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 113px; transition: transform .3s; }
        .video-thumb-wrap:hover .video-thumb-img { transform: scale(1.04); }
        .video-thumb-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.3); transition: background .2s; }
        .video-thumb-wrap:hover .video-thumb-overlay { background: rgba(0,0,0,.45); }
        .play-btn-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.92); display: flex; align-items: center; justify-content: center; color: #1f2937; font-size: 16px; padding-left: 3px; box-shadow: 0 2px 8px rgba(0,0,0,.25); transition: transform .2s; }
        .video-thumb-wrap:hover .play-btn-circle { transform: scale(1.1); }
        .done-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(16,185,129,.18); }
        .done-check { width: 40px; height: 40px; border-radius: 50%; background: #10b981; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
        .thumb-num-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.65); color: white; border-radius: 5px; padding: 2px 7px; font-size: 11px; font-weight: 700; }

        /* Content area of card */
        .video-item-content { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; gap: 6px; justify-content: center; min-width: 0; }
        .video-type-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: #2563eb; }
        .video-type-badge.short { color: #7c3aed; }
        .video-item-title { font-size: 15px; font-weight: 700; color: #111827; line-height: 1.4; }
        .video-item-meta  { font-size: 12px; color: #6b7280; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .video-item-meta .meta-pill { display: flex; align-items: center; gap: 4px; }
        .video-item-actions { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }

        .btn-watch { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 7px; border: 1.5px solid #2563eb; background: white; color: #2563eb; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
        .btn-watch:hover { background: #2563eb; color: white; }
        .btn-watch.watching { background: #2563eb; color: white; }

        .btn-mark-complete { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 7px; border: none; background: #10b981; color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
        .btn-mark-complete:hover    { background: #059669; }
        .btn-mark-complete:disabled { background: #6ee7b7; cursor: not-allowed; }

        .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .status-pill.done    { background: #d1fae5; color: #065f46; }
        .status-pill.pending { background: #fef3c7; color: #92400e; }

        .auto-note { font-size: 11px; color: #9ca3af; display: flex; align-items: center; gap: 4px; }

        /* Expanded player area */
        .video-player-area { display: none; border-top: 1px solid #f3f4f6; background: #000; }
        .video-player-area.open { display: block; }
        .video-player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; }
        .video-player-wrap.shorts-ratio { padding-bottom: 177.78%; max-width: 360px; margin: 0 auto; }
        .video-player-wrap iframe,
        .video-player-wrap .yt-player-div { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Admin section */
        .admin-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; justify-content: space-between; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 16px; text-align: center; }
        .stat-card .sv { font-size: 24px; font-weight: 700; color: #1f2937; }
        .stat-card .sl { font-size: 12px; color: #6b7280; margin-top: 3px; }
        .stat-card.green .sv { color: #10b981; }
        .stat-card.blue  .sv { color: #3b82f6; }
        .stat-card.amber .sv { color: #f59e0b; }
        .table-container { background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
        .data-table td { padding: 12px 16px; font-size: 13px; color: #374151; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #f9fafb; }
        .badge-complete { background: #d1fae5; color: #065f46; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
        .badge-pending  { background: #fef3c7; color: #92400e; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
        .badge-exempt   { background: #ede9fe; color: #6d28d9; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
        .badge-grace    { background: #dbeafe; color: #1d4ed8; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
        .progress-mini { height: 6px; border-radius: 3px; background: #e5e7eb; overflow: hidden; width: 80px; display: inline-block; vertical-align: middle; margin-left: 6px; }
        .progress-mini-fill { height: 100%; border-radius: 3px; background: #10b981; }

        .btn-action { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; }
        .btn-sync   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .btn-sync:hover   { background: #dbeafe; }
        .btn-export { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn-export:hover { background: #dcfce7; }

        .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; flex-direction: column; gap: 12px; color: #9ca3af; }
        .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; }

        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast-msg { background: #1f2937; color: white; border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideIn .3s ease; max-width: 320px; }
        .toast-msg.success { background: #065f46; border-left: 4px solid #10b981; }
        .toast-msg.error   { background: #7f1d1d; border-left: 4px solid #ef4444; }
        @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .media-layout { flex-direction: column; }
            .filter-panel { width: 100%; display: flex; overflow-x: auto; gap: 0; border-radius: 10px; }
            .filter-panel-title { display: none; }
            .filter-item { flex-direction: column; gap: 4px; padding: 12px 14px; min-width: 80px; border-left: none; border-bottom: 3px solid transparent; }
            .filter-item.active { border-left-color: transparent; border-bottom-color: #2563eb; }
            .video-thumb-wrap { width: 120px; min-height: 80px; }
            .video-item-content { padding: 12px 14px; }
            .content-area { padding: 14px; }
        }
    </style>
</head>
<body>
<div id="staffSidebar"></div>
<div class="main-content-wrapper">
    <div id="staffHeader"></div>
    <div class="content-area">
        <div id="staffBackButton"></div>

        <div class="page-header">
            <h1><i class="fas fa-play-circle text-primary me-2"></i>Training Videos</h1>
            <p>Complete all mandatory training videos to unlock full platform access.</p>
        </div>

        <div id="progressBanner"></div>

        <div id="tabBar" class="tab-bar" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('my-training')">
                <i class="fas fa-graduation-cap me-1"></i> My Training
            </button>
            <button class="tab-btn" id="adminTabBtn" onclick="switchTab('team-progress')" style="display:none;">
                <i class="fas fa-users me-1"></i> Team Progress
            </button>
        </div>

        <div id="tab-my-training">
            <div class="media-layout">
                <!-- Left filter panel -->
                <div class="filter-panel" id="filterPanel" style="display:none;">
                    <div class="filter-panel-title">Filter</div>
                    <div class="filter-item active" onclick="setFilter('all')" id="filter-all">
                        <div class="fi-icon all"><i class="fas fa-play-circle"></i></div>
                        <span class="fi-label">All Videos</span>
                        <span class="filter-count" id="cnt-all">0</span>
                    </div>
                    <div class="filter-item" onclick="setFilter('pending')" id="filter-pending">
                        <div class="fi-icon pending"><i class="fas fa-clock"></i></div>
                        <span class="fi-label">Pending</span>
                        <span class="filter-count" id="cnt-pending">0</span>
                    </div>
                    <div class="filter-item" onclick="setFilter('completed')" id="filter-completed">
                        <div class="fi-icon done"><i class="fas fa-check-circle"></i></div>
                        <span class="fi-label">Completed</span>
                        <span class="filter-count" id="cnt-completed">0</span>
                    </div>
                </div>

                <!-- Right video list -->
                <div class="video-list" id="videoContainer">
                    <div class="loading-state"><div class="spinner"></div><span>Loading training videos…</span></div>
                </div>
            </div>
        </div>

        <div id="tab-team-progress" style="display:none;">
            <div class="admin-toolbar">
                <div class="admin-stats" id="adminStats" style="flex:1;"></div>
                <div style="display:flex;gap:8px;align-items:flex-start;flex-shrink:0;">
                    <button class="btn-action btn-sync" onclick="triggerSync()">
                        <i class="fas fa-sync-alt" id="syncIcon"></i> Sync from Google Doc
                    </button>
                    <a href="/api/v1/staff/accounts/training/admin/export.csv" class="btn-action btn-export" id="exportBtn">
                        <i class="fas fa-download"></i> Export CSV
                    </a>
                </div>
            </div>
            <div class="table-container">
                <div id="adminTableWrap">
                    <div class="loading-state"><div class="spinner"></div><span>Loading team data…</span></div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="/staff_sidebar.js"></script>
<script src="/staff_header.js"></script>
<script src="/staff_backbutton.js"></script>
<script src="/staff-common.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let ytApiReady     = false;
let videosData     = [];
let ytPlayers      = {};
let completedIds   = new Set();
let trainingStatus = null;
let isAdmin        = false;
let activeFilter   = 'all';
let expandedId     = null;
const API_BASE     = '/api/v1/staff/accounts';

// ─── YouTube IFrame API callback ──────────────────────────────────────────────
function onYouTubeIframeAPIReady() {
    ytApiReady = true;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const c  = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast-msg ${type}`;
    el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-my-training').style.display   = 'none';
    document.getElementById('tab-team-progress').style.display = 'none';
    if (tab === 'my-training') {
        document.querySelector('.tab-btn:first-child').classList.add('active');
        document.getElementById('tab-my-training').style.display = 'block';
    } else {
        document.getElementById('adminTabBtn').classList.add('active');
        document.getElementById('tab-team-progress').style.display = 'block';
        loadAdminData();
    }
}

// ─── Filter ───────────────────────────────────────────────────────────────────
function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`filter-${f}`);
    if (el) el.classList.add('active');
    renderVideos();
}

// ─── Auth helper ──────────────────────────────────────────────────────────────
function authHeaders() {
    const token = localStorage.getItem('staff_token');
    return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : {};
}

// ─── Load training status ─────────────────────────────────────────────────────
async function loadStatus() {
    try {
        const r = await fetch(`${API_BASE}/training/status`, { headers: authHeaders() });
        if (!r.ok) return;
        trainingStatus = await r.json();
        renderProgressBanner();
    } catch(e) { console.warn('[Training] Status load failed', e); }
}

function renderProgressBanner() {
    if (!trainingStatus) return;
    const { is_exempt, grace_active, grace_until, is_complete,
            completed_count, total_count, percent_done } = trainingStatus;
    const wrap = document.getElementById('progressBanner');

    if (is_exempt) {
        wrap.innerHTML = `<div class="exempt-badge mb-3"><i class="fas fa-shield-alt"></i> Training Exempt — full platform access granted</div>`;
        return;
    }
    if (is_complete) {
        wrap.innerHTML = `<div class="complete-banner">
            <i class="fas fa-check-circle fa-lg"></i>
            All training complete! Full platform access unlocked.
        </div>`;
        return;
    }

    const barColor  = percent_done >= 80 ? '#10b981' : percent_done >= 40 ? '#f59e0b' : '#3b82f6';
    const graceHtml = grace_active
        ? `<span class="grace-badge"><i class="fas fa-clock"></i> Grace period active until ${grace_until ? grace_until.split('T')[0] : ''}</span>`
        : '';

    wrap.innerHTML = `
        <div class="progress-banner">
            <div class="progress-stat">
                <div class="value done">${completed_count}</div>
                <div class="label">Done</div>
            </div>
            <div class="progress-divider"></div>
            <div class="progress-stat">
                <div class="value total">${total_count}</div>
                <div class="label">Total</div>
            </div>
            <div class="progress-divider"></div>
            <div class="progress-bar-wrap">
                <div class="bar-label">
                    <span>Overall Progress</span>
                    <span>${percent_done}%</span>
                </div>
                <div class="progress" style="height:10px;border-radius:6px;">
                    <div class="progress-bar" style="width:${percent_done}%;background:${barColor};border-radius:6px;transition:width .5s;"></div>
                </div>
                ${graceHtml ? `<div class="mt-2">${graceHtml}</div>` : ''}
            </div>
        </div>`;
}

// ─── Load & render videos ─────────────────────────────────────────────────────
async function loadVideos() {
    try {
        const r = await fetch(`${API_BASE}/training/videos`, { headers: authHeaders() });
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        videosData   = data.videos || [];
        completedIds = new Set(videosData.filter(v => v.is_completed).map(v => v.id));
        updateFilterCounts();
        renderVideos();
    } catch(e) {
        document.getElementById('videoContainer').innerHTML =
            `<div class="empty-state"><i class="fas fa-exclamation-circle text-danger"></i><p>Could not load videos. Please refresh.</p></div>`;
    }
}

function updateFilterCounts() {
    const total     = videosData.length;
    const doneCount = completedIds.size;
    const pendCount = total - doneCount;
    const el = id => { const e = document.getElementById(id); if(e) e.textContent = ''; };
    const set = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
    set('cnt-all',       total);
    set('cnt-pending',   pendCount);
    set('cnt-completed', doneCount);
}

function renderVideos() {
    const container = document.getElementById('videoContainer');
    if (!videosData.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-video-slash"></i><p>No training videos found. Admin can sync from Google Doc.</p></div>`;
        return;
    }

    // Show filter panel
    const fp = document.getElementById('filterPanel');
    if (fp) fp.style.display = '';
    document.getElementById('tabBar').style.display = '';

    // Filter
    let list = videosData;
    if (activeFilter === 'pending')   list = videosData.filter(v => !completedIds.has(v.id));
    if (activeFilter === 'completed') list = videosData.filter(v =>  completedIds.has(v.id));

    if (!list.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-filter"></i><p>No videos in this category.</p></div>`;
        return;
    }

    container.innerHTML = list.map(v => buildVideoItem(v)).join('');
}

function buildVideoItem(v) {
    const done    = completedIds.has(v.id);
    const isShort = v.is_short;
    const ytId    = v.youtube_video_id;
    const thumb   = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
    const isExp   = expandedId === v.id;

    // Thumbnail overlay
    const thumbOverlay = done
        ? `<div class="done-overlay"><div class="done-check"><i class="fas fa-check"></i></div></div>`
        : `<div class="video-thumb-overlay"><div class="play-btn-circle"><i class="fas fa-play"></i></div></div>`;

    // Type badge
    const typeBadge = isShort
        ? `<span class="video-type-badge short"><i class="fas fa-mobile-alt"></i> SHORT</span>`
        : `<span class="video-type-badge"><i class="fab fa-youtube"></i> VIDEO</span>`;

    // Status pill
    const statusPill = done
        ? `<span class="status-pill done"><i class="fas fa-check-circle"></i> Completed</span>`
        : `<span class="status-pill pending"><i class="fas fa-clock"></i> Pending</span>`;

    // Actions
    let actions = '';
    const watchLabel = isExp ? '<i class="fas fa-chevron-up"></i> Close' : '<i class="fas fa-play"></i> Watch';
    actions += `<button class="btn-watch ${isExp ? 'watching' : ''}" id="btnWatch_${v.id}" onclick="togglePlayer(${v.id}, '${ytId}', ${isShort})">${watchLabel}</button>`;

    if (!done) {
        actions += `<button class="btn-mark-complete" id="btnComplete_${v.id}" onclick="manualComplete(${v.id})"><i class="fas fa-check"></i> Mark Complete</button>`;
    }
    if (!done && !isShort) {
        actions += `<span class="auto-note"><i class="fas fa-magic"></i> Also auto-marks on finish</span>`;
    }
    if (done) {
        actions += `<span class="auto-note" style="color:#10b981;"><i class="fas fa-check-circle"></i> Completed</span>`;
    }

    // Expanded player
    const playerArea = isExp ? `
        <div class="video-player-area open" id="playerArea_${v.id}">
            <div class="video-player-wrap ${isShort ? 'shorts-ratio' : ''}">
                <div id="ytplayer_${v.id}" class="yt-player-div"></div>
            </div>
        </div>` : `<div class="video-player-area" id="playerArea_${v.id}"></div>`;

    return `
    <div class="video-item ${done ? 'completed' : ''} ${isExp ? 'expanded' : ''}" id="videoCard_${v.id}">
        <div class="video-item-row">
            <div class="video-thumb-wrap" onclick="togglePlayer(${v.id}, '${ytId}', ${isShort})">
                <img src="${thumb}" alt="${escHtml(v.title)}" class="video-thumb-img"
                     onerror="this.src='https://img.youtube.com/vi/${ytId}/mqdefault.jpg'">
                ${thumbOverlay}
                <div class="thumb-num-badge">#${v.order_num}</div>
            </div>
            <div class="video-item-content">
                ${typeBadge}
                <div class="video-item-title">${escHtml(v.title)}</div>
                <div class="video-item-meta">
                    ${statusPill}
                </div>
                <div class="video-item-actions">${actions}</div>
            </div>
        </div>
        ${playerArea}
    </div>`;
}

// ─── Toggle embedded player ────────────────────────────────────────────────────
function togglePlayer(videoId, ytId, isShort) {
    const wasExpanded = expandedId === videoId;

    // Destroy any existing YT player
    if (expandedId && ytPlayers[expandedId]) {
        try { ytPlayers[expandedId].destroy(); } catch(e) {}
        delete ytPlayers[expandedId];
    }

    expandedId = wasExpanded ? null : videoId;
    renderVideos();

    if (!wasExpanded) {
        // After render, init player
        setTimeout(() => {
            const el = document.getElementById(`ytplayer_${videoId}`);
            if (!el) return;
            if (ytApiReady && typeof YT !== 'undefined' && YT.Player) {
                try {
                    ytPlayers[videoId] = new YT.Player(`ytplayer_${videoId}`, {
                        videoId: ytId,
                        playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1, autoplay: 1, origin: window.location.origin },
                        events: {
                            onStateChange: (event) => {
                                if (event.data === YT.PlayerState.ENDED) autoComplete(videoId, '');
                            }
                        }
                    });
                } catch(e) {
                    el.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1" frameborder="0" allowfullscreen allow="autoplay;accelerometer;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;
                }
            } else {
                el.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1" frameborder="0" allowfullscreen allow="autoplay;accelerometer;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;
            }
        }, 80);
    }
}

// ─── Mark complete (auto — YouTube ENDED event) ───────────────────────────────
async function autoComplete(videoId, title) {
    if (completedIds.has(videoId)) return;
    const v = videosData.find(x => x.id === videoId);
    await doMarkComplete(videoId, v ? v.title : 'Video', false);
}

// ─── Mark complete (manual — Shorts) ─────────────────────────────────────────
async function manualComplete(videoId) {
    const v = videosData.find(x => x.id === videoId);
    await doMarkComplete(videoId, v ? v.title : 'Video', true);
}

async function doMarkComplete(videoId, title, isManual) {
    try {
        const btn = document.getElementById(`btnComplete_${videoId}`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…'; }

        const r    = await fetch(`${API_BASE}/training/videos/${videoId}/complete`, { method: 'POST', headers: authHeaders() });
        const data = await r.json();
        if (!data.success) throw new Error(data.detail || 'Failed');

        completedIds.add(videoId);
        showToast(`✅ "${title}" marked complete!`);

        updateFilterCounts();
        renderVideos();
        await loadStatus();

        if (trainingStatus && trainingStatus.is_complete) {
            showToast('🎉 All training complete! Unlocking full access…');
            setTimeout(() => window.location.href = '/staff/dashboard', 2500);
        }
    } catch(e) {
        showToast('Could not save progress. Please try again.', 'error');
        const btn = document.getElementById(`btnComplete_${videoId}`);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Mark Complete'; }
    }
}

// ─── Admin: load team progress ────────────────────────────────────────────────
async function loadAdminData() {
    const wrap = document.getElementById('adminTableWrap');
    wrap.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Loading team data…</span></div>`;
    try {
        const r = await fetch(`${API_BASE}/training/admin`, { headers: authHeaders() });
        if (!r.ok) throw new Error(r.status);
        const d = await r.json();
        renderAdminStats(d);
        renderAdminTable(d);
    } catch(e) {
        wrap.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle text-danger"></i><p>Could not load team data.</p></div>`;
    }
}

function renderAdminStats(d) {
    const pct = d.total_staff ? Math.round(d.fully_complete / d.total_staff * 100) : 0;
    document.getElementById('adminStats').innerHTML = `
        <div class="stat-card blue"><div class="sv">${d.total_staff || 0}</div><div class="sl">Total Staff</div></div>
        <div class="stat-card green"><div class="sv">${d.fully_complete || 0}</div><div class="sl">Fully Complete</div></div>
        <div class="stat-card amber"><div class="sv">${(d.total_staff||0)-(d.fully_complete||0)}</div><div class="sl">Pending</div></div>
        <div class="stat-card"><div class="sv">${pct}%</div><div class="sl">Completion Rate</div></div>
        <div class="stat-card"><div class="sv">${d.total_videos || 0}</div><div class="sl">Total Videos</div></div>`;
}

function renderAdminTable(d) {
    if (!d.employees || !d.employees.length) {
        document.getElementById('adminTableWrap').innerHTML =
            `<div class="empty-state"><i class="fas fa-users"></i><p>No staff found.</p></div>`;
        return;
    }
    const rows = d.employees.map(e => {
        let badge = '';
        if (e.is_exempt)      badge = `<span class="badge-exempt">Exempt</span>`;
        else if (e.is_complete)   badge = `<span class="badge-complete">Complete</span>`;
        else if (e.grace_active)  badge = `<span class="badge-grace">Grace Period</span>`;
        else                      badge = `<span class="badge-pending">Pending</span>`;
        return `<tr>
            <td><strong>${escHtml(e.full_name||'—')}</strong><br><span style="font-size:11px;color:#9ca3af;">${escHtml(e.employee_code||'')}</span></td>
            <td style="font-size:12px;">${escHtml(e.staff_type||'—')}</td>
            <td>${badge}</td>
            <td>${e.completed}/${e.total}
                <span class="progress-mini"><span class="progress-mini-fill" style="width:${e.percent_done}%"></span></span>
                <small class="text-muted">${e.percent_done}%</small>
            </td>
            <td style="font-size:12px;color:#9ca3af;">${e.last_completed_at ? e.last_completed_at.split('T')[0] : '—'}</td>
        </tr>`;
    }).join('');

    document.getElementById('adminTableWrap').innerHTML = `
        <div style="overflow-x:auto;">
            <table class="data-table">
                <thead><tr><th>Employee</th><th>Role</th><th>Status</th><th>Videos Done</th><th>Last Completed</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;

    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) {
        exportBtn.href = `${API_BASE}/training/admin/export.csv`;
        exportBtn.setAttribute('download', 'training_progress.csv');
    }
}

// ─── Admin: sync ──────────────────────────────────────────────────────────────
async function triggerSync() {
    const icon = document.getElementById('syncIcon');
    if (icon) icon.className = 'fas fa-spinner fa-spin';
    try {
        const r = await fetch(`${API_BASE}/training/sync`, { method: 'POST', headers: authHeaders() });
        const d = await r.json();
        if (d.success) {
            showToast(`Sync complete — ${d.result.total} videos (${d.result.added} added, ${d.result.updated} updated)`);
            await loadVideos();
            if (document.getElementById('tab-team-progress').style.display !== 'none') await loadAdminData();
        } else {
            showToast(d.detail || 'Sync failed', 'error');
        }
    } catch(e) {
        showToast('Sync request failed', 'error');
    } finally {
        if (icon) icon.className = 'fas fa-sync-alt';
    }
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
    if (typeof StaffSidebar   !== 'undefined') await StaffSidebar.init();
    if (typeof StaffHeader    !== 'undefined') StaffHeader.inject('Training Videos', 'fas fa-play-circle');
    if (typeof StaffHeader    !== 'undefined') StaffHeader.init();
    if (typeof StaffBackButton !== 'undefined') StaffBackButton.init();

    try {
        const userData = StaffSidebar && StaffSidebar.userData;
        if (userData && userData.hierarchy_level >= 80) {
            isAdmin = true;
            const adminBtn = document.getElementById('adminTabBtn');
            if (adminBtn) adminBtn.style.display = '';
        }
    } catch(e) {}

    await loadStatus();
    await loadVideos();
});
</script>
