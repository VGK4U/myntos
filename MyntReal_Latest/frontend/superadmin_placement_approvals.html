<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Approvals - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark bg-warning">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-diagram-3"></i> Placement Approvals</span>
            <a href="/superadmin/dashboard" class="btn btn-outline-dark btn-sm">Dashboard</a>
        </div>
    </nav>
    <div class="container mt-4"><div id="placementsList"></div></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        $.ajax({url:`${API_BASE}/super-admin/placement-approvals`,headers:{'Authorization':`Bearer ${authToken}`},
        success:r=>$('#placementsList').html(r.placements.map(p=>`<div class="card mb-2 p-3"><strong>${p.user_id}</strong> wants to place under ${p.sponsor_id} (${p.position})<br>
        <button class="btn btn-success btn-sm" onclick="approve(${p.id})">Approve</button> <button class="btn btn-danger btn-sm" onclick="reject(${p.id})">Reject</button></div>`).join(''))});
        function approve(id){$.ajax({url:`${API_BASE}/super-admin/placement-approvals/approve/${id}`,method:'POST',headers:{'Authorization':`Bearer ${authToken}`},success:()=>{alert('✅ Approved!');location.reload()}})}
        function reject(id){$.ajax({url:`${API_BASE}/super-admin/placement-approvals/reject/${id}`,method:'POST',headers:{'Authorization':`Bearer ${authToken}`},success:()=>{alert('✅ Rejected!');location.reload()}})}
    </script>
</body>
</html>
