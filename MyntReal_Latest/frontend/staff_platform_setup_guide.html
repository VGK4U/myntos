<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Platform Setup Guide — MyntReal / VGK4U SFMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:#f3f4f6;color:#1f2937}
  .psg-shell{display:flex;min-height:100vh}
  .psg-main{flex:1;min-width:0}
  .psg-header{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#0f3460 100%);color:#fff;padding:24px 28px 20px;display:flex;align-items:flex-start;gap:14px}
  .psg-header h1{margin:0;font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .psg-header h1 .badge-dc{font-size:.6rem;background:rgba(255,255,255,.18);padding:3px 8px;border-radius:6px;letter-spacing:.05em}
  .psg-header p{margin:6px 0 0;opacity:.85;font-size:.92rem}
  .psg-meta{margin-top:8px;font-size:.78rem;opacity:.7}
  .psg-hamburger{display:none;align-items:center;justify-content:center;width:42px;height:42px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;flex-shrink:0;margin-top:4px}
  .psg-hamburger:hover{background:rgba(255,255,255,.28)}
  .psg-body{display:flex;gap:18px;align-items:flex-start;padding:22px 28px 80px;max-width:1400px}
  .psg-leftnav{width:240px;flex-shrink:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px;max-height:calc(100vh - 140px);overflow-y:auto;position:sticky;top:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .psg-nav-group{margin-bottom:6px}
  .psg-nav-grouphdr{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;padding:10px 10px 4px;font-weight:700}
  .psg-nav-grouphdr i{margin-right:5px}
  .psg-nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;border-radius:6px;font-size:.83rem;color:#4b5563;transition:all .12s;line-height:1.3}
  .psg-nav-item:hover{background:#f3f4f6;color:#1e3a8a}
  .psg-nav-item.active{background:#eef2ff;color:#1e3a8a;font-weight:600}
  .psg-nav-item i{width:16px;text-align:center;font-size:.8rem;flex-shrink:0}
  .psg-nav-item span{flex:1}
  .psg-content{flex:1;min-width:0}
  .psg-view{display:none}
  .psg-view.active{display:block}
  .sec-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:22px 24px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .sec-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
  .sec-icon{width:38px;height:38px;border-radius:9px;background:#eef2ff;color:#1e3a8a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem}
  .sec-head h2{margin:0;font-size:1.15rem;font-weight:700;color:#0f172a}
  .sec-head p{margin:4px 0 0;font-size:.88rem;color:#4b5563;line-height:1.5}
  .step{display:grid;grid-template-columns:170px 1fr;gap:14px;padding:11px 0;border-top:1px solid #f3f4f6;font-size:.88rem}
  .step:first-of-type{border-top:1px dashed #e5e7eb;margin-top:10px}
  .step .lbl{font-weight:600;color:#1e3a8a}
  .step .det{color:#374151;line-height:1.55}
  .step code{background:#f3f4f6;padding:1px 6px;border-radius:4px;font-size:.82rem;color:#0f172a}
  .step-links{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .link-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#1e3a8a;color:#fff !important;font-size:.76rem;font-weight:600;border-radius:14px;text-decoration:none !important;transition:all .15s}
  .link-btn:hover{background:#0f172a;transform:translateX(2px)}
  .link-btn i{font-size:.65rem}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .stat .v{font-size:1.5rem;font-weight:700;color:#0f172a;line-height:1}
  .stat .k{font-size:.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
  .tbl{width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:10px;border-collapse:separate;border-spacing:0;overflow:hidden;margin-bottom:22px;font-size:.86rem}
  .tbl th{background:#f9fafb;padding:9px 12px;text-align:left;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;border-bottom:1px solid #e5e7eb}
  .tbl td{padding:9px 12px;border-bottom:1px solid #f3f4f6}
  .tbl tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:600;letter-spacing:.02em}
  .pill-ok{background:#d1fae5;color:#065f46}
  .pill-warn{background:#fef3c7;color:#92400e}
  .pill-err{background:#fee2e2;color:#991b1b}
  .pill-mute{background:#e5e7eb;color:#4b5563}
  .changelog .entry{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .changelog .entry-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .changelog h3{margin:0;font-size:1rem;font-weight:700;color:#0f172a}
  .changelog .date{color:#6b7280;font-size:.78rem;font-family:monospace}
  .changelog .tag{background:#1e3a8a;color:#fff;font-size:.7rem;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.03em}
  .changelog ul{margin:6px 0 0;padding-left:20px;color:#374151;font-size:.88rem;line-height:1.55}
  .empty{padding:40px;text-align:center;color:#9ca3af;background:#fff;border:1px dashed #e5e7eb;border-radius:10px}
  .loading{padding:60px;text-align:center;color:#6b7280}
  .loading i{font-size:1.6rem;margin-bottom:10px;color:#1e3a8a}
  .helpbox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;font-size:.85rem;color:#1e3a8a;margin-bottom:18px}
  .helpbox i{margin-right:6px}
  @media (max-width:768px){
    .psg-hamburger{display:inline-flex}
    .psg-body{flex-direction:column;padding:16px}
    .psg-leftnav{display:none;width:100%;position:static;max-height:55vh}
    .psg-body.nav-open .psg-leftnav{display:block}
    .step{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="psg-shell">
  <div id="staff-sidebar-mount"></div>
  <div class="psg-main">
    <div class="psg-header">
      <button class="psg-hamburger" id="psgHamburger" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <div style="flex:1">
        <h1><i class="fas fa-book-open"></i> Platform Setup Guide <span class="badge-dc">DC_PLATFORM_GUIDE_002</span></h1>
        <p>End-to-end onboarding, configuration, and operations reference for the MyntReal / VGK4U SFMS platform.</p>
        <div class="psg-meta" id="meta-line">Loading…</div>
      </div>
    </div>

    <div class="psg-body" id="psgBody">
      <aside class="psg-leftnav" id="psgLeftnav">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
      </aside>
      <div class="psg-content" id="psgContent">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i><div>Loading guide…</div></div>
      </div>
    </div>
  </div>
</div>

<script src="/staff_sidebar.js?v=20260602c"></script>
<script>
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function renderSetupOne(s){
    let html = `<div class="helpbox"><i class="fas fa-info-circle"></i>Curated content lives in <code>backend/app/data/platform_setup_content.py</code>. Edit <code>SETUP_SECTIONS</code> there and restart the backend to update.</div>`;
    html += `<div class="sec-card">
      <div class="sec-head">
        <div class="sec-icon"><i class="${esc(s.icon || 'fas fa-circle')}"></i></div>
        <div><h2>${esc(s.title)}</h2><p>${esc(s.summary || '')}</p></div>
      </div>`;
    (s.steps || []).forEach(st => {
      html += `<div class="step"><div class="lbl">${esc(st.label)}</div><div class="det">${esc(st.detail)}`;
      if (st.links && st.links.length){
        html += '<div class="step-links">';
        st.links.forEach(l => {
          html += `<a class="link-btn" href="${esc(l.route)}" target="_blank" rel="noopener">${esc(l.label)} <i class="fas fa-arrow-right"></i></a>`;
        });
        html += '</div>';
      }
      html += `</div></div>`;
    });
    html += `</div>`;
    return html;
  }

  function renderInventory(data){
    const inv   = data.live_inventory || {};
    const stats = inv.stats || {};
    const cs    = inv.companies || [];
    const sx    = inv.sections  || [];
    const env   = inv.env       || [];

    const card = (k, v) => `<div class="stat"><div class="v">${esc(v)}</div><div class="k">${esc(k)}</div></div>`;
    let html = '';
    html += `<div class="helpbox"><i class="fas fa-bolt"></i>Live data — pulled from the database and environment on every page load.</div>`;
    html += '<div class="stat-grid">'
      + card('Companies (active / total)', (stats.companies_active ?? 0) + ' / ' + (stats.companies_total ?? 0))
      + card('Active employees',  stats.employees_total ?? 0)
      + card('Departments',       stats.departments_total ?? 0)
      + card('Menu sections',     stats.menu_sections_total ?? 0)
      + card('Total pages',       stats.menu_pages_total ?? 0)
      + card('Audit log entries', stats.audit_log_entries ?? 0)
      + '</div>';

    html += '<h3 style="font-size:.95rem;font-weight:700;margin:18px 0 10px;color:#0f172a"><i class="fas fa-building"></i> Companies</h3>';
    if (cs.length){
      html += '<table class="tbl"><thead><tr><th>ID</th><th>Code</th><th>Name</th><th>Status</th></tr></thead><tbody>';
      cs.forEach(c => {
        html += `<tr><td>${esc(c.id)}</td><td><code>${esc(c.code || '')}</code></td><td>${esc(c.name)}</td>`
              + `<td>${c.active ? '<span class="pill pill-ok">Active</span>' : '<span class="pill pill-mute">Inactive</span>'}</td></tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="empty">No companies configured yet — set them up via Configuration → Companies.</div>';
    }

    html += '<h3 style="font-size:.95rem;font-weight:700;margin:18px 0 10px;color:#0f172a"><i class="fas fa-bars"></i> Menu Sections</h3>';
    if (sx.length){
      html += '<table class="tbl"><thead><tr><th>Order</th><th>Section ID</th><th>Title</th><th>Pages</th></tr></thead><tbody>';
      sx.forEach(s => {
        html += `<tr><td>${esc(s.order)}</td><td><code>${esc(s.section)}</code></td><td>${esc(s.title)}</td><td>${esc(s.menu_count)}</td></tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="empty">No sections found — restart the backend to run sidebar sync.</div>';
    }

    html += '<h3 style="font-size:.95rem;font-weight:700;margin:18px 0 10px;color:#0f172a"><i class="fas fa-key"></i> Environment Secrets</h3>';
    if (env.length){
      html += '<table class="tbl"><thead><tr><th>Name</th><th>Status</th><th>Required</th><th>Purpose</th></tr></thead><tbody>';
      env.forEach(e => {
        const status = e.present
          ? '<span class="pill pill-ok">Present</span>'
          : (e.required ? '<span class="pill pill-err">Missing</span>' : '<span class="pill pill-warn">Not set</span>');
        const req = e.required ? '<span class="pill pill-err">Required</span>' : '<span class="pill pill-mute">Optional</span>';
        html += `<tr><td><code>${esc(e.name)}</code></td><td>${status}</td><td>${req}</td><td>${esc(e.purpose)}</td></tr>`;
      });
      html += '</tbody></table>';
    }
    return html;
  }

  function renderChangelog(data){
    const log = data.changelog || [];
    if (!log.length) return '<div class="empty">No changelog entries yet.</div>';
    let html = '<div class="changelog">';
    html += `<div class="helpbox"><i class="fas fa-pen-to-square"></i>Append a new entry to <code>PLATFORM_CHANGELOG</code> in <code>backend/app/data/platform_setup_content.py</code> after every notable platform change so this log stays accurate.</div>`;
    log.forEach(e => {
      html += '<div class="entry">';
      html += `<div class="entry-head"><h3>${esc(e.title)}</h3><div><span class="tag">${esc(e.tag || '')}</span> <span class="date">${esc(e.date || '')}</span></div></div>`;
      if (e.details && e.details.length){
        html += '<ul>';
        e.details.forEach(d => { html += `<li>${esc(d)}</li>`; });
        html += '</ul>';
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderLeftNav(setupSecs){
    let nav = '<div class="psg-nav-group"><div class="psg-nav-grouphdr"><i class="fas fa-list-check"></i>Tenant Setup</div>';
    setupSecs.forEach((s, i) => {
      nav += `<div class="psg-nav-item${i === 0 ? ' active' : ''}" data-target="setup-${esc(s.id)}">`
           + `<i class="${esc(s.icon || 'fas fa-circle')}"></i><span>${esc(s.title)}</span></div>`;
    });
    nav += '</div>';
    nav += `<div class="psg-nav-group"><div class="psg-nav-grouphdr"><i class="fas fa-cog"></i>System</div>
              <div class="psg-nav-item" data-target="inventory"><i class="fas fa-database"></i><span>Live Inventory</span></div>
              <div class="psg-nav-item" data-target="changelog"><i class="fas fa-clock-rotate-left"></i><span>Update Log</span></div>
            </div>`;
    return nav;
  }

  function wireInteractions(){
    const body = document.getElementById('psgBody');
    document.querySelectorAll('.psg-nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.psg-nav-item').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.psg-view').forEach(x => x.classList.remove('active'));
        item.classList.add('active');
        const v = document.querySelector(`.psg-view[data-view="${item.dataset.target}"]`);
        if (v) v.classList.add('active');
        if (window.innerWidth <= 768) body.classList.remove('nav-open');
        document.getElementById('psgContent').scrollIntoView({ behavior:'smooth', block:'start' });
      });
    });
    const hb = document.getElementById('psgHamburger');
    if (hb) hb.addEventListener('click', () => body.classList.toggle('nav-open'));
  }

  async function load(){
    try {
      const r = await fetch('/api/v1/staff/platform-setup-guide', { credentials: 'include' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const setupSecs = data.setup_sections || [];

      // Left nav
      document.getElementById('psgLeftnav').innerHTML = renderLeftNav(setupSecs);

      // Views
      let views = '';
      setupSecs.forEach((s, i) => {
        views += `<div class="psg-view${i === 0 ? ' active' : ''}" data-view="setup-${esc(s.id)}">${renderSetupOne(s)}</div>`;
      });
      views += `<div class="psg-view" data-view="inventory">${renderInventory(data)}</div>`;
      views += `<div class="psg-view" data-view="changelog">${renderChangelog(data)}</div>`;
      document.getElementById('psgContent').innerHTML = views;

      // Meta
      const inv  = data.live_inventory || {}, st = inv.stats || {};
      document.getElementById('meta-line').innerHTML =
          'Generated ' + esc((data.generated_at || '').replace('T',' ').replace('Z',' UTC'))
        + ' &middot; ' + (st.companies_active ?? 0) + ' active companies'
        + ' &middot; ' + (st.menu_pages_total ?? 0) + ' pages live'
        + ' &middot; ' + (st.employees_total ?? 0) + ' employees';

      wireInteractions();
    } catch (err) {
      const msg = `<div class="empty"><i class="fas fa-triangle-exclamation"></i> Failed to load: ${esc(err.message || err)}</div>`;
      document.getElementById('psgLeftnav').innerHTML = '';
      document.getElementById('psgContent').innerHTML = msg;
    }
  }

  load();
</script>
</body>
</html>
