<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>User Password Reset - Admin - MNR Business Access Program</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0 !important;
            font-weight: 600;
        }
        .stat-card {
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .user-item {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .user-item:hover {
            background-color: #f8f9fa;
        }
        .user-item:last-child {
            border-bottom: none;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
        }
        .search-result-item {
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            background-color: #e7f3ff;
            border-color: #667eea;
        }
        .btn-reset {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-reset:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653b8a 100%);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-key-fill"></i> User Password Reset
            </span>
            <div class="d-flex">
                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i>
                    <span id="adminName">Admin</span>
                </span>
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Statistics -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted mb-2"><i class="bi bi-people"></i> Total Users</h6>
                        <h2 class="mb-0" id="totalUsers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted mb-2"><i class="bi bi-check-circle"></i> Active Users</h6>
                        <h2 class="mb-0 text-success" id="activeUsers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <h6 class="text-muted mb-2"><i class="bi bi-x-circle"></i> Inactive Users</h6>
                        <h2 class="mb-0 text-danger" id="inactiveUsers">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- User Search & Selection -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-search"></i> Search User
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="searchInput" 
                                   placeholder="Enter MNR ID or User Name">
                            <small class="text-muted">Search by exact MNR ID (e.g., MNR123456789) or partial name</small>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mb-3" id="searchBtn">
                            <i class="bi bi-search"></i> Search
                        </button>
                        
                        <!-- Search Results -->
                        <div id="searchResults"></div>

                        <!-- Recent Users -->
                        <div class="mt-4">
                            <h6 class="mb-3"><i class="bi bi-clock-history"></i> Recent Registrations</h6>
                            <div id="recentUsers" style="max-height: 300px; overflow-y: auto;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Password Reset Form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-key"></i> Reset Password
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i>
                            <strong>Note:</strong> You can only reset passwords for regular users, not admin accounts.
                        </div>

                        <form id="resetForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Selected User</label>
                                <input type="text" class="form-control" id="selectedUserId" 
                                       placeholder="Select a user from search or recent list" readonly>
                                <div id="selectedUserInfo" class="mt-2"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">New Password</label>
                                <input type="password" class="form-control" id="newPassword" 
                                       placeholder="Minimum 6 characters" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" 
                                       placeholder="Re-enter password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Reason (Optional)</label>
                                <textarea class="form-control" id="reason" rows="2" 
                                          placeholder="Enter reason for password reset (e.g., User forgot password)"></textarea>
                            </div>

                            <button type="submit" class="btn btn-reset w-100" id="submitBtn">
                                <i class="bi bi-key-fill"></i> Reset Password
                            </button>
                        </form>

                        <div id="result" class="mt-3"></div>

                        <!-- Recent Audit Logs -->
                        <div class="mt-4" id="auditSection" style="display: none;">
                            <h6 class="mb-3"><i class="bi bi-file-text"></i> Recent Password Resets</h6>
                            <div id="auditLogs" style="max-height: 200px; overflow-y: auto;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE = '/api/v1/admin';
        const sessionToken = getCookie('session_token');

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // Load statistics on page load
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats?t=${Date.now()}`, {
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    $('#totalUsers').text(data.stats.total_users);
                    $('#activeUsers').text(data.stats.active_users);
                    $('#inactiveUsers').text(data.stats.inactive_users);
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Load recent users
        async function loadRecentUsers() {
            try {
                const response = await fetch(`${API_BASE}/recent-users?t=${Date.now()}`, {
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayRecentUsers((data && data.users) || []);
                }
            } catch (error) {
                console.error('Failed to load recent users:', error);
            }
        }

        // Display recent users
        function displayRecentUsers(users) {
            const container = $('#recentUsers');
            if (users.length === 0) {
                container.html('<p class="text-muted">No users found</p>');
                return;
            }

            container.html(users.map(user => `
                <div class="user-item" onclick="selectUser('${user.user_id}', '${escapeHtml(user.name)}', '${user.account_status}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${escapeHtml(user.user_id)}</strong><br>
                            <small class="text-muted">${escapeHtml(user.name)}</small>
                        </div>
                        <span class="badge ${user.account_status === 'Active' ? 'bg-success' : 'bg-secondary'} status-badge">
                            ${user.account_status}
                        </span>
                    </div>
                </div>
            `).join(''));
        }

        // Search users
        $('#searchBtn').on('click', async function() {
            const searchTerm = $('#searchInput').val().trim();
            
            if (!searchTerm) {
                $('#searchResults').html('<div class="alert alert-warning">Please enter a search term</div>');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/search-users?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                        'Content-Type': 'application/json' 
                    },
                    credentials: 'include',
                    cache: 'no-store',
                    body: JSON.stringify({ search_term: searchTerm })
                });

                if (response.ok) {
                    const data = await response.json();
                    displaySearchResults((data && data.results) || []);
                } else {
                    const error = await response.json();
                    $('#searchResults').html(`<div class="alert alert-danger">${error.detail || 'Search failed'}</div>`);
                }
            } catch (error) {
                $('#searchResults').html('<div class="alert alert-danger">Search request failed</div>');
            }
        });

        // Allow search on Enter key
        $('#searchInput').on('keypress', function(e) {
            if (e.which === 13) {
                $('#searchBtn').click();
            }
        });

        // Display search results
        function displaySearchResults(results) {
            const container = $('#searchResults');
            
            if (results.length === 0) {
                container.html('<div class="alert alert-info">No users found</div>');
                return;
            }

            container.html(`
                <h6 class="mb-2"><i class="bi bi-search"></i> Search Results (${results.length})</h6>
                ${results.map(user => `
                    <div class="search-result-item" onclick="selectUser('${user.user_id}', '${escapeHtml(user.name)}', '${user.account_status}', '${escapeHtml(user.email)}')">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <strong>${escapeHtml(user.user_id)}</strong>
                                <span class="badge ${user.account_status === 'Active' ? 'bg-success' : 'bg-secondary'} ms-2 status-badge">
                                    ${user.account_status}
                                </span>
                                <br>
                                <small class="text-muted">${escapeHtml(user.name)}</small><br>
                                <small class="text-muted"><i class="bi bi-envelope"></i> ${escapeHtml(user.email || 'N/A')}</small>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `);
        }

        // Select user for password reset
        function selectUser(userId, name, status, email = '') {
            $('#selectedUserId').val(userId);
            $('#selectedUserInfo').html(`
                <div class="alert alert-success">
                    <strong>${escapeHtml(name)}</strong> (${userId})
                    <span class="badge ${status === 'Active' ? 'bg-success' : 'bg-secondary'} ms-2">
                        ${status}
                    </span>
                    ${email ? `<br><small>${escapeHtml(email)}</small>` : ''}
                </div>
            `);
            
            // Scroll to form
            $('html, body').animate({
                scrollTop: $("#resetForm").offset().top - 100
            }, 500);
        }

        // Reset password form submission
        $('#resetForm').on('submit', async function(e) {
            e.preventDefault();
            
            const targetUserId = $('#selectedUserId').val();
            const newPassword = $('#newPassword').val();
            const confirmPassword = $('#confirmPassword').val();
            const reason = $('#reason').val() || 'Admin password reset';

            // Validation
            if (!targetUserId) {
                $('#result').html('<div class="alert alert-danger">Please select a user</div>');
                return;
            }

            if (newPassword !== confirmPassword) {
                $('#result').html('<div class="alert alert-danger">Passwords do not match!</div>');
                return;
            }

            if (newPassword.length < 6) {
                $('#result').html('<div class="alert alert-danger">Password must be at least 6 characters!</div>');
                return;
            }

            // Disable submit button
            $('#submitBtn').prop('disabled', true).html('<i class="bi bi-hourglass-split"></i> Resetting...');

            try {
                console.log('🔑 Attempting password reset for user:', targetUserId);
                const response = await fetch(`${API_BASE}/password-reset?t=${Date.now()}`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                        'Content-Type': 'application/json' 
                    },
                    credentials: 'include',
                    cache: 'no-store',
                    body: JSON.stringify({
                        target_user_id: targetUserId,
                        new_password: newPassword,
                        reason: reason
                    })
                });

                console.log('📡 Response status:', response.status, response.statusText);

                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Password reset successful:', data);
                    $('#result').html(`
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle"></i>
                            <strong>Success!</strong> Password reset for ${data.user.name} (${data.user.user_id})
                            <br><small>Changed by: ${data.changed_by.admin_name} at ${new Date(data.timestamp).toLocaleString()}</small>
                        </div>
                    `);
                    
                    // Clear form
                    $('#newPassword').val('');
                    $('#confirmPassword').val('');
                    $('#reason').val('');
                    
                    // Load audit logs
                    loadAuditLogs();
                } else {
                    const error = await response.json();
                    console.error('❌ Password reset failed:', error);
                    $('#result').html(`
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> 
                            <strong>Error:</strong> ${error.detail || 'Failed to reset password'}
                            <br><small>Status: ${response.status} ${response.statusText}</small>
                        </div>
                    `);
                }
            } catch (error) {
                console.error('❌ Request exception:', error);
                $('#result').html(`
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> 
                        <strong>Request Failed!</strong> ${error.message || 'Please try again.'}
                        <br><small>Check browser console for details (F12)</small>
                    </div>
                `);
            } finally {
                $('#submitBtn').prop('disabled', false).html('<i class="bi bi-key-fill"></i> Reset Password');
            }
        });

        // Load audit logs
        async function loadAuditLogs() {
            try {
                const response = await fetch(`${API_BASE}/audit-logs?limit=10&t=${Date.now()}`, {
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('authToken'),
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayAuditLogs((data && data.logs) || []);
                }
            } catch (error) {
                console.error('Failed to load audit logs:', error);
            }
        }

        // Display audit logs
        function displayAuditLogs(logs) {
            if (logs.length === 0) return;
            
            $('#auditSection').show();
            $('#auditLogs').html(logs.map(log => `
                <div class="border-bottom pb-2 mb-2">
                    <small>
                        <strong>${log.user_id}</strong> by ${log.changed_by}
                        <br>
                        <span class="text-muted">${log.reason}</span>
                        <br>
                        <span class="text-muted">${new Date(log.timestamp).toLocaleString()}</span>
                    </small>
                </div>
            `).join(''));
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize page
        $(document).ready(function() {
            loadStats();
            loadRecentUsers();
            loadAuditLogs();
        });
    </script>
</body>
</html>
