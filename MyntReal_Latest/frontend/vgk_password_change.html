<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVZ User Password Reset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
        }
        .search-section {
            padding: 25px;
            border-bottom: 2px solid #f0f0f0;
        }
        .user-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .user-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        .password-section {
            padding: 25px;
            background: #f8f9fa;
        }
        .btn-reset {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,87,108,0.4);
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .stats-card h3 {
            font-size: 2rem;
            margin: 0;
        }
        .stats-card p {
            margin: 0;
            opacity: 0.9;
        }
        .badge-custom {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header">
            <h2 class="mb-0"><img src="/public/vgk4u-logo-100.png" alt="VGK4U" style="height:28px;background:rgba(255,255,255,0.9);border-radius:5px;padding:2px 6px;margin-right:8px;vertical-align:middle;"><i class="fas fa-crown"></i> RVZ User Password Reset</h2>
            <p class="mb-0 mt-2">Supreme authority to change any user's password</p>
        </div>

        <div class="search-section">
            <h5 class="mb-3"><i class="fas fa-search"></i> Search User</h5>
            <div class="input-group mb-3">
                <input type="text" id="searchInput" class="form-control form-control-lg" 
                       placeholder="Enter User ID (e.g., MNR1800001) or Name">
                <button class="btn btn-primary btn-lg" onclick="searchUser()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            
            <div id="searchResults"></div>
        </div>

        <div id="passwordSection" class="password-section" style="display: none;">
            <h5 class="mb-3"><i class="fas fa-key"></i> Reset Password</h5>
            <div id="selectedUserInfo" class="alert alert-info mb-3"></div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">New Password</label>
                <input type="password" id="newPassword" class="form-control form-control-lg" 
                       placeholder="Enter new password (min 6 characters)">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control form-control-lg" 
                       placeholder="Re-enter new password">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Reason (Optional)</label>
                <textarea id="reason" class="form-control" rows="2" 
                          placeholder="Why are you changing this password?"></textarea>
            </div>
            
            <button class="btn btn-reset btn-lg w-100" onclick="resetPassword()">
                <i class="fas fa-check-circle"></i> Reset Password
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/admin-id-utils.js"></script>
<script>
        let selectedUserId = null;
        const authToken = localStorage.getItem('authToken');

        async function searchUser() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            
            if (!searchTerm) {
                alert('Please enter a User ID or name to search');
                return;
            }

            try {
                const response = await fetch('/api/v1/rvz/password/search-users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ search_term: searchTerm })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Search failed');
                }

                if (data.results.length === 0) {
                    document.getElementById('searchResults').innerHTML = `
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle"></i> No users found for "${searchTerm}"
                        </div>
                    `;
                    return;
                }

                let resultsHTML = '<h6 class="mb-3">Search Results:</h6>';
                data.results.forEach(user => {
                    const statusBadge = user.account_status === 'Active' 
                        ? '<span class="badge bg-success">Active</span>' 
                        : '<span class="badge bg-danger">Inactive</span>';
                    
                    const roleBadge = user.user_type === 'RVZ ID' 
                        ? '<span class="badge badge-custom bg-danger">RVZ ID</span>'
                        : user.user_type === 'Super Admin'
                        ? '<span class="badge badge-custom bg-warning text-dark">Super Admin</span>'
                        : user.user_type === 'Admin'
                        ? '<span class="badge badge-custom bg-primary">Admin</span>'
                        : '<span class="badge badge-custom bg-secondary">Member</span>';

                    resultsHTML += `
                        <div class="user-card">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1"><strong>${user.user_id}</strong> - ${user.name}</h6>
                                    <p class="mb-2 text-muted">${user.email || 'No email'}</p>
                                    <div>
                                        ${roleBadge} ${statusBadge}
                                    </div>
                                </div>
                                <button class="btn btn-primary btn-sm" onclick="selectUser('${user.user_id}', '${user.name}', '${user.user_type}')">
                                    <i class="fas fa-check"></i> Select
                                </button>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('searchResults').innerHTML = resultsHTML;

            } catch (error) {
                document.getElementById('searchResults').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> Error: ${error.message}
                    </div>
                `;
            }
        }

        function selectUser(userId, userName, userType) {
            selectedUserId = userId;
            
            document.getElementById('selectedUserInfo').innerHTML = `
                <h6 class="mb-0">
                    <i class="fas fa-user"></i> Selected User: 
                    <strong>${userId}</strong> - ${userName} 
                    <span class="badge bg-primary">${userType}</span>
                </h6>
            `;
            
            document.getElementById('passwordSection').style.display = 'block';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            document.getElementById('reason').value = '';
            
            document.getElementById('passwordSection').scrollIntoView({ behavior: 'smooth' });
        }

        async function resetPassword() {
            if (!selectedUserId) {
                alert('Please select a user first');
                return;
            }

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const reason = document.getElementById('reason').value || 'RVZ ID admin password reset';

            if (!newPassword) {
                alert('Please enter a new password');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (!confirm(`Are you sure you want to reset password for ${selectedUserId}?`)) {
                return;
            }

            try {
                const response = await fetch('/api/v1/rvz/password/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        target_user_id: selectedUserId,
                        new_password: newPassword,
                        reason: reason
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Password reset failed');
                }

                alert(`✅ SUCCESS!\n\nPassword changed for ${data.target_user.user_id} (${data.target_user.name})\n\nThe user can now login with their new password.`);
                
                document.getElementById('passwordSection').style.display = 'none';
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').innerHTML = '';
                selectedUserId = null;

            } catch (error) {
                alert(`❌ Error: ${error.message}`);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchUser();
            }
        });
    </script>
</body>
</html>
