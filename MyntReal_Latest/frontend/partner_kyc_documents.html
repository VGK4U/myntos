<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC &amp; Documents — Partner Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
        .page-wrap { max-width: 700px; margin: 0 auto; padding: 20px 16px 80px; }
        .page-title { font-size: 20px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
        .page-subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }
        .card { background: #1e293b; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
        .card-title { font-size: 14px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e3a5f; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 12px; color: #64748b; font-weight: 600; }
        .info-value { font-size: 13px; color: #e2e8f0; font-weight: 500; text-align: right; max-width: 60%; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-green { background: #064e3b; color: #10b981; }
        .badge-yellow { background: #451a03; color: #f59e0b; }
        .badge-red { background: #450a0a; color: #ef4444; }
        .badge-gray { background: #1f2937; color: #9ca3af; }
        .badge-blue { background: #1e3a5f; color: #60a5fa; }
        .doc-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #1e3a5f; }
        .doc-row:last-child { border-bottom: none; }
        .doc-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .doc-info { flex: 1; margin-left: 12px; }
        .doc-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
        .doc-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
        .doc-actions { display: flex; gap: 8px; align-items: center; }
        .btn-upload { background: #1d4ed8; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-upload:hover { background: #2563eb; }
        .btn-upload:disabled { opacity: .5; cursor: not-allowed; }
        .expiry-banner { border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .expiry-warn { background: #451a03; border: 1px solid #f59e0b; }
        .expiry-ok { background: #064e3b; border: 1px solid #10b981; }
        .expiry-expired { background: #450a0a; border: 1px solid #ef4444; }
        .skeleton { background: linear-gradient(90deg,#1e293b 25%,#253247 50%,#1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 16px; margin-bottom: 10px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .upload-msg { font-size: 11px; margin-top: 6px; }
        .upload-msg.success { color: #10b981; }
        .upload-msg.error { color: #ef4444; }
        .agreement-status-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #0f172a; border-radius: 8px; margin-bottom: 6px; border: 1px solid #334155; }
        .rejected-reason { font-size: 11px; color: #ef4444; margin-top: 4px; padding: 4px 8px; background: #450a0a; border-radius: 6px; }
        .progress-bar-wrap { background: #0f172a; border-radius: 6px; height: 6px; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { height: 100%; border-radius: 6px; transition: width .3s; }
        .days-counter { font-size: 28px; font-weight: 800; margin-right: 4px; }
    </style>
</head>
<body>
<div id="partnerSidebarRoot"></div>
<div class="page-wrap" id="mainContent">
    <!-- Skeleton while loading -->
    <div id="loadingSkeleton">
        <div style="height:24px;width:50%;margin-bottom:6px" class="skeleton"></div>
        <div style="height:14px;width:30%;margin-bottom:20px" class="skeleton"></div>
        <div class="card">
            <div class="skeleton" style="height:14px;width:40%;margin-bottom:16px"></div>
            ${Array(4).fill('<div class="skeleton" style="height:14px;margin-bottom:10px"></div>').join('')}
        </div>
        <div class="card">
            <div class="skeleton" style="height:14px;width:40%;margin-bottom:16px"></div>
            ${Array(3).fill('<div class="skeleton" style="height:44px;margin-bottom:10px;border-radius:10px"></div>').join('')}
        </div>
    </div>
    <div id="pageContent" style="display:none"></div>
</div>

<script src="/partner_sidebar.js?v=20260507a"></script>
<script>
const API = '/api/v1/partner';

function getToken() { return localStorage.getItem('partner_token') || ''; }
function getCompanyId() { return localStorage.getItem('partner_company_id') || ''; }
function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

const DOC_CONFIG = {
    aadhar_front:    { label: 'Aadhaar — Front',    icon: 'fa-id-card',      color: '#3b82f6', bg: '#1e3a5f' },
    aadhar_back:     { label: 'Aadhaar — Back',     icon: 'fa-id-card',      color: '#8b5cf6', bg: '#2d1b69' },
    pan_card:        { label: 'PAN Card',            icon: 'fa-credit-card',  color: '#f59e0b', bg: '#451a03' },
    passport_photo:  { label: 'Passport Photo',     icon: 'fa-user-circle',  color: '#10b981', bg: '#064e3b' },
};

function statusBadge(status) {
    if (!status || status === 'Not Submitted') return '<span class="badge badge-gray"><i class="fas fa-minus-circle me-1"></i>Not Submitted</span>';
    if (status === 'Approved') return '<span class="badge badge-green"><i class="fas fa-check-circle me-1"></i>Approved</span>';
    if (status === 'Rejected') return '<span class="badge badge-red"><i class="fas fa-times-circle me-1"></i>Rejected</span>';
    return '<span class="badge badge-yellow"><i class="fas fa-clock me-1"></i>' + status + '</span>';
}

function daysLabel(days) {
    if (days === null || days === undefined) return '—';
    if (days < 0) return '<span style="color:#ef4444">Expired ' + Math.abs(days) + ' day(s) ago</span>';
    if (days === 0) return '<span style="color:#ef4444">Expires today</span>';
    return days + ' day(s) remaining';
}

async function loadPage() {
    try {
        const [partnerRes, partnershipRes, kycRes] = await Promise.all([
            fetch(`${API}/auth/me?company_id=${getCompanyId()}`, { headers: authHeaders() }),
            fetch(`${API}/auth/my-partnership`, { headers: authHeaders() }),
            fetch(`${API}/kyc/status`, { headers: authHeaders() }),
        ]);

        if (!partnerRes.ok) { window.location.href = '/partner/login'; return; }

        const pData = await partnerRes.json();
        const partner = pData.partner || pData;

        const psData = partnershipRes.ok ? await partnershipRes.json() : {};
        const pt = psData.partnership || {};

        const kycData = kycRes.ok ? await kycRes.json() : {};
        const kyc = kycData.kyc_documents || {};

        renderPage(partner, pt, kyc, psData.kyc_status || 'Not Submitted');
    } catch (e) {
        document.getElementById('loadingSkeleton').innerHTML =
            '<div style="text-align:center;padding:40px;color:#ef4444"><i class="fas fa-exclamation-circle" style="font-size:32px;margin-bottom:12px"></i><div>Failed to load. Please refresh.</div></div>';
    }
}

function renderPage(partner, pt, kycDocs, kycStatus) {
    document.getElementById('loadingSkeleton').style.display = 'none';
    const el = document.getElementById('pageContent');
    el.style.display = 'block';

    const days = pt.days_to_expiry;
    let expiryBannerHtml = '';
    if (pt.partner_end_date) {
        let cls = 'expiry-ok', icon = 'fa-calendar-check', iconColor = '#10b981';
        if (days !== null && days <= 0) { cls = 'expiry-expired'; icon = 'fa-calendar-times'; iconColor = '#ef4444'; }
        else if (days !== null && days <= (pt.reminder_days_before || 90)) { cls = 'expiry-warn'; icon = 'fa-exclamation-triangle'; iconColor = '#f59e0b'; }
        expiryBannerHtml = `
        <div class="expiry-banner ${cls}">
            <i class="fas ${icon}" style="font-size:24px;color:${iconColor};flex-shrink:0"></i>
            <div>
                <div style="font-size:13px;font-weight:700;color:#e2e8f0">Agreement ${days !== null && days <= 0 ? 'Expired' : 'Expiry'}</div>
                <div style="font-size:12px;color:#94a3b8;margin-top:2px">${pt.partner_end_date} &nbsp;·&nbsp; ${daysLabel(days)}</div>
            </div>
        </div>`;
    }

    const docRows = Object.entries(DOC_CONFIG).map(([type, cfg]) => {
        const doc = kycDocs[type.replace('aadhar_', 'aadhaar_')] || kycDocs[type] || null;
        const docStatus = doc ? doc.status : 'Not Submitted';
        const uploadedAt = doc?.uploaded_at ? new Date(doc.uploaded_at).toLocaleDateString('en-IN') : '';
        const rejReason = doc?.rejection_reason ? `<div class="rejected-reason"><i class="fas fa-comment-alt me-1"></i>${doc.rejection_reason}</div>` : '';
        return `
        <div class="doc-row">
            <div class="doc-icon" style="background:${cfg.bg};color:${cfg.color}"><i class="fas ${cfg.icon}"></i></div>
            <div class="doc-info">
                <div class="doc-name">${cfg.label}</div>
                <div class="doc-meta">${uploadedAt ? 'Uploaded: ' + uploadedAt : 'Not yet uploaded'}</div>
                ${rejReason}
            </div>
            <div class="doc-actions">
                ${statusBadge(docStatus)}
                ${docStatus !== 'Approved' ? `
                <label style="cursor:pointer">
                    <input type="file" accept="image/png,image/jpeg,application/pdf" style="display:none"
                        onchange="uploadKYCDoc('${type}', this)">
                    <span class="btn-upload" id="uploadBtn_${type}"><i class="fas fa-upload"></i></span>
                </label>` : ''}
            </div>
        </div>`;
    }).join('');

    el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <button onclick="history.back()" style="background:none;border:none;color:#64748b;cursor:pointer;padding:4px">
                <i class="fas fa-arrow-left" style="font-size:16px"></i>
            </button>
            <div>
                <div class="page-title">KYC &amp; Documents</div>
                <div class="page-subtitle">${partner.partner_name || ''} &middot; ${partner.partner_code || ''}</div>
            </div>
        </div>

        ${expiryBannerHtml}

        <!-- Partnership Terms Card -->
        <div class="card">
            <div class="card-title"><i class="fas fa-handshake" style="color:#7c3aed"></i>Partnership Terms</div>
            <div class="info-row"><span class="info-label">Start Date</span><span class="info-value">${pt.partner_start_date || '—'}</span></div>
            <div class="info-row"><span class="info-label">End Date</span><span class="info-value">${pt.partner_end_date || '—'}</span></div>
            <div class="info-row"><span class="info-label">Days Remaining</span><span class="info-value">${daysLabel(days)}</span></div>
            <div class="info-row"><span class="info-label">Security Deposit</span><span class="info-value">${pt.security_deposit > 0 ? '₹' + Number(pt.security_deposit).toLocaleString('en-IN') : '—'}</span></div>
            <div class="info-row">
                <span class="info-label">Agreement Doc</span>
                <span class="info-value">${pt.agreement_submitted ? '<span class="badge badge-green"><i class="fas fa-check me-1"></i>Submitted</span>' : '<span class="badge badge-gray">Not Submitted</span>'}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Application Doc</span>
                <span class="info-value">${pt.application_submitted ? '<span class="badge badge-green"><i class="fas fa-check me-1"></i>Submitted</span>' : '<span class="badge badge-gray">Not Submitted</span>'}</span>
            </div>
        </div>

        <!-- KYC Documents Card -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-id-card" style="color:#3b82f6"></i>
                KYC Documents
                <span style="margin-left:auto">${statusBadge(kycStatus)}</span>
            </div>
            <div style="font-size:12px;color:#64748b;margin-bottom:14px">
                Upload clear photos of your documents. Aadhaar front &amp; back, PAN card are required for KYC approval.
            </div>
            ${docRows}
        </div>
    `;
}

async function uploadKYCDoc(docType, input) {
    const btn = document.getElementById('uploadBtn_' + docType);
    if (btn) { btn.style.opacity = '.5'; btn.style.pointerEvents = 'none'; }
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('File too large. Max 5MB.'); if (btn) { btn.style.opacity='1'; btn.style.pointerEvents=''; } return; }
    const fd = new FormData();
    fd.append('file', file);
    fd.append('document_type', docType);
    try {
        const res = await fetch(`${API}/kyc/upload`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() },
            body: fd
        });
        const d = await res.json();
        if (d.success || res.ok) {
            alert('Document uploaded successfully! It is now pending staff review.');
            loadPage();
        } else {
            alert('Upload failed: ' + (d.detail || d.message || 'Please try again.'));
            if (btn) { btn.style.opacity='1'; btn.style.pointerEvents=''; }
        }
    } catch (e) {
        alert('Network error. Please try again.');
        if (btn) { btn.style.opacity='1'; btn.style.pointerEvents=''; }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (typeof PartnerSidebar !== 'undefined') {
        PartnerSidebar.init(document.getElementById('partnerSidebarRoot'));
    }
    loadPage();
});
</script>
</body>
</html>
