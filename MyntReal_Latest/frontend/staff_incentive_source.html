<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incentive Source Verification</title>
<link rel="stylesheet" href="/public/css/staff-portal.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { background:#f8fafc; font-family:'Inter',sans-serif; margin:0; padding:0; }
  .page-wrap { max-width:1100px; margin:0 auto; padding:24px 20px 48px; }
  .page-header { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:18px 22px; margin-bottom:20px; display:flex; align-items:flex-start; gap:14px; }
  .page-header-icon { width:42px; height:42px; border-radius:8px; background:#e0e7ff; display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:#4f46e5; flex-shrink:0; }
  .page-header-info { flex:1; }
  .page-header h1 { margin:0 0 3px; font-size:1.05rem; font-weight:700; color:#1e293b; }
  .page-header .meta { font-size:0.8rem; color:#6b7280; display:flex; flex-wrap:wrap; gap:10px; }
  .meta-chip { background:#f1f5f9; border-radius:4px; padding:2px 8px; font-weight:500; }
  .meta-chip.purple { background:#ede9fe; color:#6d28d9; }
  .meta-chip.blue { background:#dbeafe; color:#1d4ed8; }
  .meta-chip.green { background:#dcfce7; color:#15803d; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden; }
  .card-body { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  thead th { background:#f8fafc; padding:9px 12px; text-align:left; font-weight:600; color:#64748b; font-size:0.72rem; text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
  tbody tr { border-bottom:1px solid #f1f5f9; transition:background .12s; }
  tbody tr:hover { background:#fafafa; }
  td { padding:9px 12px; vertical-align:middle; }
  .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:0.7rem; font-weight:600; }
  .badge-self { background:#fef3c7; color:#92400e; }
  .badge-co { background:#e0e7ff; color:#3730a3; }
  .badge-crm { background:#f0fdf4; color:#15803d; }
  .badge-direct { background:#fdf4ff; color:#7e22ce; }
  .name-cell { font-weight:600; color:#1e293b; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .phone-cell { color:#6b7280; font-size:0.78rem; }
  .source-cell { color:#6b7280; font-size:0.76rem; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .role-cell { color:#0891b2; font-size:0.78rem; }
  .amount-cell { text-align:right; font-weight:600; color:#059669; }
  .date-cell { color:#6b7280; font-size:0.78rem; white-space:nowrap; }
  .view-link { color:#7c3aed; font-size:0.75rem; white-space:nowrap; }
  .view-link:hover { text-decoration:underline; }
  .empty-state { text-align:center; padding:60px 20px; color:#9ca3af; }
  .empty-state i { font-size:2.5rem; margin-bottom:12px; display:block; }
  .loading-state { text-align:center; padding:60px 20px; color:#6b7280; }
  .error-state { text-align:center; padding:40px 20px; color:#ef4444; }
  .back-btn { display:inline-flex; align-items:center; gap:6px; color:#6b7280; font-size:0.82rem; text-decoration:none; border:1px solid #e5e7eb; border-radius:6px; padding:6px 12px; background:#fff; cursor:pointer; margin-bottom:16px; transition:background .15s; }
  .back-btn:hover { background:#f1f5f9; }
  .sno { color:#9ca3af; font-size:0.72rem; }
  .summary-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .sum-card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:10px 16px; min-width:120px; }
  .sum-card .val { font-size:1.2rem; font-weight:700; color:#1e293b; }
  .sum-card .lbl { font-size:0.72rem; color:#6b7280; margin-top:1px; }
</style>
</head>
<body>

<div class="page-wrap">
  <button class="back-btn" onclick="window.close()"><i class="fa fa-times"></i> Close Tab</button>

  <div class="page-header">
    <div class="page-header-icon"><i class="fa fa-list-check"></i></div>
    <div class="page-header-info">
      <h1 id="pg-title">Loading source data…</h1>
      <div class="meta" id="pg-meta"></div>
    </div>
  </div>

  <div class="summary-bar" id="sum-bar" style="display:none;"></div>

  <div class="card">
    <div class="card-body">
      <div id="table-wrap">
        <div class="loading-state"><i class="fa fa-spinner fa-spin fa-2x mb-2"></i><br>Loading records…</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const CAT_LABEL = {
  training:'ETC Students', solar:'Solar', ev_b2c:'EV B2C', ev_b2b:'EV B2B',
  ev_b2b_new:'EV B2B (New)', ev_b2b_existing:'EV B2B (Existing)',
  insurance:'Insurance', real_estate:'Real Estate'
};

function authHdr() {
  const t = localStorage.getItem('staff_token') || sessionStorage.getItem('staff_token') || '';
  return { 'Content-Type':'application/json', 'Authorization': t ? 'Bearer ' + t : '' };
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtNum(n) {
  const x = parseFloat(n);
  if (isNaN(x)) return '0';
  return x.toLocaleString('en-IN', { maximumFractionDigits: 0 });
}

async function loadData() {
  const params = new URLSearchParams(window.location.search);
  const empId    = params.get('employee_id');
  const slug     = params.get('category_slug');
  const month    = parseInt(params.get('month'));
  const year     = parseInt(params.get('year'));
  const compId   = parseInt(params.get('company_id')) || 0;
  const empName  = decodeURIComponent(params.get('emp_name') || '');
  const catLabel = CAT_LABEL[slug] || decodeURIComponent(params.get('cat_label') || slug || '');

  document.title = `Source · ${catLabel} · ${empName}`;
  document.getElementById('pg-title').textContent = `Source Verification — ${catLabel}`;
  document.getElementById('pg-meta').innerHTML = `
    <span class="meta-chip purple">${esc(empName)}</span>
    <span class="meta-chip blue">${MONTHS[month]||''} ${year}</span>
    ${compId ? `<span class="meta-chip">Company ${compId}</span>` : '<span class="meta-chip">All Companies</span>'}
  `;

  if (!empId || !slug || !month || !year) {
    document.getElementById('table-wrap').innerHTML = '<div class="error-state"><i class="fa fa-exclamation-circle fa-2x mb-2"></i><br>Missing parameters</div>';
    return;
  }

  try {
    let url = `${API}/staff/incentive-achievements/drilldown?month=${month}&year=${year}&employee_id=${empId}&category_slug=${slug}`;
    if (compId) url += `&company_id=${compId}`;
    const r = await fetch(url, { headers: authHdr() });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${r.status}`);
    }
    const d = await r.json();
    if (!d.success) throw new Error(d.message || 'Failed');
    renderTable(d);
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<div class="error-state"><i class="fa fa-exclamation-circle fa-2x mb-2"></i><br>${esc(e.message)}</div>`;
  }
}

// Map category slug → tab key used by mnr-leads-master
const SLUG_TAB = {
  training:'etc', solar:'solar', ev_b2c:'ev_b2c',
  ev_b2b:'ev_b2b', ev_b2b_new:'ev_b2b', ev_b2b_existing:'ev_b2b',
  insurance:'insurance', real_estate:'real_dreams', real_dreams:'real_dreams',
};

function renderTable(d) {
  const rows = d.data || [];
  const urlP   = new URLSearchParams(window.location.search);
  const slug   = urlP.get('category_slug') || '';
  const month  = parseInt(urlP.get('month'));
  const year   = parseInt(urlP.get('year'));
  const empId  = urlP.get('employee_id') || '';
  const empName = decodeURIComponent(urlP.get('emp_name') || '');
  const tabKey = SLUG_TAB[slug] || 'solar';

  // Build date range for the month (YYYY-MM-01 … YYYY-MM-last)
  const pad  = n => String(n).padStart(2,'0');
  const lastDay = new Date(year, month, 0).getDate();
  const dateFrom = `${year}-${pad(month)}-01`;
  const dateTo   = `${year}-${pad(month)}-${pad(lastDay)}`;
  // "View in CRM" → /staff/leads pre-filtered to the incentive month + employee
  const crmUrl = `/staff/leads?inc_month=${month}&inc_year=${year}&inc_employee_id=${empId}&inc_emp_name=${encodeURIComponent(empName)}`;

  // incentive_total = sum of incentive_count (may be > rows.length for multi-role direct students)
  const incentiveTotal = d.incentive_total != null ? d.incentive_total : rows.reduce((s,r) => s+(r.incentive_count||1), 0);
  const selfCount = rows.filter(r => r.lead_type === 'Self').reduce((s,r) => s+(r.incentive_count||1), 0);
  const coCount   = rows.filter(r => r.lead_type === 'Company').reduce((s,r) => s+(r.incentive_count||1), 0);
  const totalDV   = rows.reduce((s, r) => s + (r.deal_value||0), 0);
  const sumBar = document.getElementById('sum-bar');
  sumBar.style.display = 'flex';
  sumBar.innerHTML = `
    <div class="sum-card"><div class="val">${incentiveTotal}</div><div class="lbl">Incentive Count</div></div>
    <div class="sum-card"><div class="val">${rows.length}</div><div class="lbl">Unique Records</div></div>
    <div class="sum-card"><div class="val">${coCount}</div><div class="lbl">Company Leads</div></div>
    <div class="sum-card"><div class="val">${selfCount}</div><div class="lbl">Self Leads</div></div>
    ${totalDV > 0 ? `<div class="sum-card"><div class="val" style="color:#059669;">₹${fmtNum(totalDV)}</div><div class="lbl">Total Deal Value</div></div>` : ''}
  `;

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i>No source records found for this period.</div>';
    return;
  }

  const tableRows = rows.map((r, i) => {
    const typeBadge = r.lead_type === 'Self'
      ? '<span class="badge badge-self">Self</span>'
      : '<span class="badge badge-co">Company</span>';
    const recBadge = r.record_type === 'crm_lead'
      ? '<span class="badge badge-crm">CRM Lead</span>'
      : '<span class="badge badge-direct">ETC Direct</span>';
    const roles  = (r.roles||[]).join(', ') || '—';
    const dv     = r.deal_value > 0 ? `₹${fmtNum(r.deal_value)}` : '—';
    const date   = r.completion_date ? r.completion_date.slice(0,10) : '—';
    const cnt    = (r.incentive_count||1);
    const cntBadge = cnt > 1
      ? ` <span title="Counts ${cnt}× (${roles})" style="background:#fef3c7;color:#92400e;font-size:0.68rem;padding:1px 5px;border-radius:3px;font-weight:700;">×${cnt}</span>`
      : '';
    const link   = r.record_type === 'crm_lead'
      ? `<a class="view-link" href="${crmUrl}" target="_blank"><i class="fa fa-external-link-alt"></i> View in CRM</a>`
      : '—';
    return `<tr>
      <td class="sno">${i+1}</td>
      <td><div class="name-cell" title="${esc(r.name||'')}">${esc(r.name||'—')}${cntBadge}</div></td>
      <td class="phone-cell">${esc(r.phone||'—')}</td>
      <td>${typeBadge}</td>
      <td class="role-cell">${esc(roles)}</td>
      <td class="source-cell" title="${esc(r.source||'')}">${esc(r.source||'—')}</td>
      <td class="amount-cell">${dv}</td>
      <td class="date-cell">${date}</td>
      <td>${recBadge}</td>
      <td>${link}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Type</th>
          <th>Role</th>
          <th>Source</th>
          <th style="text-align:right;">Deal Value</th>
          <th>Completed</th>
          <th>Record</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
  `;
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
