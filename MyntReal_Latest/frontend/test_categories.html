<!DOCTYPE html>
<html>
<head>
    <title>Test Categories Endpoint</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Category Endpoint Test</h1>
    <p>Testing if categories API is working...</p>
    <div id="result"></div>
    
    <script>
        const authToken = sessionToken || localStorage.getItem('authToken') || '';
        const resultDiv = document.getElementById('result');
        
        async function testCategories() {
            resultDiv.innerHTML = '<p>⏳ Loading categories...</p>';
            
            try {
                const response = await fetch('/api/v1/feedback/categories', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const categories = await response.json();
                
                resultDiv.innerHTML = `
                    <p class="success">✅ SUCCESS! Found ${categories.length} categories:</p>
                    <pre>${JSON.stringify(categories, null, 2)}</pre>
                    <p><strong>Auth Token (first 20 chars):</strong> ${authToken.substring(0, 20)}...</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ ERROR: ${error.message}</p>
                    <p><strong>Auth Token Present:</strong> ${authToken ? 'Yes' : 'No'}</p>
                    <p><strong>Auth Token (first 20 chars):</strong> ${authToken.substring(0, 20)}...</p>
                `;
            }
        }
        
        testCategories();
    </script>
</body>
</html>
