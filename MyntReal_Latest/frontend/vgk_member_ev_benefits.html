<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Benefits · VGK4U Member</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>body{background:#f6f9fc;font-family:'Segoe UI',sans-serif}.topbar{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:18px}.btn-link-white{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:8px;text-decoration:none;font-size:13px}.section-card{background:#fff;border-radius:12px;padding:20px;margin:18px;box-shadow:0 2px 6px rgba(0,0,0,.05)}.muted{color:#64748b;font-size:13px}.empty{padding:40px;text-align:center;color:#94a3b8}table.table-vgk th{font-size:11px;text-transform:uppercase;color:#64748b;background:#f1f5f9;font-weight:700;border-bottom:2px solid #cbd5e1}</style></head>
<body><script src="/audience-tabs.js" data-page="vgk_member_ev_benefits" data-flag="ev_benefits_vgk4u_enabled"></script><div class="topbar"><div class="brand"><i class="bi bi-ev-station-fill"></i> VGK4U · EV Benefits</div><a href="/vgk/dashboard" class="btn-link-white"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
<div class="section-card"><h6 class="muted text-uppercase mb-2">EV Scooter / Benefit Claims</h6><div class="table-responsive"><table class="table table-vgk table-sm"><thead><tr><th>Date</th><th>Model</th><th>Benefit</th><th>Status</th></tr></thead><tbody id="rows"><tr><td class="empty" colspan="4">Loading…</td></tr></tbody></table></div></div>
<script>const TOKEN=localStorage.getItem('vgkAuthToken')||localStorage.getItem('authToken')||'';
const AUD=()=>(window.AudienceTabs&&window.AudienceTabs.current())||'vgk4u';
function fmt(n){return '₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}
async function load(){try{const r=await fetch(`/api/v1/ev/benefits?audience=${AUD()}`,{headers:TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}});const j=await r.json();const rows=j.items||j.benefits||j.claims||[];const el=document.getElementById('rows');if(!rows.length){el.innerHTML='<tr><td class="empty" colspan="4"><i class="bi bi-inbox"></i> No EV benefits yet.</td></tr>';return}
el.innerHTML=rows.map(e=>`<tr><td>${(e.created_at||e.date||'').slice(0,10)}</td><td>${e.model||e.scooter_model||'—'}</td><td>${fmt(e.benefit||e.amount)}</td><td>${e.status||'—'}</td></tr>`).join('')}catch(e){document.getElementById('rows').innerHTML=`<tr><td class="empty" colspan="4">Failed to load: ${e.message}</td></tr>`}}document.addEventListener('audience:changed',load);load();</script></body></html>
