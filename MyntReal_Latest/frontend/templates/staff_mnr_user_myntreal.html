<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNR — Myntreal | Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="/public/css/dark-theme.css" rel="stylesheet">
    <script src="/public/js/staff-token-manager.js"></script>
    <script src="/public/js/staff-fetch.js"></script>
    <script src="/staff_header.js"></script>
    <style>
        body { background: #0f172a; min-height: 100vh; }
        .main-content { margin-left: 260px; padding: 24px; transition: margin-left 0.3s ease; padding-top: 88px; }
        body.sidebar-collapsed-mode .main-content { margin-left: 70px; }
        @media (max-width: 768px) { .main-content { margin-left: 0 !important; } }
        .mnr-search-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 12px; }
        .mnr-search-card .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        .nav-tabs { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-tabs .nav-link { color: #adb5bd; border: none; border-bottom: 3px solid transparent; font-size: 0.9rem; padding: 10px 20px; }
        .nav-tabs .nav-link.active { color: #ffc107; border-bottom-color: #ffc107; background: transparent; }
        .nav-tabs .nav-link:hover { color: #fff; }
        .stat-card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 15px; text-align: center; }
        .stat-value { font-size: 1.3rem; font-weight: 700; }
        .data-card { background: rgba(255, 255, 255, 0.03); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 3px solid #ffc107; }
        .data-card:hover { background: rgba(255, 255, 255, 0.06); }
        .table-dark-custom { --bs-table-bg: #1e293b; --bs-table-color: #f1f5f9; --bs-table-border-color: rgba(148,163,184,0.25); }
        .table-dark-custom th { background: rgba(255, 193, 7, 0.15) !important; color: #ffc107 !important; font-weight: 600; }
        .table-dark-custom td { background: #1e293b !important; color: #f1f5f9 !important; border-color: rgba(148,163,184,0.2) !important; }
        .badge-approved { background: #22c55e; }
        .badge-pending { background: #f59e0b; }
        .badge-draft { background: #6b7280; }
    </style>
</head>
<body class="dark-theme">
    <div id="staffSidebar"></div>
    <div id="headerContainer"></div>

    <main class="main-content" id="main-content">
        <div class="container-fluid py-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="text-warning mb-0"><i class="fas fa-gem me-2"></i>MNR — Myntreal</h2>
                    <p class="text-muted mb-0">View member property referrals and MyntReal earnings</p>
                </div>
            </div>

            <div class="mnr-search-card p-4 mb-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <label class="form-label text-warning fw-bold"><i class="fas fa-search me-2"></i>Search MNR ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted">MNR</span>
                            <input type="text" class="form-control" id="mnr-id-input" placeholder="Enter member ID" style="text-transform: uppercase;">
                            <button class="btn btn-warning" type="button" id="search-btn"><i class="fas fa-search me-1"></i> Search</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div id="member-info" style="display: none;" class="p-3 bg-dark rounded">
                            <h5 class="mb-0 text-white" id="member-name">-</h5>
                            <small class="text-muted" id="member-id-display">-</small>
                        </div>
                    </div>
                </div>
            </div>

            <div id="content-area" style="display: none;">
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link active" href="#" data-tab="properties"><i class="fas fa-building me-1"></i>Properties</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-tab="earnings"><i class="fas fa-coins me-1"></i>Service Activity Overview</a></li>
                </ul>

                <div class="row mb-4" id="stats-row">
                    <div class="col-md-4"><div class="stat-card"><div class="stat-value text-warning" id="total-properties">0</div><div class="text-muted small">Total Properties</div></div></div>
                    <div class="col-md-4"><div class="stat-card"><div class="stat-value text-success" id="total-earnings">₹0</div><div class="text-muted small">Total Earnings</div></div></div>
                    <div class="col-md-4"><div class="stat-card"><div class="stat-value text-info" id="pending-earnings">₹0</div><div class="text-muted small">Pending Earnings</div></div></div>
                </div>

                <div id="content-list"></div>
            </div>

            <div id="no-member-message" class="text-center py-5">
                <i class="fas fa-search fa-4x text-muted mb-4"></i>
                <h4 class="text-muted">Enter an MNR ID to view MyntReal data</h4>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/staff-token-manager.js"></script>
    <script src="/public/js/staff-fetch.js"></script>
    <script src="/staff_sidebar.js"></script>
    
    <script>
        let currentMnrId = null;
        let currentTab = 'properties';
        let propertiesData = null;
        let earningsData = null;

        document.addEventListener('DOMContentLoaded', function() {
            StaffSidebar.init();
            StaffHeader.inject('MNR — Myntreal', 'fas fa-gem');

            document.getElementById('search-btn').addEventListener('click', searchMember);
            document.getElementById('mnr-id-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchMember(); });
            
            document.querySelectorAll('.nav-tabs .nav-link').forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.nav-tabs .nav-link').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    if (currentMnrId) loadData();
                });
            });

            const urlParams = new URLSearchParams(window.location.search);
            const mnrParam = urlParams.get('mnr_id');
            if (mnrParam) { document.getElementById('mnr-id-input').value = mnrParam; searchMember(); }
        });

        async function searchMember() {
            let mnrId = document.getElementById('mnr-id-input').value.trim().toUpperCase();
            if (!mnrId) return;
            // DC Protocol: Sanitize input - only allow alphanumeric chars to prevent URL injection
            mnrId = mnrId.replace(/[^A-Z0-9]/g, '');
            if (!mnrId) return;
            if (!mnrId.startsWith('MNR')) mnrId = 'MNR' + mnrId;
            // Validate MNR ID format (MNR followed by numbers, max 20 chars)
            if (!/^MNR\d{1,17}$/.test(mnrId)) {
                alert('Please enter a valid MNR ID (e.g., MNR123456)');
                return;
            }
            currentMnrId = mnrId;
            
            document.getElementById('member-info').style.display = 'block';
            document.getElementById('member-id-display').textContent = mnrId;
            document.getElementById('content-area').style.display = 'block';
            document.getElementById('no-member-message').style.display = 'none';
            
            await loadBothTabs();
            renderData();
        }

        async function loadBothTabs() {
            try {
                const [propRes, earnRes] = await Promise.all([
                    staffFetch(`/api/v1/staff/mnr-user/myntreal/${currentMnrId}?tab=properties`),
                    staffFetch(`/api/v1/staff/mnr-user/myntreal/${currentMnrId}?tab=earnings`)
                ]);
                
                if (propRes.ok) propertiesData = await propRes.json();
                if (earnRes.ok) earningsData = await earnRes.json();
                
                document.getElementById('member-name').textContent = propertiesData?.member_info?.name || earningsData?.member_info?.name || currentMnrId;
                
                document.getElementById('total-properties').textContent = propertiesData?.data?.total || 0;
                document.getElementById('total-earnings').textContent = '₹' + (earningsData?.data?.total_earnings || 0).toLocaleString('en-IN');
                document.getElementById('pending-earnings').textContent = '₹' + (earningsData?.data?.pending_earnings || 0).toLocaleString('en-IN');
            } catch (error) {
                console.error('[DC-MYNTREAL] Error loading data:', error);
            }
        }

        async function loadData() {
            renderData();
        }

        function renderData() {
            const list = document.getElementById('content-list');
            
            if (currentTab === 'properties') {
                const properties = propertiesData?.data?.properties || [];
                if (properties.length === 0) {
                    list.innerHTML = '<div class="text-center py-5 text-muted"><i class="fas fa-building fa-3x mb-3"></i><p>No property referrals found</p></div>';
                    return;
                }
                
                list.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-dark-custom">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Mobile</th>
                                    <th>Category</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${properties.map(p => `
                                    <tr>
                                        <td>${p.id}</td>
                                        <td>${p.name || '-'}</td>
                                        <td>${p.mobile || '-'}</td>
                                        <td>${p.category || '-'}</td>
                                        <td><span class="badge bg-${p.status === 'converted' ? 'success' : p.status === 'pending' ? 'warning' : 'secondary'}">${p.status}</span></td>
                                        <td>${p.created_at ? new Date(p.created_at).toLocaleDateString('en-IN') : '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                const earnings = earningsData?.data?.earnings || [];
                if (earnings.length === 0) {
                    list.innerHTML = '<div class="text-center py-5 text-muted"><i class="fas fa-coins fa-3x mb-3"></i><p>No MyntReal earnings found</p></div>';
                    return;
                }
                
                list.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-dark-custom">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Lead ID</th>
                                    <th>Revenue</th>
                                    <th>Service Activity Overview</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${earnings.map(e => `
                                    <tr>
                                        <td>${e.id}</td>
                                        <td>${e.lead_id || '-'}</td>
                                        <td>₹${(e.revenue_amount || 0).toLocaleString('en-IN')}</td>
                                        <td class="text-success fw-bold">₹${(e.mnr_amount || 0).toLocaleString('en-IN')}</td>
                                        <td><span class="badge badge-${e.status}">${e.status}</span></td>
                                        <td>${e.created_at ? new Date(e.created_at).toLocaleDateString('en-IN') : '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
