<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNR — Audit Log | Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="/public/css/dark-theme.css" rel="stylesheet">
    <script src="/staff_header.js"></script>
    <style>
        .filter-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 12px; }
        .filter-card .form-control, .filter-card .form-select { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        .audit-row { background: rgba(255, 255, 255, 0.03); padding: 12px 15px; margin-bottom: 6px; border-radius: 6px; border-left: 3px solid #6c757d; }
        .audit-row.view { border-left-color: #17a2b8; }
        .audit-row.search { border-left-color: #ffc107; }
        .audit-row.export { border-left-color: #28a745; }
    
        </style>
</head>
<body class="dark-theme">
    <div id="staffSidebar"></div>

        <div id="headerContainer"></div>

    <main class="main-content" id="main-content">
        <div class="container-fluid py-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="text-warning mb-0"><i class="fas fa-clipboard-list me-2"></i>Staff Access Audit Log</h2>
                    <p class="text-muted mb-0">Track all staff access to member data</p>
                </div>
            </div>

            <div class="filter-card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label text-warning">MNR ID</label>
                        <input type="text" class="form-control" id="filter-mnr-id" placeholder="Filter by MNR ID" style="text-transform: uppercase;">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-warning">Staff Employee</label>
                        <input type="text" class="form-control" id="filter-staff" placeholder="Filter by employee code">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-warning">Action Type</label>
                        <select class="form-select" id="filter-action">
                            <option value="">All Actions</option>
                            <option value="view">View</option>
                            <option value="search">Search</option>
                            <option value="export">Export</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-warning">Date From</label>
                        <input type="date" class="form-control" id="filter-from">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-warning">Date To</label>
                        <input type="date" class="form-control" id="filter-to">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12 text-end">
                        <button class="btn btn-outline-secondary me-2" id="clear-btn"><i class="fas fa-times me-1"></i>Clear</button>
                        <button class="btn btn-warning" id="search-btn"><i class="fas fa-search me-1"></i>Search</button>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <span class="text-muted">Total records: <span id="total-count" class="text-white">0</span></span>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-sm btn-outline-success" id="export-btn"><i class="fas fa-download me-1"></i>Export CSV</button>
                </div>
            </div>

            <div id="audit-list"></div>

            <nav class="mt-4">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/staff-token-manager.js"></script>
    <script src="/public/js/staff-fetch.js"></script>
    <script src="/staff_sidebar.js"></script>
    
    <script>
        let currentPage = 1;
        const pageSize = 20;

        document.addEventListener('DOMContentLoaded', function() {
            StaffSidebar.init();
            StaffHeader.inject('Staff Access Audit Log', 'fas fa-clipboard-list');

            document.getElementById('search-btn').addEventListener('click', () => { currentPage = 1; loadAuditLogs(); });
            document.getElementById('clear-btn').addEventListener('click', clearFilters);
            document.getElementById('export-btn').addEventListener('click', exportCSV);
            
            ['filter-mnr-id', 'filter-staff', 'filter-action', 'filter-from', 'filter-to'].forEach(id => {
                document.getElementById(id).addEventListener('keypress', e => { if (e.key === 'Enter') { currentPage = 1; loadAuditLogs(); } });
            });
            
            loadAuditLogs();
        });

        async function loadAuditLogs() {
            const params = new URLSearchParams({
                page: currentPage,
                page_size: pageSize
            });
            
            const mnrId = document.getElementById('filter-mnr-id').value.trim().toUpperCase();
            const staff = document.getElementById('filter-staff').value.trim();
            const action = document.getElementById('filter-action').value;
            const fromDate = document.getElementById('filter-from').value;
            const toDate = document.getElementById('filter-to').value;
            
            if (mnrId) params.append('mnr_id', mnrId);
            if (staff) params.append('staff_code', staff);
            if (action) params.append('action_type', action);
            if (fromDate) params.append('from_date', fromDate);
            if (toDate) params.append('to_date', toDate);
            
            try {
                const response = await staffFetch(`/api/v1/staff/mnr-user/audit-log?${params}`);
                if (!response.ok) throw new Error('Failed to load audit logs');
                const data = await response.json();
                
                document.getElementById('total-count').textContent = data.total || 0;
                
                const list = document.getElementById('audit-list');
                if (!data.logs || data.logs.length === 0) {
                    list.innerHTML = '<div class="text-center py-4 text-muted"><i class="fas fa-clipboard-list fa-3x mb-3"></i><p>No audit logs found</p></div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                
                list.innerHTML = data.logs.map(log => `
                    <div class="audit-row ${log.action_type}">
                        <div class="row align-items-center">
                            <div class="col-md-3">
                                <span class="text-white fw-bold">${log.staff_name || 'Unknown'}</span>
                                <div class="text-muted small">${log.emp_code || '-'}</div>
                            </div>
                            <div class="col-md-2">
                                <span class="badge bg-${log.action_type === 'view' ? 'info' : log.action_type === 'search' ? 'warning' : 'success'}">${log.action_type}</span>
                            </div>
                            <div class="col-md-2">
                                <span class="text-warning">${log.mnr_id || '-'}</span>
                            </div>
                            <div class="col-md-3">
                                <span class="text-muted small">${log.page || '-'}</span>
                            </div>
                            <div class="col-md-2 text-end">
                                <span class="text-muted small">${log.created_at ? new Date(log.created_at).toLocaleString() : '-'}</span>
                            </div>
                        </div>
                        ${log.details ? `<div class="text-muted small mt-1">${log.details}</div>` : ''}
                    </div>
                `).join('');
                
                renderPagination(data.total, data.page, data.page_size);
            } catch (error) {
                document.getElementById('audit-list').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
            }
        }

        function renderPagination(total, page, size) {
            const totalPages = Math.ceil(total / size);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            
            let html = '';
            html += `<li class="page-item ${page === 1 ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${page - 1}">Prev</a></li>`;
            
            for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) {
                html += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
            }
            
            html += `<li class="page-item ${page === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" data-page="${page + 1}">Next</a></li>`;
            
            pagination.innerHTML = html;
            
            pagination.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const newPage = parseInt(this.dataset.page);
                    if (newPage >= 1 && newPage <= totalPages) {
                        currentPage = newPage;
                        loadAuditLogs();
                    }
                });
            });
        }

        function clearFilters() {
            document.getElementById('filter-mnr-id').value = '';
            document.getElementById('filter-staff').value = '';
            document.getElementById('filter-action').value = '';
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value = '';
            currentPage = 1;
            loadAuditLogs();
        }

        async function exportCSV() {
            try {
                const params = new URLSearchParams();
                const mnrId = document.getElementById('filter-mnr-id').value.trim().toUpperCase();
                const staff = document.getElementById('filter-staff').value.trim();
                const action = document.getElementById('filter-action').value;
                const fromDate = document.getElementById('filter-from').value;
                const toDate = document.getElementById('filter-to').value;
                
                if (mnrId) params.append('mnr_id', mnrId);
                if (staff) params.append('staff_code', staff);
                if (action) params.append('action_type', action);
                if (fromDate) params.append('from_date', fromDate);
                if (toDate) params.append('to_date', toDate);
                params.append('export', 'csv');
                
                const response = await staffFetch(`/api/v1/staff/mnr-user/audit-log?${params}`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mnr_user_audit_log_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            } catch (error) {
                alert('Export failed: ' + error.message);
            }
        }
    </script>
</body>
</html>
