<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNR — VGK4U | Staff Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="/public/css/dark-theme.css" rel="stylesheet">
    <script src="/staff_header.js"></script>
    <style>
        .mnr-search-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 12px; }
        .mnr-search-card .form-control { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        .nav-tabs .nav-link { color: #adb5bd; border: none; border-bottom: 2px solid transparent; }
        .nav-tabs .nav-link.active { color: #ffc107; border-bottom-color: #ffc107; background: transparent; }
        .data-card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 15px; margin-bottom: 12px; border-left: 3px solid #17a2b8; }
    
        </style>
</head>
<body class="dark-theme">
    <div id="staffSidebar"></div>

        <div id="headerContainer"></div>

    <main class="main-content" id="main-content">
        <div class="container-fluid py-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="text-warning mb-0"><i class="fas fa-bolt me-2"></i>VGK4U</h2>
                    <p class="text-muted mb-0">View VGK4U segment data</p>
                </div>
            </div>

            <div class="mnr-search-card p-4 mb-4">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <label class="form-label text-warning fw-bold"><i class="fas fa-search me-2"></i>Search MNR ID</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted">MNR</span>
                            <input type="text" class="form-control" id="mnr-id-input" placeholder="Enter member ID" style="text-transform: uppercase;">
                            <button class="btn btn-warning" type="button" id="search-btn"><i class="fas fa-search me-1"></i> Search</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div id="member-info" style="display: none;" class="p-3" style="background: rgba(255, 193, 7, 0.1); border-radius: 8px;">
                            <h5 class="mb-0 text-white" id="member-name">-</h5>
                            <small class="text-muted" id="member-id-display">-</small>
                        </div>
                    </div>
                </div>
            </div>

            <div id="content-area" style="display: none;">
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link active" href="#" data-tab="dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-tab="workings">Workings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-tab="earnings">Earnings</a></li>
                </ul>

                <div class="row mb-4">
                    <div class="col-md-3"><div class="stat-box p-3 rounded text-center" style="background: rgba(255, 255, 255, 0.05);"><div class="h4 text-info mb-0" id="zynova-level">-</div><div class="text-muted small">Level</div></div></div>
                    <div class="col-md-3"><div class="stat-box p-3 rounded text-center" style="background: rgba(255, 255, 255, 0.05);"><div class="h4 text-warning mb-0" id="zynova-points">0</div><div class="text-muted small">Points</div></div></div>
                    <div class="col-md-3"><div class="stat-box p-3 rounded text-center" style="background: rgba(255, 255, 255, 0.05);"><div class="h4 text-success mb-0" id="zynova-earnings">₹0</div><div class="text-muted small">Total Earnings</div></div></div>
                    <div class="col-md-3"><div class="stat-box p-3 rounded text-center" style="background: rgba(255, 255, 255, 0.05);"><div class="h4 text-primary mb-0" id="zynova-team">0</div><div class="text-muted small">Team Size</div></div></div>
                </div>

                <div id="content-list"></div>
            </div>

            <div id="no-member-message" class="text-center py-5">
                <i class="fas fa-search fa-4x text-muted mb-4"></i>
                <h4 class="text-muted">Enter an MNR ID to view VGK4U data</h4>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/staff-token-manager.js"></script>
    <script src="/public/js/staff-fetch.js"></script>
    <script src="/staff_sidebar.js"></script>
    
    <script>
        let currentMnrId = null;
        let currentTab = 'dashboard';

        document.addEventListener('DOMContentLoaded', function() {
            StaffSidebar.init();
            StaffHeader.inject('VGK4U', 'fas fa-bolt');

            document.getElementById('search-btn').addEventListener('click', searchMember);
            document.getElementById('mnr-id-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchMember(); });
            
            document.querySelectorAll('.nav-tabs .nav-link').forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.nav-tabs .nav-link').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    if (currentMnrId) loadData();
                });
            });

            const urlParams = new URLSearchParams(window.location.search);
            const mnrParam = urlParams.get('mnr_id');
            if (mnrParam) { document.getElementById('mnr-id-input').value = mnrParam; searchMember(); }
        });

        async function searchMember() {
            let mnrId = document.getElementById('mnr-id-input').value.trim().toUpperCase();
            if (!mnrId) return;
            if (!mnrId.startsWith('MNR')) mnrId = 'MNR' + mnrId;
            currentMnrId = mnrId;
            
            document.getElementById('member-info').style.display = 'block';
            document.getElementById('member-id-display').textContent = mnrId;
            document.getElementById('content-area').style.display = 'block';
            document.getElementById('no-member-message').style.display = 'none';
            
            loadData();
        }

        async function loadData() {
            try {
                const response = await staffFetch(`/api/v1/staff/mnr-user/zynova/${currentMnrId}?tab=${currentTab}`);
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                
                document.getElementById('member-name').textContent = data.member_info?.name || currentMnrId;
                
                if (data.summary) {
                    document.getElementById('zynova-level').textContent = data.summary.level || '-';
                    document.getElementById('zynova-points').textContent = (data.summary.points || 0).toLocaleString();
                    document.getElementById('zynova-earnings').textContent = '₹' + (data.summary.earnings || 0).toLocaleString('en-IN');
                    document.getElementById('zynova-team').textContent = data.summary.team || 0;
                }
                
                const list = document.getElementById('content-list');
                if (!data.items || data.items.length === 0) {
                    list.innerHTML = '<div class="text-center py-4 text-muted"><i class="fas fa-bolt fa-3x mb-3"></i><p>No data found</p></div>';
                    return;
                }
                
                list.innerHTML = data.items.map(item => `
                    <div class="data-card d-flex justify-content-between">
                        <div>
                            <span class="text-white">${item.description || item.type}</span>
                            <span class="text-muted ms-2 small">${item.segment || ''}</span>
                        </div>
                        <div class="text-end">
                            <span class="text-${item.amount >= 0 ? 'success' : 'info'} fw-bold">${item.amount ? '₹' + Math.abs(item.amount).toLocaleString('en-IN') : item.points ? item.points + ' pts' : ''}</span>
                            <div class="text-muted small">${item.date ? new Date(item.date).toLocaleDateString() : ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('content-list').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
