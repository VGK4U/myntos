<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Partner Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="/public/js/partner-token-manager.js"></script>
    <script src="/partner_sidebar.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
        .partner-main-content { margin-left: 260px; padding: 32px 24px; min-height: 100vh; }
        @media (max-width: 768px) { .partner-main-content { margin-left: 0; padding: 16px; } }
        .page-header {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            color: #fff;
            padding: 22px 28px;
            border-radius: 12px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .page-header i { font-size: 1.6rem; opacity: .85; }
        .page-header h4 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .page-header p { margin: 0; font-size: 13px; opacity: .8; }
        .card-form {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            max-width: 480px;
            padding: 32px;
        }
        .form-label { font-size: 13px; font-weight: 600; color: #374151; }
        .form-control { font-size: 14px; border-radius: 8px; border: 1px solid #d1d5db; padding: 10px 14px; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        .input-group .toggle-pw {
            background: #f9fafb; border: 1px solid #d1d5db; border-left: none;
            cursor: pointer; border-radius: 0 8px 8px 0; padding: 0 14px; color: #6b7280;
        }
        .input-group .toggle-pw:hover { color: #374151; }
        .btn-save {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: #fff; border: none; border-radius: 8px;
            padding: 11px 32px; font-weight: 600; font-size: 14px;
            width: 100%; transition: opacity .2s;
        }
        .btn-save:hover { opacity: .9; color: #fff; }
        .btn-save:disabled { opacity: .6; }
        .alert-msg { border-radius: 8px; font-size: 13px; display: none; margin-top: 16px; }
        .req-list { font-size: 12px; color: #6b7280; margin-top: 6px; padding-left: 16px; }
        .req-list li { margin-bottom: 2px; }
    </style>
</head>
<body>
<div id="sidebarContainer"></div>
<div class="partner-main-content">
    <div class="page-header">
        <i class="fas fa-key"></i>
        <div>
            <h4>Change Password</h4>
            <p>Update your partner portal password</p>
        </div>
    </div>

    <div class="card-form">
        <form id="cpForm" autocomplete="off" onsubmit="submitChange(event)">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <div class="input-group">
                    <input type="password" id="currentPw" class="form-control" placeholder="Enter current password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('currentPw', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <input type="password" id="newPw" class="form-control" placeholder="Enter new password" required minlength="6">
                    <button type="button" class="toggle-pw" onclick="togglePw('newPw', this)"><i class="fas fa-eye"></i></button>
                </div>
                <ul class="req-list">
                    <li>Minimum 6 characters</li>
                </ul>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPw" class="form-control" placeholder="Re-enter new password" required>
                    <button type="button" class="toggle-pw" onclick="togglePw('confirmPw', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-save" id="saveBtn"><i class="fas fa-save me-2"></i>Update Password</button>
            <div class="alert alert-success alert-msg" id="msgSuccess"><i class="fas fa-check-circle me-2"></i><span id="msgSuccessText">Password updated successfully.</span></div>
            <div class="alert alert-danger alert-msg" id="msgError"><i class="fas fa-exclamation-circle me-2"></i><span id="msgErrorText">An error occurred.</span></div>
        </form>
    </div>
</div>

<script>
    const API = '/api/v1/partner';
    function getToken() { return localStorage.getItem('partner_token'); }

    function togglePw(inputId, btn) {
        const inp = document.getElementById(inputId);
        const isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    async function submitChange(e) {
        e.preventDefault();
        const currentPw = document.getElementById('currentPw').value.trim();
        const newPw = document.getElementById('newPw').value;
        const confirmPw = document.getElementById('confirmPw').value;
        const saveBtn = document.getElementById('saveBtn');

        document.getElementById('msgSuccess').style.display = 'none';
        document.getElementById('msgError').style.display = 'none';

        if (newPw !== confirmPw) {
            document.getElementById('msgErrorText').textContent = 'New passwords do not match.';
            document.getElementById('msgError').style.display = 'block';
            return;
        }
        if (newPw.length < 6) {
            document.getElementById('msgErrorText').textContent = 'New password must be at least 6 characters.';
            document.getElementById('msgError').style.display = 'block';
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Updating...';

        try {
            const res = await fetch(`${API}/auth/change-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                body: JSON.stringify({ current_password: currentPw, new_password: newPw })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                document.getElementById('cpForm').reset();
                document.getElementById('msgSuccessText').textContent = data.message || 'Password updated successfully. Please log in again.';
                document.getElementById('msgSuccess').style.display = 'block';
                setTimeout(() => { window.location.href = '/partner/login'; }, 2500);
            } else {
                document.getElementById('msgErrorText').textContent = data.detail || data.message || 'Failed to update password.';
                document.getElementById('msgError').style.display = 'block';
            }
        } catch (err) {
            document.getElementById('msgErrorText').textContent = 'Network error. Please try again.';
            document.getElementById('msgError').style.display = 'block';
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save me-2"></i>Update Password';
        }
    }
</script>
</body>
</html>
