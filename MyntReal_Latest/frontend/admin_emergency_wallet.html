<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Wallet - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark bg-danger">
        <div class="container-fluid"><span class="navbar-brand"><i class="bi bi-exclamation-triangle-fill"></i> Emergency Wallet (CRITICAL)</span><a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Admin Dashboard</a></div>
    </nav>
    <div class="container mt-4">
        <div class="alert alert-danger"><strong>⚠️ WARNING:</strong> Only use in emergencies! All actions are logged.</div>
        <div class="card"><div class="card-body">
            <form id="walletForm">
                <div class="mb-3"><label>User MNR ID</label><input type="text" class="form-control" id="user_id" placeholder="MNR182364369" required></div>
                <div class="mb-3"><label>Action</label><select class="form-control" id="action"><option value="add">Add Funds</option><option value="deduct">Deduct Funds</option></select></div>
                <div class="mb-3"><label>Amount (₹)</label><input type="number" step="0.01" class="form-control" id="amount" required></div>
                <div class="mb-3"><label>Reason (Required)</label><textarea class="form-control" id="reason" rows="3" required></textarea></div>
                <button type="submit" class="btn btn-danger">Execute</button>
            </form>
        </div></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        $('#walletForm').on('submit',function(e){e.preventDefault();
            if(!confirm('Are you sure? This action is irreversible!'))return;
            $.ajax({url:`${API_BASE}/rvz/emergency-wallet/adjust`,method:'POST',headers:{'Authorization':`Bearer ${authToken}`,'Content-Type':'application/json'},
            data:JSON.stringify({user_id:$('#user_id').val(),action:$('#action').val(),amount:parseFloat($('#amount').val()),reason:$('#reason').val()}),
            success:()=>{alert('✅ Emergency wallet adjustment complete!');$('#walletForm')[0].reset()},error:()=>alert('❌ Failed')});
        });
    </script>
</body>
</html>
