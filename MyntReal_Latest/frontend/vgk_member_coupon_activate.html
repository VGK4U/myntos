<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Coupon — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #d97706, #d97706cc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-ticket-alt me-2"></i>Activate Coupon</h1>
      <p>Enter your coupon code to activate it.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="caForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:520px;margin:0 auto">
        <div class="mb-3"><label class="form-label fw-bold">Coupon Code *</label>
          <input class="form-control text-uppercase" id="caCode" maxlength="64" required style="font-size:18px;letter-spacing:2px;text-align:center"></div>
        <button type="submit" class="btn btn-warning w-100"><i class="fas fa-bolt me-2"></i>Activate</button>
      </form>
      <div id="caResult" class="mt-3" style="max-width:520px;margin:1rem auto"></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      $('#caForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const r = await fetch('/api/v1/vgk-member/coupons/activate?audience=vgk4u', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({coupon_code: $('#caCode').value.trim().toUpperCase()})
        });
        const d = await r.json();
        $('#caResult').innerHTML = r.ok
          ? `<div class="alert alert-success">${d.status === 'already_activated' ? 'Already activated.' : 'Activated!'}</div>`
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
      });
})();
</script>
</body>
</html>
