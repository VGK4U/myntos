<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Earners · VGK4U Member</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>body{background:#f6f9fc;font-family:'Segoe UI',sans-serif}.topbar{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:18px}.btn-link-white{color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:8px;text-decoration:none;font-size:13px}.section-card{background:#fff;border-radius:12px;padding:20px;margin:18px;box-shadow:0 2px 6px rgba(0,0,0,.05)}.muted{color:#64748b;font-size:13px}.empty{padding:40px;text-align:center;color:#94a3b8}.earner-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f1f5f9}.earner-row:last-child{border-bottom:0}.rank-badge{display:inline-flex;width:36px;height:36px;border-radius:50%;align-items:center;justify-content:center;font-weight:800;color:#fff;background:#0ea5e9;margin-right:12px}.rank-badge.r1{background:#facc15;color:#78350f}.rank-badge.r2{background:#94a3b8}.rank-badge.r3{background:#a8783a}</style></head>
<body><script src="/audience-tabs.js" data-page="vgk_member_top_earners" data-flag="top_earners_vgk4u_enabled"></script><div class="topbar"><div class="brand"><i class="bi bi-trophy-fill"></i> VGK4U · Top Earners</div><a href="/vgk/dashboard" class="btn-link-white"><i class="bi bi-arrow-left"></i> Dashboard</a></div>
<div class="section-card"><h6 class="muted text-uppercase mb-3">Latest VGK4U Top Earners (vgk_team_income_entries)</h6><div id="rows"><div class="empty">Loading…</div></div></div>
<script>const TOKEN=localStorage.getItem('vgkAuthToken')||localStorage.getItem('authToken')||'';
const AUD=()=>(window.AudienceTabs&&window.AudienceTabs.current())||'vgk4u';
function fmt(n){return '₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}
async function load(){try{const r=await fetch(`/api/v1/banners/top-performers?audience=${AUD()}`,{headers:TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}});const j=await r.json();const rows=j.top_performers||j.users||j.data||[];const el=document.getElementById('rows');if(!rows.length){el.innerHTML='<div class="empty"><i class="bi bi-inbox"></i> No VGK4U top earners yet.</div>';return}
el.innerHTML=rows.map((u,i)=>{const rank=u.rank||(i+1);const rc=rank<=3?`r${rank}`:'';return `<div class="earner-row"><div><span class="rank-badge ${rc}">${rank}</span><strong>${u.name||u.user_id||'—'}</strong> <span class="muted">${u.badge||''}</span></div><div><strong>${fmt(u.total_earnings)}</strong></div></div>`}).join('')}catch(e){document.getElementById('rows').innerHTML=`<div class="empty">Failed to load: ${e.message}</div>`}}document.addEventListener('audience:changed',load);load();</script></body></html>
