<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards - Admin Panel</title>
<!-- [DC-T33] VGK4U audience tabs (auto-mount + jQuery audience injector) --><script src="/audience-tabs.js"></script></head>
<body>
    <div class="container-fluid mt-4">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="fas fa-trophy text-warning"></i> Awards Management</h2>
                <p class="text-muted mb-0">View user awards and achievements</p>
            </div>
        <a href="/admin/dashboard" class="btn btn-primary btn-sm">
                <i class="fas fa-home me-2"></i>Go to Dashboard
            </a>
            </div>

        <!-- User Filter Component -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-filter"></i> Filter by User ID
            </div>
            <div class="card-body">
                <form id="userFilterForm" class="row g-3">
                    <div class="col-md-8">
                        <label for="userIdInput" class="form-label">Enter User ID (MNR ID)</label>
                        <input type="text" class="form-control" id="userIdInput" 
                               placeholder="e.g., MNR182364369 or MNR1800143" 
                               pattern="MNR[0-9]{7,9}" 
                               title="Enter a valid MNR ID">
                        <div class="form-text">Leave empty to view your own data</div>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" id="applyFilterBtn" class="btn btn-primary w-100">
                            <i class="fas fa-search"></i> Apply Filter
                        </button>
                    </div>
                </form>
                <div id="filterInfo" class="mt-3" style="display: none;">
                    <div class="alert alert-info mb-0">
                        <i class="fas fa-info-circle"></i> 
                        Showing data for: <strong id="filteredUserId"></strong>
                        <button type="button" class="btn btn-sm btn-outline-secondary ms-2" onclick="clearUserFilter()">
                            <i class="fas fa-times"></i> Clear Filter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Awards Tabs -->
        <ul class="nav nav-tabs mb-4" id="awardsTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="direct-tab" data-bs-toggle="tab" data-bs-target="#direct" type="button">
                    <i class="fas fa-user-plus"></i> Direct Facilitation Awards
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="matching-tab" data-bs-toggle="tab" data-bs-target="#matching" type="button">
                    <i class="fas fa-handshake"></i> Group Performance Recognition Awards
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bonanza-tab" data-bs-toggle="tab" data-bs-target="#bonanza" type="button">
                    <i class="fas fa-gift"></i> Bonanza Campaigns
                </button>
            </li>
        </ul>

        <div class="tab-content" id="awardsTabContent">
            <!-- Direct Awards Tab -->
            <div class="tab-pane fade show active" id="direct" role="tabpanel">
                <div id="directAwardsLoading" class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-3">Loading direct awards...</p>
                </div>
                <div id="directAwardsContent" style="display: none;"></div>
            </div>

            <!-- Matching Awards Tab -->
            <div class="tab-pane fade" id="matching" role="tabpanel">
                <div id="matchingAwardsLoading" class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-3">Loading matching awards...</p>
                </div>
                <div id="matchingAwardsContent" style="display: none;"></div>
            </div>

            <!-- Bonanza Tab -->
            <div class="tab-pane fade" id="bonanza" role="tabpanel">
                <div id="bonanzaLoading" class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-3">Loading bonanza campaigns...</p>
                </div>
                <div id="bonanzaContent" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="/public/js/admin-id-utils.js"></script>
<script>
        const urlParams = new URLSearchParams(window.location.search);
        let filteredUserId = urlParams.get('user_id');

        // Initialize filter
        if (filteredUserId) {
            const normalized = normalizeAdminUserId(filteredUserId);
            document.getElementById('userIdInput').value = normalized;
            document.getElementById('filteredUserId').textContent = normalized;
            filteredUserId = normalized;
            document.getElementById('filterInfo').style.display = 'block';
        }

        // Handle filter form
        document.getElementById('userFilterForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const userId = normalizeAdminUserId(document.getElementById('userIdInput').value);
            const currentUrl = new URL(window.location.href);
            if (userId) {
                currentUrl.searchParams.set('user_id', userId);
            } else {
                currentUrl.searchParams.delete('user_id');
            }
            window.location.href = currentUrl.toString();
        });

        function clearUserFilter() {
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.delete('user_id');
            window.location.href = currentUrl.toString();
        }

        // Load awards data
        async function loadAwardsData() {
            // Admin must select a user via filter - don't use admin's own ID
            const userId = filteredUserId;
            
            if (!userId) {
                document.getElementById('directAwardsLoading').innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-user-check fa-4x text-muted mb-3"></i>
                        <h4 class="text-muted">Please Select a User</h4>
                        <p class="text-muted">Use the filter above to select a user and view their awards data.</p>
                    </div>`;
                document.getElementById('matchingAwardsLoading').style.display = 'none';
                return;
            }

            try {
                // Load Direct Awards
                const directResponse = await fetch(`${window.BACKEND_URL}/award_management/user/${userId}/direct-awards`, {
                    headers: { 'Authorization': `Bearer ${window.sessionToken}` }
                });
                
                if (directResponse.ok) {
                    const directData = await directResponse.json();
                    displayDirectAwards(directData.direct_awards || [], directData.user_info);
                }

                // Load Matching Awards  
                const matchingResponse = await fetch(`${window.BACKEND_URL}/award_management/user/${userId}/matching-awards`, {
                    headers: { 'Authorization': `Bearer ${window.sessionToken}` }
                });
                
                if (matchingResponse.ok) {
                    const matchingData = await matchingResponse.json();
                    displayMatchingAwards(matchingData.matching_awards || [], matchingData.user_info);
                }

                // Load Bonanza Campaigns
                const bonanzaResponse = await fetch(`${window.BACKEND_URL}/bonanza/user/${userId}/bonanzas`, {
                    headers: { 'Authorization': `Bearer ${window.sessionToken}` }
                });
                
                if (bonanzaResponse.ok) {
                    const bonanzaData = await bonanzaResponse.json();
                    displayBonanzas(bonanzaData.bonanzas || [], bonanzaData.user_id);
                }
            } catch (error) {
                console.error('Error loading awards:', error);
                document.getElementById('directAwardsLoading').innerHTML = `
                    <div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Error loading awards</div>`;
            }
        }

        function displayDirectAwards(awards, userInfo) {
            const content = document.getElementById('directAwardsContent');
            document.getElementById('directAwardsLoading').style.display = 'none';
            content.style.display = 'block';
            
            if (awards.length === 0) {
                content.innerHTML = '<div class="alert alert-info">No direct awards configured</div>';
                return;
            }

            content.innerHTML = `
                <div class="row">
                    ${awards.map(award => `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 ${award.achieved ? 'border-success' : 'border-secondary'}">
                                <div class="card-header ${award.achieved ? 'bg-success text-white' : 'bg-light'}">
                                    <h5 class="mb-0"><i class="fas fa-trophy"></i> ${award.award_name || 'Award'}</h5>
                                </div>
                                <div class="card-body">
                                    <p class="text-muted">${award.description || ''}</p>
                                    <div class="mb-3">
                                        <strong>Progress:</strong> ${award.current_progress || 0} / ${award.required_amount || 0}
                                        <div class="progress mt-2">
                                            <div class="progress-bar ${award.achieved ? 'bg-success' : 'bg-primary'}" 
                                                 style="width: ${award.progress_percentage || 0}%"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <span class="badge ${award.achieved ? 'bg-success' : 'bg-secondary'}">
                                            ${award.achieved ? 'Achieved ✓' : 'In Progress'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function displayMatchingAwards(awards, userInfo) {
            const content = document.getElementById('matchingAwardsContent');
            document.getElementById('matchingAwardsLoading').style.display = 'none';
            content.style.display = 'block';
            
            if (awards.length === 0) {
                content.innerHTML = '<div class="alert alert-info">No matching awards configured</div>';
                return;
            }

            content.innerHTML = `
                <div class="row">
                    ${awards.map(award => `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 ${award.achieved ? 'border-success' : 'border-secondary'}">
                                <div class="card-header ${award.achieved ? 'bg-success text-white' : 'bg-light'}">
                                    <h5 class="mb-0"><i class="fas fa-handshake"></i> ${award.award_name || 'Award'}</h5>
                                </div>
                                <div class="card-body">
                                    <p class="text-muted">${award.description || ''}</p>
                                    <div class="mb-3">
                                        <strong>Progress:</strong> ${award.current_progress || 0} / ${award.required_amount || 0}
                                        <div class="progress mt-2">
                                            <div class="progress-bar ${award.achieved ? 'bg-success' : 'bg-primary'}" 
                                                 style="width: ${award.progress_percentage || 0}%"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <span class="badge ${award.achieved ? 'bg-success' : 'bg-secondary'}">
                                            ${award.achieved ? 'Achieved ✓' : 'In Progress'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Load on page load
        function displayBonanzas(bonanzas, userId) {
            const content = document.getElementById('bonanzaContent');
            document.getElementById('bonanzaLoading').style.display = 'none';
            content.style.display = 'block';
            
            if (bonanzas.length === 0) {
                content.innerHTML = '<div class="alert alert-info">No bonanza campaigns available</div>';
                return;
            }

            content.innerHTML = `
                <div class="row">
                    ${bonanzas.map(bonanza => `
                        <div class="col-md-6 mb-4">
                            <div class="card h-100 ${bonanza.achieved ? 'border-success' : bonanza.is_expired ? 'border-danger' : 'border-info'}">
                                <div class="card-header ${bonanza.achieved ? 'bg-success text-white' : bonanza.is_expired ? 'bg-secondary text-white' : 'bg-info text-white'}">
                                    <h5 class="mb-0"><i class="fas fa-gift"></i> ${bonanza.name || 'Bonanza'}</h5>
                                </div>
                                <div class="card-body">
                                    <p class="text-muted"><strong>Type:</strong> ${bonanza.criteria_type.replace('_', ' ')}</p>
                                    <div class="mb-3">
                                        <strong>Target:</strong> ${bonanza.target_requirement}
                                        <br><strong>Progress:</strong> ${bonanza.current_progress || 0}
                                        <div class="progress mt-2">
                                            <div class="progress-bar ${bonanza.achieved ? 'bg-success' : 'bg-primary'}" 
                                                 style="width: ${bonanza.achievement_percentage || 0}%"></div>
                                        </div>
                                        <small class="text-muted">${bonanza.achievement_percentage || 0}% complete</small>
                                    </div>
                                    <div class="mb-2">
                                        <strong>Reward:</strong> 
                                        ${bonanza.is_monetary ? '₹' + (bonanza.reward_amount || 0).toLocaleString() : bonanza.award_name || 'Award'}
                                    </div>
                                    <div>
                                        <span class="badge ${bonanza.status === 'Achieved' ? 'bg-success' : bonanza.status === 'In Progress' ? 'bg-primary' : 'bg-secondary'}">
                                            ${bonanza.status}
                                        </span>
                                    </div>
                                    <small class="text-muted d-block mt-2">
                                        ${new Date(bonanza.start_date).toLocaleDateString()} - ${new Date(bonanza.end_date).toLocaleDateString()}
                                    </small>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', loadAwardsData);
    </script>
</body>
</html>
