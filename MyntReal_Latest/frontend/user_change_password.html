<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings - MNR Business Access Program</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .password-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .password-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .password-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .password-header h2 {
            color: #333;
            font-weight: 600;
        }
        .form-label {
            font-weight: 500;
            color: #555;
        }
        .form-control {
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 12px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-change {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-change:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653b8a 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-back {
            background: white;
            border: 2px solid #e0e0e0;
            color: #555;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-back:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .alert {
            border-radius: 8px;
            border: none;
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .password-requirements {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 8px;
        }
        .password-requirements li {
            margin-bottom: 4px;
        }
        .requirement-met {
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="password-card">
        <div class="password-header">
            <i class="bi bi-key-fill"></i>
            <h2>Change Password</h2>
            <p class="text-muted mb-0">Update your account password</p>
        </div>

        <div id="alertContainer"></div>

        <form id="passwordChangeForm" onsubmit="handlePasswordChange(event)">
            <div class="mb-3">
                <label for="currentPassword" class="form-label">
                    <i class="bi bi-lock"></i> Current Password
                </label>
                <input type="password" class="form-control" id="currentPassword" required
                       placeholder="Enter your current password">
            </div>

            <div class="mb-3">
                <label for="newPassword" class="form-label">
                    <i class="bi bi-key"></i> New Password
                </label>
                <input type="password" class="form-control" id="newPassword" required
                       placeholder="Enter new password (min 6 characters)"
                       minlength="6" oninput="checkPasswordStrength()">
                <div class="password-strength" id="passwordStrength"></div>
                <ul class="password-requirements">
                    <li id="req-length">At least 6 characters</li>
                </ul>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">
                    <i class="bi bi-check-circle"></i> Confirm New Password
                </label>
                <input type="password" class="form-control" id="confirmPassword" required
                       placeholder="Re-enter new password" minlength="6">
            </div>

            <button type="submit" class="btn btn-change mb-3" id="submitBtn">
                <i class="bi bi-shield-check me-2"></i>Change Password
            </button>
            
            <button type="button" class="btn btn-back" onclick="goBack()">
                <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
            </button>
        </form>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthBar = document.getElementById('passwordStrength');
            const reqLength = document.getElementById('req-length');
            
            if (password.length >= 6) {
                strengthBar.style.width = '100%';
                strengthBar.style.backgroundColor = '#28a745';
                reqLength.classList.add('requirement-met');
            } else {
                const percentage = (password.length / 6) * 100;
                strengthBar.style.width = percentage + '%';
                strengthBar.style.backgroundColor = '#ffc107';
                reqLength.classList.remove('requirement-met');
            }
        }

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            alertContainer.innerHTML = `
                <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        async function handlePasswordChange(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showAlert('error', 'New passwords do not match!');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('error', 'Password must be at least 6 characters long!');
                return;
            }

            if (currentPassword === newPassword) {
                showAlert('error', 'New password must be different from current password!');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Changing...';

            try {
                const response = await fetch('/api/v1/auth/change-password', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showAlert('success', result.message || 'Password changed successfully!');
                    document.getElementById('passwordChangeForm').reset();
                    document.getElementById('passwordStrength').style.width = '0%';
                    
                    setTimeout(() => {
                        goBack();
                    }, 2000);
                } else {
                    showAlert('error', result.detail || result.message || 'Failed to change password');
                }
            } catch (error) {
                console.error('Password change error:', error);
                showAlert('error', 'Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-shield-check me-2"></i>Change Password';
            }
        }

        function goBack() {
            const role = localStorage.getItem('user_role') || 'user';
            
            if (role === 'Admin' || role === 'admin') {
                window.location.href = '/admin/dashboard';
            } else if (role === 'Super Admin' || role === 'super_admin') {
                window.location.href = '/superadmin/dashboard';
            } else if (role === 'Finance Admin' || role === 'finance_admin') {
                window.location.href = '/finance/dashboard';
            } else if (role === 'RVZ ID' || role === 'vgk_id') {
                window.location.href = '/rvz/dashboard';
            } else {
                window.location.href = '/dashboard';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
