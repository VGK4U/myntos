<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Popup Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body style="background:#f8f9fa">
    <nav class="navbar navbar-dark" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
        <div class="container-fluid">
            <span class="navbar-brand">Popup Management</span>
            <div>
                <a href="/admin/banners" class="btn btn-outline-light btn-sm me-2">Banners</a>
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-4"><div id="popupsList"></div></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_BASE='/api/v1';let authToken=localStorage.getItem('authToken');
        $.ajax({url:`${API_BASE}/banners/popups`,headers:{'Authorization':`Bearer ${authToken}`},
        success:function(r){
            const popups = Array.isArray(r) ? r : ((r && r.popups) || []);
            if(popups.length > 0) {
                $('#popupsList').html(popups.map(p=>`<div class="card mb-2 p-3"><strong>${p.title}</strong> - ${p.status}</div>`).join(''));
            } else {
                $('#popupsList').html('<div class="alert alert-info">No popups found</div>');
            }
        },
        error:()=>$('#popupsList').html('<div class="alert alert-danger">Error loading popups</div>')});
    </script>
</body>
</html>
