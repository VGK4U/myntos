<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #7c3aed, #7c3aedcc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="profile_edit_vgk4u_enabled" data-label="Profile Edit"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-user-edit me-2"></i>Edit Profile</h1>
      <p>Update your contact details. Changes are audit-logged.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="prForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:640px;margin:0 auto">
        <div class="mb-3"><label class="form-label">Full Name</label><input class="form-control" id="prName" maxlength="200"></div>
        <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" id="prPhone" maxlength="20"></div>
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" id="prEmail"></div>
        <div class="mb-3"><label class="form-label">Address</label><textarea class="form-control" id="prAddr" rows="2" maxlength="500"></textarea></div>
        <div class="row">
          <div class="col-md-4 mb-3"><label class="form-label">Pincode</label><input class="form-control" id="prPin" maxlength="10"></div>
          <div class="col-md-4 mb-3"><label class="form-label">City</label><input class="form-control" id="prCity"></div>
          <div class="col-md-4 mb-3"><label class="form-label">State</label><input class="form-control" id="prState"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Save Changes</button>
      </form>
      <div id="prResult" class="mt-3" style="max-width:640px;margin:1rem auto"></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      $('#prForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const payload = {};
        const fields = {full_name:'#prName',phone:'#prPhone',email:'#prEmail',address:'#prAddr',pincode:'#prPin',city:'#prCity',state:'#prState'};
        Object.entries(fields).forEach(([k,sel]) => {
          const v = $(sel).value.trim(); if (v) payload[k] = v;
        });
        if (!Object.keys(payload).length) { $('#prResult').innerHTML='<div class="alert alert-info">Nothing to update.</div>'; return; }
        const r = await fetch('/api/v1/vgk-member/profile/edit?audience=vgk4u', {
          method: 'PUT', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#prResult').innerHTML = r.ok
          ? `<div class="alert alert-success">Saved. Updated: ${(d.updated_fields||[]).join(', ')}</div>`
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
      });
})();
</script>
</body>
</html>
