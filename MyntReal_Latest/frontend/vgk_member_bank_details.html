<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Details — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #2563eb, #2563ebcc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="bank_vgk4u_enabled" data-label="Bank Details"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-university me-2"></i>Bank Details</h1>
      <p>Submit your bank account for payouts. Two-stage admin verification.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="bkForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:640px;margin:0 auto">
        <div class="mb-3"><label class="form-label fw-bold">Account Number *</label>
          <input class="form-control" id="bkAcc" required></div>
        <div class="mb-3"><label class="form-label fw-bold">IFSC *</label>
          <input class="form-control text-uppercase" id="bkIfsc" required></div>
        <div class="mb-3"><label class="form-label fw-bold">Account Holder Name *</label>
          <input class="form-control" id="bkHolder" required></div>
        <div class="mb-3"><label class="form-label">Bank Name</label>
          <input class="form-control" id="bkBank"></div>
        <div class="mb-3"><label class="form-label">Branch</label>
          <input class="form-control" id="bkBranch"></div>
        <div class="mb-3"><label class="form-label">UPI ID</label>
          <input class="form-control" id="bkUpi" placeholder="name@upi"></div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Submit for Verification</button>
      </form>
      <div id="bkResult" class="mt-3" style="max-width:640px;margin:1rem auto"></div>
      <h5 class="mt-4 mb-3" style="max-width:640px;margin:1rem auto">Current Status</h5>
      <div id="bkCurrent" style="max-width:640px;margin:0 auto"></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      async function loadCurrent() {
        const r = await fetch('/api/v1/vgk-member/bank/my-details?audience=vgk4u', { credentials: 'include' });
        if (!r.ok) { $('#bkCurrent').innerHTML = '<div class="alert alert-warning">Module disabled or unauthorized.</div>'; return; }
        const d = await r.json();
        if (!d.details) { $('#bkCurrent').innerHTML = '<div class="text-muted">No bank details on file.</div>'; return; }
        const x = d.details;
        $('#bkCurrent').innerHTML = `
          <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px">
            <div><strong>Account:</strong> ${x.bank_account_number}</div>
            <div><strong>IFSC:</strong> ${x.bank_ifsc_code}</div>
            <div><strong>Holder:</strong> ${x.bank_account_holder}</div>
            <div><strong>Bank:</strong> ${x.bank_name || '—'} ${x.bank_branch_name ? '· ' + x.bank_branch_name : ''}</div>
            ${x.upi_id ? `<div><strong>UPI:</strong> ${x.upi_id}</div>` : ''}
            <div class="mt-2"><span class="badge bg-${x.status==='Verified'?'success':x.status==='Rejected'?'danger':'warning'}">${x.status}</span></div>
          </div>`;
      }
      $('#bkForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const payload = {
          bank_account_number: $('#bkAcc').value.trim(),
          bank_ifsc_code: $('#bkIfsc').value.trim().toUpperCase(),
          bank_account_holder: $('#bkHolder').value.trim(),
          bank_name: $('#bkBank').value.trim() || null,
          bank_branch_name: $('#bkBranch').value.trim() || null,
          upi_id: $('#bkUpi').value.trim() || null,
        };
        const r = await fetch('/api/v1/vgk-member/bank/submit?audience=vgk4u', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#bkResult').innerHTML = r.ok
          ? '<div class="alert alert-success">Submitted for two-stage verification.</div>'
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
        if (r.ok) loadCurrent();
      });
      loadCurrent();
})();
</script>
</body>
</html>
