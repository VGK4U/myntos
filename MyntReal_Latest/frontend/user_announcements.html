<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Updates - MNR Business Access Program</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- DC Protocol: MNR Lightbox moved to body to survive template head-stripping -->
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 0;
    }
    .main-container {
      display: flex;
      gap: 1.5rem;
    }
    .filter-sidebar {
      background: white;
      border-radius: 15px;
      padding: 1.5rem;
      width: 280px;
      height: fit-content;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .announcements-panel {
      flex: 1;
      background: white;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .announcement-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s;
    }
    .announcement-card:hover {
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .media-thumbnail {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .media-thumbnail:hover {
      transform: scale(1.05);
    }
    .video-thumbnail {
      position: relative;
    }
    .video-thumbnail::after {
      content: '\f04b';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 32px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .load-more-btn {
      width: 100%;
      padding: 1rem;
      margin-top: 1rem;
    }
    .rating-stars {
      color: #ffc107;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .rating-stars .star {
      cursor: pointer;
      transition: color 0.2s;
    }
    .rating-stars .star:hover {
      color: #ffb300;
    }
    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #f8f9fa;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-right: 0.5rem;
    }
    .share-btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    .share-btn-copy {
      background: #3b82f6;
      color: white;
    }
    .share-btn-copy:hover {
      background: #2563eb;
    }
    .share-btn-whatsapp {
      background: #25D366;
      color: white;
    }
    .share-btn-whatsapp:hover {
      background: #20bd5a;
    }
    .user-info {
      background: #f0f7ff;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      .filter-sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid px-4">
    <div class="main-container">
      <!-- Filter Sidebar -->
      <div class="filter-sidebar">
        <h5 class="mb-3"><i class="fas fa-filter me-2"></i>Filters</h5>
        
        <!-- Category Filter -->
        <div class="mb-3">
          <label class="form-label fw-bold">Category</label>
          <select class="form-select" id="categoryFilter">
            <option value="">All Categories</option>
          </select>
        </div>

        <!-- Date Range Filter -->
        <div class="mb-3">
          <label class="form-label fw-bold">Date Range</label>
          <input type="date" class="form-control mb-2" id="startDate" placeholder="Start Date">
          <input type="date" class="form-control" id="endDate" placeholder="End Date">
        </div>

        <!-- City Filter -->
        <div class="mb-3">
          <label class="form-label fw-bold">City/Location</label>
          <input type="text" class="form-control" id="cityFilter" placeholder="e.g., Bangalore">
        </div>

        <!-- User ID Filter -->
        <div class="mb-3">
          <label class="form-label fw-bold">User ID</label>
          <input type="text" class="form-control" id="userIdFilter" placeholder="e.g., MNR1800143">
        </div>

        <!-- User Name Filter -->
        <div class="mb-3">
          <label class="form-label fw-bold">User Name</label>
          <input type="text" class="form-control" id="userNameFilter" placeholder="Search by name">
        </div>

        <button class="btn btn-primary w-100 mb-2" id="applyFilters">
          <i class="fas fa-search me-1"></i>Apply Filters
        </button>
        <button class="btn btn-outline-secondary w-100" id="clearFilters">
          <i class="fas fa-times me-1"></i>Clear Filters
        </button>
      </div>

      <!-- Announcements Panel -->
      <div class="announcements-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>📢 Community Updates</h2>
          <div class="text-muted" id="announcementCount">0 announcements</div>
        </div>

        <div id="announcementsList"></div>

        <button class="btn btn-outline-primary load-more-btn" id="loadMoreBtn" style="display: none;">
          <i class="fas fa-chevron-down me-1"></i>Load More
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/public/js/admin-id-utils.js"></script>
<script>
    // Inject sessionToken into sessionStorage for module access
    if (typeof sessionToken !== 'undefined') {
      sessionStorage.setItem('session_token', sessionToken);
    }
  </script>
  <script type="module">
    import { feedbackApi, showToast, showSpinner, showEmptyState, formatDate, showMediaLightbox } from '/shared/feedback/feedbackShared.js';

    let allAnnouncements = [];
    let displayedCount = 12;
    const loadIncrement = 12;

    // Load data on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await loadCategories();
      await loadAnnouncements();
    });

    async function loadCategories() {
      try {
        const categories = await feedbackApi.getCategories();
        const select = document.getElementById('categoryFilter');
        categories.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat.id;
          option.textContent = cat.category_name;
          select.appendChild(option);
        });
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    }

    async function loadAnnouncements(filters = {}) {
      const container = document.getElementById('announcementsList');
      showSpinner(container);

      try {
        allAnnouncements = await feedbackApi.getAnnouncements(filters);
        window.announcementsData = allAnnouncements; // Store globally for lightbox
        displayedCount = loadIncrement;
        renderAnnouncements();
      } catch (error) {
        console.error('Error loading announcements:', error);
        showToast('Failed to load announcements', 'error');
        container.innerHTML = '<div class="alert alert-danger">Failed to load announcements. Please try again.</div>';
      }
    }

    function renderAnnouncements() {
      const container = document.getElementById('announcementsList');
      const items = allAnnouncements.slice(0, displayedCount);

      // Update count
      document.getElementById('announcementCount').textContent = 
        `${allAnnouncements.length} announcement${allAnnouncements.length !== 1 ? 's' : ''}`;

      if (allAnnouncements.length === 0) {
        showEmptyState(container, 'No announcements found', 'bullhorn');
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
      }

      container.innerHTML = items.map(announcement => {
        const categoryName = announcement.category ? announcement.category.category_name : 'General';
        const mediaHtml = announcement.media && announcement.media.length > 0
          ? `<div class="media-grid">
               ${announcement.media.map((m, idx) => {
                 const isVideo = m.media_type === 'video' || (m.file_type && m.file_type.startsWith('video/'));
                 // DC Protocol: Safari-compatible video with preload and time fragment for first frame
                 const safariVideoUrl = m.file_path + (m.file_path.includes('#') ? '' : '#t=0.001');
                 return isVideo
                   ? `<div class="video-thumbnail" onclick="openAnnouncementLightbox(${announcement.id}, ${idx})">
                        <video class="media-thumbnail" src="${safariVideoUrl}" preload="metadata" muted playsinline></video>
                      </div>`
                   : `<img class="media-thumbnail" src="${m.file_path}" onclick="openAnnouncementLightbox(${announcement.id}, ${idx})">`;
               }).join('')}
             </div>`
          : '';

        // Generate star rating display
        const stars = generateStarRating(announcement.average_rating || 0, announcement.id);
        
        // Escape HTML for safety
        const title = escapeHTML(announcement.title);
        const description = escapeHTML(announcement.description || '');
        const userName = escapeHTML(announcement.user_name || 'Unknown');
        const userId = escapeHTML(announcement.user_id || '');
        const city = escapeHTML(announcement.city || 'N/A');

        return `
          <div class="announcement-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h4 class="mb-1">${title}</h4>
              <span class="badge bg-primary">${categoryName}</span>
            </div>
            <p class="mb-3">${description}</p>
            ${mediaHtml}
            
            <!-- User Info -->
            <div class="user-info">
              <div class="row">
                <div class="col-md-4">
                  <strong><i class="fas fa-user me-1"></i>Posted By:</strong><br>
                  ${userName}
                </div>
                <div class="col-md-4">
                  <strong><i class="fas fa-id-card me-1"></i>User ID:</strong><br>
                  ${userId}
                </div>
                <div class="col-md-4">
                  <strong><i class="fas fa-map-marker-alt me-1"></i>Location:</strong><br>
                  ${city}
                </div>
              </div>
            </div>

            <!-- Stats & Rating -->
            <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap">
              <div class="d-flex align-items-center gap-2">
                <span class="stat-badge">
                  <i class="fas fa-star text-warning"></i>
                  ${(announcement.average_rating || 0).toFixed(1)} (${announcement.total_ratings || 0})
                </span>
                <span class="stat-badge">
                  <i class="fas fa-share-alt text-primary"></i>
                  ${announcement.shares_count || 0} shares
                </span>
              </div>
              <div class="rating-stars" data-announcement-id="${announcement.id}">
                ${stars}
              </div>
            </div>

            <!-- Reactions -->
            <div class="d-flex align-items-center gap-2 mt-3 flex-wrap" id="react_row_${announcement.id}">
              ${['like','love','celebrate'].map(type => {
                const emoji = type==='like'?'👍':type==='love'?'❤️':'🎉';
                const myR = localStorage.getItem('ua_ann_react_'+announcement.id)||'';
                const cnts = JSON.parse(localStorage.getItem('ua_ann_react_counts_'+announcement.id)||'{"like":0,"love":0,"celebrate":0}');
                const active = myR===type; const cnt = cnts[type]||0;
                return `<button onclick="uaReact(${announcement.id},'${type}')" style="display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1px solid ${active?'#6366f1':'#e5e7eb'};background:${active?'#eef2ff':'#f9fafb'};cursor:pointer;font-size:13px;color:#374151;font-weight:500;" title="${type}">${emoji}${cnt>0?`<span style="font-size:11px;color:#6b7280">${cnt}</span>`:''}</button>`;
              }).join('')}
            </div>

            <!-- Share Buttons -->
            <div class="d-flex gap-2 mt-2 flex-wrap">
              <a href="/public/announcement?id=${announcement.id}" target="_blank" class="share-btn" style="background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;text-decoration:none">
                <i class="fas fa-eye me-1"></i>View
              </a>
              <button class="share-btn share-btn-copy" onclick="copyShareLink(${announcement.id})">
                <i class="fas fa-link me-1"></i>Copy Link
              </button>
              <button class="share-btn share-btn-whatsapp" onclick="shareWhatsApp(${announcement.id})">
                <i class="fab fa-whatsapp me-1"></i>Share on WhatsApp
              </button>
            </div>

            <div class="mt-2 text-muted small">
              <i class="fas fa-clock me-1"></i>${formatDate(announcement.approved_at)}
            </div>
          </div>
        `;
      }).join('');

      // Load more button
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      loadMoreBtn.style.display = displayedCount < allAnnouncements.length ? 'block' : 'none';

      // Make viewMedia available globally
      window.viewMedia = (announcementId) => {
        const announcement = allAnnouncements.find(a => a.id === announcementId);
        if (announcement && announcement.media && announcement.media.length > 0) {
          showMediaLightbox(announcement.media);
        }
      };
    }

    // Load more button
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      displayedCount += loadIncrement;
      renderAnnouncements();
    });

    // Helper Functions
    function generateStarRating(rating, announcementId) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        const filled = i <= Math.round(rating);
        stars += `<span class="star" data-rating="${i}" data-announcement-id="${announcementId}" onclick="window.rateAnnouncement(${announcementId}, ${i})" style="cursor:pointer;">
          ${filled ? '★' : '☆'}
        </span>`;
      }
      return stars;
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Make rateAnnouncement globally available
    window.rateAnnouncement = async function(announcementId, rating) {
      try {
        const response = await fetch(`/api/v1/feedback/announcements/${announcementId}/rate?rating=${rating}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${sessionStorage.getItem('session_token')}`
          }
        });

        if (!response.ok) throw new Error('Failed to rate');
        
        showToast(`Rated ${rating} stars!`, 'success');
        // Reload to show updated rating
        await loadAnnouncements(getCurrentFilters());
      } catch (error) {
        console.error('Error rating:', error);
        showToast('Failed to submit rating', 'error');
      }
    };

    function getCurrentFilters() {
      return {
        category_id: document.getElementById('categoryFilter').value || undefined,
        start_date: document.getElementById('startDate').value || undefined,
        end_date: document.getElementById('endDate').value || undefined,
        city: document.getElementById('cityFilter').value || undefined,
        user_id: document.getElementById('userIdFilter').value || undefined,
        user_name: document.getElementById('userNameFilter').value || undefined
      };
    }

    window.uaReact = function(annId, type) {
      const rKey='ua_ann_react_'+annId, cKey='ua_ann_react_counts_'+annId;
      const prev=localStorage.getItem(rKey)||'';
      const counts=JSON.parse(localStorage.getItem(cKey)||'{"like":0,"love":0,"celebrate":0}');
      if(prev===type){ localStorage.removeItem(rKey); counts[type]=Math.max(0,(counts[type]||0)-1); }
      else { if(prev) counts[prev]=Math.max(0,(counts[prev]||0)-1); localStorage.setItem(rKey,type); counts[type]=(counts[type]||0)+1; }
      localStorage.setItem(cKey,JSON.stringify(counts));
      // Re-render just that row
      const row=document.getElementById('react_row_'+annId);
      if(row){
        const myR=localStorage.getItem(rKey)||'';
        const cnts=JSON.parse(localStorage.getItem(cKey)||'{"like":0,"love":0,"celebrate":0}');
        row.innerHTML=['like','love','celebrate'].map(t=>{
          const em=t==='like'?'👍':t==='love'?'❤️':'🎉';
          const act=myR===t, cnt=cnts[t]||0;
          return `<button onclick="uaReact(${annId},'${t}')" style="display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1px solid ${act?'#6366f1':'#e5e7eb'};background:${act?'#eef2ff':'#f9fafb'};cursor:pointer;font-size:13px;color:#374151;font-weight:500;" title="${t}">${em}${cnt>0?`<span style="font-size:11px;color:#6b7280">${cnt}</span>`:''}</button>`;
        }).join('');
      }
    };

    window.copyShareLink = (announcementId) => {
      const ann = window.announcementsData?.find(a => a.id === announcementId);
      if (ann && window.MyntShareModal) {
        MyntShareModal.shareAnnouncement({
          id:           ann.id,
          title:        ann.title,
          description:  ann.description || '',
          categoryName: ann.category?.category_name || 'MNR Business Access Program',
          userName:     ann.user_name || '',
          city:         ann.city || '',
        });
      } else {
        const link = `https://mnrteam.com/public/announcement?id=${announcementId}&shared=true`;
        navigator.clipboard?.writeText(link);
        showToast('Link copied!', 'success');
      }
    };

    window.shareWhatsApp = (announcementId) => {
      const ann = window.announcementsData?.find(a => a.id === announcementId);
      if (ann && window.MyntShareModal) {
        MyntShareModal.shareAnnouncement({
          id:           ann.id,
          title:        ann.title,
          description:  ann.description || '',
          categoryName: ann.category?.category_name || 'MNR Business Access Program',
          userName:     ann.user_name || '',
          city:         ann.city || '',
        });
      }
    };

    // Apply filters
    document.getElementById('applyFilters').addEventListener('click', () => {
      loadAnnouncements(getCurrentFilters());
    });

    // Clear filters
    document.getElementById('clearFilters').addEventListener('click', () => {
      document.getElementById('categoryFilter').value = '';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('cityFilter').value = '';
      document.getElementById('userIdFilter').value = '';
      document.getElementById('userNameFilter').value = '';
      loadAnnouncements();
    });

    // MNR Lightbox: Open media from announcement (DC Protocol)
    // Expose to window for inline onclick handlers (module scope fix)
    window.openAnnouncementLightbox = function openAnnouncementLightbox(announcementId, mediaIndex) {
      // Find the announcement in the loaded data
      const announcement = window.announcementsData?.find(a => a.id === announcementId);
      if (!announcement || !announcement.media || announcement.media.length === 0) {
        console.warn('[MNR Lightbox] Announcement or media not found');
        return;
      }

      // Parse media items for lightbox
      const mediaItems = announcement.media.map(m => ({
        url: m.file_path,
        file_type: m.file_type,
        type: (m.media_type === 'video' || (m.file_type && m.file_type.startsWith('video/'))) ? 'video' : 'image',
        title: announcement.title || 'Media'
      }));

      // Open lightbox at the clicked media index
      if (window.MNRLightbox && typeof window.MNRLightbox.open === 'function') {
        window.MNRLightbox.open(mediaItems, mediaIndex || 0);
      } else {
        console.warn('[MNR Lightbox] Component not loaded');
      }
    }
  </script>

  <!-- DC Protocol: MNR Lightbox Component - placed in body to survive template head-stripping -->
  <script src="/public/js/share-modal.js"></script>
  <script src="/public/js/mnr-lightbox.js"></script>
</body>
</html>
