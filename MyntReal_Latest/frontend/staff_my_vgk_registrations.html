<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My VGK Registrations — MNR Staff</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
<script src="/public/js/staff-token-manager.js"></script>
<script src="/public/js/staff-fetch.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; min-height: 100vh; }
.content-area { padding: 24px; }

/* Stats strip */
.stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
.stat-card { flex: 1; min-width: 150px; background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); text-align: center; }
.stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; letter-spacing: .05em; }
.stat-val   { font-size: 28px; font-weight: 800; color: #7c3aed; }
.stat-val.green { color: #059669; }
.stat-val.red   { color: #dc2626; }
.stat-val.blue  { color: #1d4ed8; }

/* Filter bar */
.filter-bar { background: white; border-radius: 12px; padding: 14px 18px; margin-bottom: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.fgroup { display: flex; flex-direction: column; gap: 3px; }
.fgroup label { font-size: 10.5px; font-weight: 700; color: #6b7280; text-transform: uppercase; }
.fgroup .form-control, .fgroup .form-select { font-size: 12.5px; padding: 6px 10px; border-radius: 7px; border: 1px solid #e5e7eb; min-width: 130px; }
.btn-filter { padding: 7px 16px; border-radius: 8px; border: none; font-size: 12.5px; font-weight: 700; cursor: pointer; }
.btn-filter.apply { background: #7c3aed; color: white; }
.btn-filter.reset { background: #f3f4f6; color: #374151; }
.btn-filter.apply:hover { background: #6d28d9; }

/* Table card */
.table-card { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
.table-card-header { padding: 14px 18px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.table-card-header h3 { font-size: 15px; font-weight: 700; color: #111827; margin: 0; }
.table-scroll-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
thead th { padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; background: #f9fafb; white-space: nowrap; }
tbody td { padding: 10px 14px; font-size: 12.5px; border-bottom: 1px solid #f9fafb; vertical-align: middle; }
tbody tr:hover { background: #faf5ff; }
.badge-active   { background: #d1fae5; color: #065f46; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-inactive { background: #fee2e2; color: #991b1b; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.pagination-bar { display: flex; gap: 6px; padding: 14px 18px; align-items: center; flex-wrap: wrap; }
.page-btn { padding: 4px 11px; border-radius: 6px; border: 1px solid #e5e7eb; background: white; font-size: 12px; cursor: pointer; }
.page-btn.active { background: #7c3aed; color: white; border-color: #7c3aed; font-weight: 700; }
.page-btn:hover:not(.active) { border-color: #7c3aed; color: #7c3aed; }
</style>
</head>
<body>
<nav id="staffSidebar"></nav>
<div class="main-content">
  <div id="headerContainer"></div>

  <div class="content-area">
    <!-- Sub-title strip -->
    <div style="margin-bottom:18px">
      <p id="empSubTitle" style="font-size:13px;color:#6b7280;margin:0">
        <i class="fas fa-spinner fa-spin me-1"></i>Loading…
      </p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Registered</div>
        <div class="stat-val" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-val green" id="statActive">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inactive</div>
        <div class="stat-val red" id="statInactive">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-val blue" id="statThisMonth">—</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="fgroup">
        <label>Status</label>
        <select class="form-select" id="statusFilter">
          <option value="">All</option>
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
      <button class="btn-filter apply" onclick="loadData(1)"><i class="fas fa-search me-1"></i>Search</button>
      <button class="btn-filter reset" onclick="resetFilters()">Reset</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <a href="/staff/vgk/members" style="padding:7px 14px;background:#ede9fe;color:#7c3aed;border-radius:8px;font-size:12.5px;font-weight:700;text-decoration:none">
          <i class="fas fa-arrow-left me-1"></i>Back to All Members
        </a>
      </div>
    </div>

    <!-- Members table -->
    <div class="table-card">
      <div class="table-card-header">
        <h3>
          <i class="fas fa-users me-2" style="color:#7c3aed"></i>My Registered Channel Partners
          <span id="totalBadge" style="background:#ede9fe;color:#7c3aed;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:8px">0</span>
        </h3>
      </div>
      <div class="table-scroll-wrap">
        <table>
          <thead>
            <tr>
              <th>Reg Date</th>
              <th>Code</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Status</th>
              <th>VGK Activated</th>
            </tr>
          </thead>
          <tbody id="membersTable">
            <tr><td colspan="7" style="text-align:center;padding:30px;color:#9ca3af"><i class="fas fa-spinner fa-spin me-2"></i>Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar" id="paginationBar"></div>
    </div>
  </div><!-- /.content-area -->
</div><!-- /.main-content -->

<div class="toast" id="toast"></div>
<script src="/staff_sidebar.js"></script>
<script src="/staff_header.js"></script>
<script>
const API = '/api/v1';
let currentPage = 1;

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' });
}

function fmtRole(role) {
  if (!role) return '<span style="color:#d1d5db">—</span>';
  const m = { CHANNEL_PARTNER: 'Channel Partner', SR_CHANNEL_PARTNER: 'Sr. Channel Partner', OFFICIAL_PARTNER: 'Official Partner' };
  return m[role] || role;
}

async function loadData(page = 1) {
  currentPage = page;
  const status = document.getElementById('statusFilter').value;
  let url = `${API}/vgk/my-registrations?page=${page}&page_size=25`;
  if (status !== '') url += `&is_active=${status}`;

  const tbody = document.getElementById('membersTable');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#9ca3af"><i class="fas fa-spinner fa-spin me-2"></i>Loading…</td></tr>';

  try {
    const d = await staffFetch(url).then(r => r.json());
    if (!d.success) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#dc2626">Failed to load data</td></tr>`;
      return;
    }

    document.getElementById('totalBadge').textContent = d.total;
    document.getElementById('statTotal').textContent     = d.total;
    document.getElementById('statThisMonth').textContent = d.this_month !== undefined ? d.this_month : '—';

    const rows = d.data || [];
    document.getElementById('statActive').textContent   = rows.filter(m => m.is_active).length;
    document.getElementById('statInactive').textContent = rows.filter(m => !m.is_active).length;

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#9ca3af">
        <i class="fas fa-user-plus" style="font-size:28px;margin-bottom:10px;display:block"></i>
        No Channel Partners registered yet.<br>
        <span style="font-size:12px">When you register new Channel Partners they appear here automatically.</span>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map(m => `<tr>
      <td style="font-size:11px;color:#374151;white-space:nowrap;font-weight:600">${fmtDate(m.created_at)}</td>
      <td><strong style="color:#7c3aed">${m.partner_code}</strong></td>
      <td style="font-weight:600">${m.partner_name}</td>
      <td style="color:#374151">${m.phone || '—'}</td>
      <td style="font-size:11.5px">${fmtRole(m.vgk_role)}</td>
      <td><span class="badge-${m.is_active ? 'active' : 'inactive'}">${m.is_active ? 'Active' : 'Inactive'}</span></td>
      <td style="font-size:11px;color:#6b7280;white-space:nowrap">${fmtDate(m.vgk_activated_at)}</td>
    </tr>`).join('');

    renderPagination(d.total, page);
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#dc2626">Error loading data</td></tr>`;
    console.error('[MyVGKReg] error:', e);
  }
}

function renderPagination(total, page) {
  const pages = Math.ceil(total / 25);
  const bar = document.getElementById('paginationBar');
  if (pages <= 1) { bar.innerHTML = ''; return; }
  let html = `<span style="font-size:12px;color:#6b7280;margin-right:8px">${total} total</span>`;
  for (let i = 1; i <= Math.min(pages, 10); i++) {
    html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadData(${i})">${i}</button>`;
  }
  bar.innerHTML = html;
}

function resetFilters() {
  document.getElementById('statusFilter').value = '';
  loadData(1);
}

document.addEventListener('DOMContentLoaded', async () => {
  await StaffSidebar.init();
  StaffHeader.inject('My VGK Registrations', 'fas fa-user-check');

  try {
    const me = await staffFetch(API + '/staff/me').then(r => r.json());
    if (me.success && me.employee) {
      const emp = me.employee;
      document.getElementById('empSubTitle').textContent =
        `Channel Partners registered by ${emp.employee_name || emp.emp_code} (${emp.emp_code})`;
    } else {
      document.getElementById('empSubTitle').textContent = 'Channel Partners you have personally registered';
    }
  } catch (e) {
    document.getElementById('empSubTitle').textContent = 'Channel Partners you have personally registered';
  }

  loadData(1);
});
</script>
</body>
</html>
