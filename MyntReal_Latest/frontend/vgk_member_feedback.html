<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Feedback — VGK4U Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background:#f6f9fc; font-family:'Segoe UI', Roboto, sans-serif; }
  .vgk-hero { background:linear-gradient(135deg, #7c3aed, #7c3aedcc); color:#fff; padding:24px 20px; border-radius:0 0 18px 18px; margin-bottom:20px; }
  .vgk-hero h1 { font-size:22px; font-weight:800; margin:0; }
  .vgk-hero p  { opacity:0.9; margin:4px 0 0; font-size:13px; }
  .back-link { color:#fff; text-decoration:none; opacity:0.85; font-size:13px; }
  .back-link:hover { opacity:1; color:#fff; }
</style>
<script src="/vgk-member-module-gate.js" data-flag="feedback_vgk4u_enabled" data-label="Feedback"></script>
</head>
<body>
  <div class="vgk-hero">
    <div style="max-width:760px;margin:0 auto">
      <a href="/vgk/dashboard" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
      <h1 class="mt-2"><i class="fas fa-comment-dots me-2"></i>Submit Feedback</h1>
      <p>Share text, photo, video, or review feedback. Approved items become announcements.</p>
      <div style="margin-top:8px;font-size:11px;opacity:0.7"><i class="fas fa-shield-alt me-1"></i>VGK4U Members · Audience-aware · DC Protocol IST</div>
    </div>
  </div>
  <main class="container" style="padding-bottom:60px">
    
      <form id="fbForm" style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;max-width:640px;margin:0 auto">
        <div class="mb-3"><label class="form-label fw-bold">Title *</label>
          <input class="form-control" id="fbTitle" maxlength="200" required></div>
        <div class="mb-3"><label class="form-label fw-bold">Type</label>
          <select class="form-select" id="fbType">
            <option value="text">Text</option><option value="photo">Photo</option>
            <option value="video">Video</option><option value="review">Review</option>
          </select></div>
        <div class="mb-3"><label class="form-label fw-bold">Description</label>
          <textarea class="form-control" id="fbDesc" rows="4" maxlength="4000"></textarea></div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-paper-plane me-2"></i>Submit</button>
      </form>
      <div id="fbResult" class="mt-3" style="max-width:640px;margin:1rem auto"></div>
      <h5 class="mt-4 mb-3" style="max-width:640px;margin:1rem auto">My Recent Submissions</h5>
      <div id="fbList" style="max-width:640px;margin:0 auto"></div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  
      const $ = (s) => document.querySelector(s);
      async function loadList() {
        try {
          const r = await fetch('/api/v1/vgk-member/feedback/my-submissions?audience=vgk4u',
            { credentials: 'include' });
          const d = await r.json();
          const items = (d.submissions || []).map(x => `
            <div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px">
              <div style="display:flex;justify-content:space-between"><strong>${x.title}</strong>
              <span class="badge bg-${x.status==='approved'?'success':x.status==='rejected'?'danger':'warning'}">${x.status}</span></div>
              <div style="color:#6b7280;font-size:12px">${new Date(x.submitted_at).toLocaleString('en-IN')}</div>
              ${x.description ? `<div style="margin-top:6px">${x.description}</div>` : ''}
            </div>`).join('');
          $('#fbList').innerHTML = items || '<div class="text-muted">No submissions yet.</div>';
        } catch (e) { $('#fbList').innerHTML = '<div class="alert alert-warning">Could not load list.</div>'; }
      }
      $('#fbForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const payload = {
          title: $('#fbTitle').value.trim(),
          submission_type: $('#fbType').value,
          description: $('#fbDesc').value.trim() || null
        };
        const r = await fetch('/api/v1/vgk-member/feedback/submit?audience=vgk4u', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
        });
        const d = await r.json();
        $('#fbResult').innerHTML = r.ok
          ? '<div class="alert alert-success">Submitted! Pending admin review.</div>'
          : `<div class="alert alert-danger">${d.detail || 'Failed'}</div>`;
        if (r.ok) { $('#fbForm').reset(); loadList(); }
      });
      loadList();
})();
</script>
</body>
</html>
