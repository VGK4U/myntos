<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad: Pain Point</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'Inter',sans-serif}
.ad{width:100vw;height:100vh;background:#0d7a4e;display:flex;flex-direction:column;justify-content:space-between;padding:6vh 7vw;box-sizing:border-box}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-name{font-size:2.2vw;font-weight:900;color:#fff;letter-spacing:0.04em}
.logo-sub{font-size:0.9vw;font-weight:500;color:rgba(255,255,255,0.55);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
.middle{display:flex;flex-direction:column;gap:3vh}
.headline{font-family:'Inter',sans-serif;font-size:8.5vw;font-weight:900;color:#fff;line-height:1.05;letter-spacing:-0.02em}
.headline span{color:#f59e0b}
.benefit{font-family:'Inter',sans-serif;font-size:2.2vw;font-weight:500;color:rgba(255,255,255,0.72);line-height:1.4}
.cta{display:inline-block;background:#f59e0b;color:#fff;font-family:'Inter',sans-serif;font-size:2vw;font-weight:800;padding:2vh 5vw;border-radius:1vw;align-self:flex-start;text-decoration:none;letter-spacing:0.01em}
.footer{font-size:1.6vw;color:rgba(255,255,255,0.35);font-weight:500}
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <span class="logo-name">MYNTREAL</span>
    <span class="logo-sub">Har Ghar Solar</span>
  </div>
  <div class="middle">
    <div class="headline">Tired of<br><span>High Bills?</span><br>Go Solar.</div>
    <div class="benefit">Switch to clean energy — zero power cuts, lower bills.</div>
    <div class="cta">Book Free Survey</div>
  </div>
  <span class="footer">myntreal.com</span>
</div>
</body>
</html>
