<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad: Urgency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:'Inter',sans-serif}
.ad{width:100vw;height:100vh;background:#f59e0b;display:flex;flex-direction:column;justify-content:space-between;padding:6vh 7vw;box-sizing:border-box}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-name{font-size:2.2vw;font-weight:900;color:#0a1f13;letter-spacing:0.04em}
.logo-sub{font-size:0.9vw;font-weight:600;color:rgba(10,31,19,0.55);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
.middle{display:flex;flex-direction:column;gap:3vh}
.headline{font-family:'Inter',sans-serif;font-size:8.5vw;font-weight:900;color:#0a1f13;line-height:1.05;letter-spacing:-0.02em}
.benefit{font-family:'Inter',sans-serif;font-size:2.3vw;font-weight:600;color:rgba(10,31,19,0.7);line-height:1.4}
.cta{display:inline-block;background:#0d7a4e;color:#fff;font-family:'Inter',sans-serif;font-size:2vw;font-weight:800;padding:2vh 5vw;border-radius:1vw;align-self:flex-start;text-decoration:none;letter-spacing:0.01em}
.footer{font-size:1.6vw;color:rgba(10,31,19,0.35);font-weight:500}
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <span class="logo-name">MYNTREAL</span>
    <span class="logo-sub">Har Ghar Solar</span>
  </div>
  <div class="middle">
    <div class="headline">40% Govt<br>Subsidy.<br>Claim It Now.</div>
    <div class="benefit">Limited slots. Free site survey. Install with ₹0 down.</div>
    <div class="cta">Apply Today</div>
  </div>
  <span class="footer">myntreal.com</span>
</div>
</body>
</html>
